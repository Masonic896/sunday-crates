<!DOCTYPE html>
<html>
<head>

  <title>Sunday Crates</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>

body {
  margin: 0;
  background: #0f0f0f;
  color: #eaeaea;
  font-family: "Space Grotesk";
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 6px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

/* DISCO */
#discoWrap {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 14px;
}

#discoBall {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff, #999 40%, #222 80%);
  animation: spin 6s linear infinite;
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 10px;
}

input, button {
  font-family: "Sekuya";
}

/* =========================
   ARTIST GRID
========================= */

#app {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 22px;
  padding: 10px 40px 40px;
}

/* =========================
   ARTIST BLOCK
========================= */

.artist-header {
  padding: 8px 20px;
  font-family: "Bebas Neue";
  font-size: 26px;
  display: flex;
  justify-content: space-between;
}

/* =========================
   CRATE SCROLLER
========================= */

.group {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;

  padding: 10px 20px;
  gap: 16px;

  cursor: grab;
}

.group:active {
  cursor: grabbing;
}

.group::-webkit-scrollbar {
  display: none;
}

/* =========================
   PAGE (STRICT 2 ITEMS ONLY)
========================= */

.page {
  flex: 0 0 100%;
  display: flex;           /* 🔥 KEY FIX */
  flex-direction: column;  /* vertical stack */
  gap: 16px;

  scroll-snap-align: center;
}

/* each page holds ONLY 2 items via JS, enforced */

/* =========================
   RECORD CARD
========================= */

.record-card {
  height: 260px;

  background: linear-gradient(145deg, #1a1a1a, #141414);
  border-radius: 12px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  padding: 14px;

  position: relative;
  overflow: hidden;

  border: 1px solid rgba(255,255,255,0.14);

  box-shadow:
    inset 0 2px 10px rgba(0,0,0,0.6),
    0 10px 30px rgba(0,0,0,0.5);

  transition: transform 0.2s ease;
}

.record-card:hover {
  transform: scale(1.02);
}

/* COVER */
.cover {
  width: 65%;
  height: 130px;
  object-fit: cover;
  border-radius: 8px;
}

/* TITLE */
.record-title {
  font-family: "Playfair Display";
  font-size: 15px;
  text-align: center;
  margin-top: 10px;
}

/* GLASS SHINE */
.record-card::before {
  content: "";
  position: absolute;
  top: -40%;
  left: -40%;
  width: 200%;
  height: 200%;

  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.06),
    transparent
  );

  transform: rotate(25deg);
  pointer-events: none;
}

/* FOOTER */
.footer-status {
  font-family: "Space Grotesk";
  padding: 16px 40px;
  opacity: 0.6;
  text-align: right;
}

  </style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div id="discoWrap">
    <div id="discoBall"></div>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>
</header>

<div id="app"></div>
<div id="status" class="footer-status"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

async function load() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);

  document.getElementById("status").innerText =
    "Updated: " + new Date().toLocaleString();
}

load();

/* STRICT chunking */
function chunk(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) {
    out.push(arr.slice(i, i + size));
  }
  return out;
}

/* =========================
   RENDER
========================= */

function render(data) {

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item);
  });

  const artists = Object.keys(grouped)
    .sort((a,b) => grouped[b].length - grouped[a].length);

  let html = "";

  artists.forEach(artist => {

    const pages = chunk(grouped[artist], 2); // 🔥 HARD LIMIT 2

    html += `
      <div class="artist-block">

        <div class="artist-header">
          <span>${artist}</span>
          <span>${grouped[artist].length}</span>
        </div>

        <div class="group">
    `;

    pages.forEach(page => {

      html += `<div class="page">`;

      page.forEach(item => {
        html += `
          <div class="record-card">

            ${item.cover ? `<img src="${item.cover}" class="cover">` : ""}

            <div class="record-title">${item.record}</div>

          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById("app").innerHTML = html;
}

/* DRAG */
document.addEventListener("mousedown", (e) => {
  const slider = e.target.closest(".group");
  if (!slider) return;

  let startX = e.pageX;
  let scrollLeft = slider.scrollLeft;

  const move = (e2) => {
    slider.scrollLeft = scrollLeft - (e2.pageX - startX);
  };

  const stop = () => {
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", stop);
  };

  document.addEventListener("mousemove", move);
  document.addEventListener("mouseup", stop);
});

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

function randomRecord(){
  const pick = allData[Math.floor(Math.random()*allData.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
