<!DOCTYPE html>
<html>
<head>
  <title>Vinyl Collection</title>

  <style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #eaeaea;
  padding: 24px;
}

h1 {
  font-weight: 600;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.record-card {
  margin-left: 20px;
  padding: 6px 10px;
  margin-bottom: 4px;
  background: #1b1b1b;
  border-radius: 6px;
  transition: 0.15s;
}

.record-card:hover {
  background: #2a2a2a;
  transform: translateX(4px);
}

.artist {
  font-weight: 700;
  margin-top: 26px;
  padding-bottom: 6px;
  border-bottom: 1px solid #2a2a2a;
  color: #ffffff;
  cursor: pointer;
}

.group {
  display: block;
}

input {
  padding: 8px;
  width: 300px;
  margin-bottom: 15px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px;
  margin-left: 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}
  </style>
</head>

<body>

<h1>My Vinyl Collection</h1>

<input id="search" placeholder="Search records or artists..." />
<button onclick="randomRecord()"> <div class="disco-ball"></div>

<style>
.disco-ball {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: conic-gradient(
    #fff 0deg 20deg,
    #ccc 20deg 40deg,
    #fff 40deg 60deg,
    #ccc 60deg 80deg,
    #fff 80deg 100deg,
    #ccc 100deg 120deg,
    #fff 120deg 140deg,
    #ccc 140deg 160deg,
    #fff 160deg 180deg,
    #ccc 180deg 200deg,
    #fff 200deg 220deg,
    #ccc 220deg 240deg,
    #fff 240deg 260deg,
    #ccc 260deg 280deg,
    #fff 280deg 300deg,
    #ccc 300deg 320deg,
    #fff 320deg 340deg,
    #ccc 340deg 360deg
  );
  box-shadow: 0 0 10px #fff, inset 0 0 10px #fff;
  animation: spin 2s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
Random Dig</button>

<div id="app">Loading...</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

// FETCH DATA
fetch(SHEET_URL)
  .then(res => res.text())
  .then(text => {

    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    allData = rows.map(r => ({
      artist: r.c[1]?.v,
      record: r.c[2]?.v
    })).filter(x => x.artist && x.record);

    render(allData);
  })
  .catch(err => {
    console.error(err);
    document.getElementById("app").innerHTML = "Error loading data";
  });


// RENDER UI
function render(data) {
  let html = "";
  let currentArtist = "";
  let openGroup = false;

  data.forEach(item => {

    if (item.artist !== currentArtist) {

      if (openGroup) html += "</div>";

      currentArtist = item.artist;
      openGroup = true;

      html += `
        <div class="artist" onclick="toggleArtist('${item.artist.replace(/'/g,"") }')">
          ${item.artist}
        </div>
        <div id="group-${item.artist}" class="group">
      `;
    }

    html += `
      <div class="record-card">
        - ${item.record}
      </div>
    `;
  });

  if (openGroup) html += "</div>";

  document.getElementById("app").innerHTML = html;
}


// SEARCH (outside render — FIXED)
document.getElementById("search").addEventListener("input", function(e) {
  const val = e.target.value.toLowerCase();

  const filtered = allData.filter(item =>
    item.artist.toLowerCase().includes(val) ||
    item.record.toLowerCase().includes(val)
  );

  render(filtered);
});


// RANDOM DIG
function randomRecord() {
  if (!allData.length) return;

  const pick = allData[Math.floor(Math.random() * allData.length)];

  alert(`${pick.artist} — ${pick.record}`);
}


// COLLAPSE
function toggleArtist(artist) {
  const el = document.getElementById("group-" + artist);
  if (!el) return;

  el.style.display = el.style.display === "none" ? "block" : "none";
}

</script>

</body>
</html>
