<!DOCTYPE html>
<html>
<head>

  <title>Sunday Crates</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>

body {
  margin: 0;
  background: linear-gradient(180deg, #0f0507, #1a0b10);
  color: #d8d9d3;
  font-family: "Space Grotesk";
  overflow-x: hidden;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 6px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 10px;
}

input {
  font-family: "Bebas Neue";
  background: white;
  color: #0f0507;
  border: 1px solid #ccc;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 18px;
}

button {
  font-family: "Sekuya";
  background: #233d4d;
  color: #d8d9d3;
  border: 1px solid rgba(216, 217, 211, 0.25);
  padding: 6px 10px;
  cursor: pointer;
}

/* WRAPPER */
#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

/* GRID */
#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}

/* =========================
   🔥 MYSPACE PROFILE BLOCK
========================= */

.artist-block {
  background: rgba(35, 61, 77, 0.25);
  border: 1px solid rgba(216,217,211,0.18);
  border-radius: 10px;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 10px 30px rgba(0,0,0,0.4);

  overflow: hidden;
}

/* HEADER */
.artist-header {
  padding: 10px 16px;
  font-family: "Bebas Neue";
  font-size: 26px;
  display: flex;
  justify-content: space-between;

  background: linear-gradient(
    90deg,
    rgba(216,217,211,0.08),
    rgba(216,217,211,0.02)
  );

  border-bottom: 1px solid rgba(216,217,211,0.15);
}

/* 🔥 SUBHEADER LABEL */
.artist-sub {
  font-family: "Bebas Neue";
  font-size: 14px;
  letter-spacing: 1px;
  opacity: 0.6;
  padding: 6px 16px 0;
}

/* GROUP */
.group {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 12px 16px 18px;
}

/* RECORD CARD */
.record-card {
  height: 300px;

  background: rgba(0,0,0,0.25);
  border-radius: 10px;

  border: 1px solid rgba(216,217,211,0.12);

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  padding: 14px;

  position: relative;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 8px 20px rgba(0,0,0,0.45);

  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.record-card:hover {
  transform: translateY(-4px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 16px 30px rgba(0,0,0,0.6);
}

/* COVER */
.cover {
  width: 100%;
  max-width: 280px;
  height: 210px;
  object-fit: contain;
  border-radius: 8px;
}

/* TITLE */
.record-title {
  font-family: "Playfair Display";
  font-size: 22px;
  text-align: center;
  margin-top: 12px;
}

/* FOOTER */
.footer-status {
  font-family: "Space Grotesk";
  padding: 16px 40px;
  opacity: 0.6;
  text-align: right;
}

  </style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>
</header>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<div id="status" class="footer-status"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let lastFiltered = null;

async function load() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);
}

load();

/* stable sort */
function getSortedArtists(grouped) {
  return Object.keys(grouped).sort((a, b) => {
    const diff = grouped[b].length - grouped[a].length;
    if (diff !== 0) return diff;
    return a.localeCompare(b);
  });
}

/* render */
function render(data) {

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item);
  });

  const artists = getSortedArtists(grouped);

  let html = "";

  artists.forEach(artist => {

    html += `
      <div class="artist-block">

        <div class="artist-header">
          <span>${artist}</span>
          <span>${grouped[artist].length}</span>
        </div>

        <div class="artist-sub">Top Records</div>

        <div class="group">
    `;

    grouped[artist].forEach(item => {
      html += `
        <div class="record-card">

          ${item.cover ? `<img src="${item.cover}" class="cover">` : ""}

          <div class="record-title">${item.record}</div>

        </div>
      `;
    });

    html += `
        </div>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;

  lastFiltered = data;
}

/* search */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  const filtered = allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  );

  render(filtered);
});

function randomRecord(){
  const pool = lastFiltered || allData;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
