<!DOCTYPE html>
<html>
<head>

  <title>Sunday Crates</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>

body {
  margin: 0;
  background: #0f0507;
  color: #d8d9d3;
  font-family: "Space Grotesk";
  overflow-x: hidden;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 6px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
  color: #d8d9d3;
}

.controls {
  display: flex;
  gap: 10px;
}

input {
  font-family: "Bebas Neue";
  background: white;
  color: #0f0507;
  border: 1px solid #ccc;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 18px;
}

button {
  font-family: "Sekuya";
  background: #233d4d;
  color: #d8d9d3;
  border: 1px solid rgba(216,217,211,0.25);
  padding: 6px 10px;
  cursor: pointer;
}

/* WRAPPER */
#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

/* GRID */
#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* ARTIST BLOCK */
.artist-block {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* HEADER */
.artist-header {
  padding: 8px 20px;
  font-family: "Bebas Neue";
  font-size: 26px;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
  transition: opacity 0.2s;
}

.artist-header:hover {
  opacity: 0.7;
}

/* PROFILE PANEL */
.artist-profile {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, padding 0.25s ease;
  padding: 0 20px;

  font-family: "Space Grotesk";
  font-size: 14px;
  line-height: 1.5;
  opacity: 0.85;
}

.artist-profile.open {
  max-height: 120px;
  padding: 10px 20px 14px;
}

/* SCROLLER */
.group {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  padding: 10px 8px;
  gap: 16px;
}

.group::-webkit-scrollbar {
  display: none;
}

/* PAGE */
.page {
  flex: 0 0 85%;
  display: flex;
  justify-content: center;
  scroll-snap-align: center;
}

/* CARD */
.record-card {
  height: 320px;
  width: 100%;
  max-width: 420px;

  background: rgba(35, 61, 77, 0.18);
  border-radius: 12px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  padding: 14px;
  position: relative;
  overflow: hidden;

  border: 1px solid rgba(216,217,211,0.18);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    inset 0 -10px 30px rgba(0,0,0,0.35),
    0 18px 40px rgba(0,0,0,0.55);

  backdrop-filter: blur(10px);

  transition: transform 0.2s ease;
}

.record-card:hover {
  transform: translateY(-6px);
}

/* COVER */
.cover {
  width: 100%;
  max-width: 300px;
  height: 230px;
  object-fit: contain;
  border-radius: 10px;
}

/* TITLE */
.record-title {
  font-family: "Playfair Display";
  font-size: 24px;
  text-align: center;
  margin-top: 14px;
}

/* FOOTER */
.footer-status {
  padding: 16px 40px;
  opacity: 0.7;
  text-align: right;
}

  </style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>
</header>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<div id="status" class="footer-status"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let lastFiltered = null;

async function load() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);
}

load();

function chunk(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) {
    out.push(arr.slice(i, i + size));
  }
  return out;
}

function getSortedArtists(grouped) {
  return Object.keys(grouped).sort((a, b) => {
    const diff = grouped[b].length - grouped[a].length;
    if (diff !== 0) return diff;
    return a.localeCompare(b);
  });
}

function toggleProfile(el) {
  const profile = el.nextElementSibling;
  profile.classList.toggle("open");
}

/* RENDER */
function render(data) {

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item);
  });

  const artists = getSortedArtists(grouped);

  let html = "";

  artists.forEach(artist => {

    const pages = chunk(grouped[artist], 1);

    html += `
      <div class="artist-block">

        <div class="artist-header" onclick="toggleProfile(this)">
          <span>${artist}</span>
        </div>

        <div class="artist-profile">
          ${artist} — ${grouped[artist].length} records in crate.
        </div>

        <div class="group">
    `;

    pages.forEach(page => {

      html += `<div class="page">`;

      page.forEach(item => {
        html += `
          <div class="record-card">
            ${item.cover ? `<img src="${item.cover}" class="cover">` : ""}
            <div class="record-title">${item.record}</div>
          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById("app").innerHTML = html;
  lastFiltered = data;
}

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  const filtered = allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  );

  render(filtered);
});

function randomRecord(){
  const pool = lastFiltered || allData;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
