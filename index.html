<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sunday Crates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&family=DM+Sans:wght@300..700&display=swap" rel="stylesheet">

<style>

/* ========================= BASE ========================= */

body {
  margin: 0;
  background: #0e0b0c;
  color: #e4e1da;
  font-family: "Space Grotesk";
}

/* ========================= HEADER ========================= */

header {
  max-width: 1200px;
  margin: 0 auto;
  padding: 22px 24px 10px;
  box-sizing: border-box;
  position: relative;
  display: flex;
  align-items: center;
  /* tall enough to house the disco ball without pushing content */
  min-height: 130px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
  color: #e4e1da;
  position: relative;
  z-index: 1;
}

/* ========================= DISCO BALL ========================= */

#discoBallWrapper {
  position: absolute;
  /* sit in the right portion of the header, vertically centered */
  right: 24px;
  top: 0;
  width: 700px;   /* wide zone so the ball + light have room */
  height: 130px;
  pointer-events: none;
  overflow: visible;
}

#discoBallLight {
  width: 80px;
  height: 80px;
  position: absolute;
  top: 15px;
  left: 50%;
  margin-left: -40px;
  border-radius: 100%;
  background-color: white;
  opacity: 0.18;
  filter: blur(18px);
}

#discoBall {
  transform-style: preserve-3d;
  width: 80px;
  height: 80px;
  position: absolute;
  top: 15px;
  left: 50%;
  margin-left: -40px;
  animation: rotateDiscoBall 18s linear infinite;
}

#discoBallMiddle {
  height: 100%;
  border-radius: 100%;
  position: absolute;
  width: 100%;
  background: linear-gradient(top, #111, #333);
  animation: rotateDiscoBallMiddle 18s linear infinite;
}

@keyframes rotateDiscoBall {
  0%   { transform: rotateX(90deg) rotateZ(0deg)   rotate(0deg); }
  100% { transform: rotateX(90deg) rotateZ(360deg) rotate(0deg); }
}

@keyframes rotateDiscoBallMiddle {
  0%   { transform: rotateX(90deg) rotateY(0deg)    rotate(0deg); }
  100% { transform: rotateX(90deg) rotateY(-360deg) rotate(0deg); }
}

@keyframes reflect {
  0%   { opacity: 1;   }
  50%  { opacity: 0.4; }
  100% { opacity: 1;   }
}

.square {
  transform-style: preserve-3d;
  position: absolute;
  top: 40px;
  left: 40px;
  width: 5px;
  height: 5px;
}

/* ========================= CONTROLS ========================= */

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  margin-bottom: 20px;
  box-sizing: border-box;
}

.controls-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  flex: 1;
}

button {
  font-family: "Sekuya";
  background: #1a1617;
  color: #e4e1da;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 6px 14px;
  height: 34px;
  cursor: pointer;
}

#searchBar {
  width: 220px;
  flex-shrink: 0;
  padding: 8px 12px;
  background: #1a1617;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  color: #e4e1da;
  font-family: "Space Grotesk";
  font-size: 14px;
  outline: none;
  height: 34px;
  box-sizing: border-box;
}

#searchBar::placeholder { color: rgba(228,225,218,0.4); }
#searchBar:focus { border-color: rgba(255,255,255,0.15); }

/* ========================= SORT PILLS ========================= */

.sort-pills {
  display: flex;
  gap: 6px;
  align-items: center;
}

.sort-label {
  font-size: 13px;
  opacity: 0.5;
  margin-right: 2px;
}

.sort-btn {
  font-family: "Space Grotesk";
  font-size: 12px;
  font-weight: 500;
  background: #1a1617;
  color: rgba(228,225,218,0.6);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  padding: 4px 12px;
  height: 28px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.sort-btn.active {
  background: #e2ddd2;
  color: #181515;
  border-color: #e2ddd2;
}

/* ========================= GRID WALL ========================= */

#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

#app {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  padding: 18px;
  border-radius: 14px;
  background-color: #0a0708;
  background-image:
    repeating-linear-gradient(45deg,  rgba(110,72,35,0.22) 0, rgba(110,72,35,0.22) 1.5px, transparent 0, transparent 50%),
    repeating-linear-gradient(-45deg, rgba(110,72,35,0.22) 0, rgba(110,72,35,0.22) 1.5px, transparent 0, transparent 50%);
  background-size: 10px 10px;
}

/* ========================= FOCUS MODE ========================= */

#app.focus-mode .letter-block {
  opacity: 0.28;
  filter: saturate(0.7) contrast(0.9);
  transform: scale(0.985);
}

#app.focus-mode .letter-block.active {
  opacity: 1;
  transform: scale(1.01) translateY(-2px);
  box-shadow: 0 22px 60px rgba(0,0,0,0.9);
  filter: none;
}

#app.focus-mode .random-dig-block,
#app.focus-mode .bottom-crate {
  opacity: 0.28;
  filter: saturate(0.7) contrast(0.9);
  transform: scale(0.985);
}

#app.focus-mode .random-dig-block {
  animation-play-state: paused;
}

#app.focus-mode .bottom-crate.active {
  opacity: 1;
  transform: scale(1.01) translateY(-2px);
  box-shadow: 0 22px 60px rgba(0,0,0,0.9);
  filter: none;
}

/* ========================= LETTER CRATES ========================= */

.letter-block {
  background: #161314;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.04);
  overflow: hidden;
  transition: all 0.25s ease;
}

.letter-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  background: #e2ddd2;
  color: #181515;
  cursor: pointer;
  min-height: 60px;
  box-sizing: border-box;
}

.letter-header span:first-child {
  font-family: "Sekuya";
  font-size: 36px;
  font-weight: bold;
  line-height: 1;
}

.letter-header span:last-child {
  font-size: 16px;
  font-family: "Space Grotesk";
  text-align: right;
  line-height: 1.4;
  color: #181515;
}

.letter-group {
  display: none;
  flex-direction: column;
  max-height: 55vh;
  overflow-y: auto;
  padding: 14px;
  background: #120f10;
  gap: 14px;
}

.letter-block.active .letter-group { display: flex; }

/* ========================= BOTTOM CRATES ========================= */

.bottom-crate {
  background: #161314;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.04);
  overflow: hidden;
  transition: all 0.25s ease;
}

.bottom-crate.span-2 { grid-column: span 2; }

.bottom-crate-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;
  background: #e2ddd2;
  color: #181515;
  cursor: pointer;
  height: 88px;
  box-sizing: border-box;
  gap: 8px;
}

.bottom-crate-header .crate-label {
  font-family: "Sekuya";
  font-size: 36px;
  font-weight: bold;
  line-height: 1.1;
  color: #181515;
  flex-shrink: 0;
}

.bottom-crate-header .crate-count {
  font-family: "Space Grotesk";
  font-size: 15px;
  color: #181515;
  text-align: right;
  line-height: 1.5;
}

.bottom-crate .letter-group { display: none; }
.bottom-crate.active .letter-group { display: flex; }

/* ========================= RANDOM DIG CRATE ========================= */

@keyframes digInvite {
  0%, 55%, 100% { transform: scale(1)    rotate(0deg);    }
  57%           { transform: scale(1.03) rotate(-1.5deg); }
  59%           { transform: scale(1.04) rotate( 1.5deg); }
  61%           { transform: scale(1.04) rotate(-1deg);   }
  63%           { transform: scale(1.03) rotate( 0.8deg); }
  65%           { transform: scale(1.02) rotate(0deg);    }
  69%           { transform: scale(1)    rotate(0deg);    }
}

.random-dig-block {
  background: #161314;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.04);
  overflow: hidden;
  cursor: pointer;
  animation: digInvite 4s ease-in-out infinite;
  transform-origin: center;
  transition: filter 0.2s ease;
}

.random-dig-block:hover { filter: brightness(1.15); }

.random-dig-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 16px;
  background: #e2ddd2;
  color: #181515;
  height: 88px;
  box-sizing: border-box;
  cursor: pointer;
  gap: 6px;
  overflow: hidden;
}

.random-dig-title {
  font-family: "Sekuya";
  font-size: 30px;
  font-weight: bold;
  line-height: 1.1;
  color: #181515;
  flex-shrink: 0;
}

.random-dig-count {
  font-family: "Space Grotesk";
  font-size: 13px;
  color: #181515;
  text-align: right;
  line-height: 1.6;
  overflow: hidden;
}

/* ========================= ARTISTS ========================= */

.artist-section {
  background: #1a1617;
  padding: 12px;
  border-radius: 10px;
}

.artist-name {
  font-size: 16px;
  text-transform: uppercase;
  opacity: 0.85;
  margin-bottom: 10px;
}

/* ========================= RECORDS ========================= */

.record-card {
  background: #1f1b1c;
  border-radius: 10px;
  padding: 8px;
  margin-bottom: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.record-card img {
  width: 100%;
  max-width: 90px;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 6px;
  margin-bottom: 6px;
}

.record-title {
  font-family: "DM Sans";
  font-size: 12px;
  text-align: center;
  line-height: 1.3;
  word-break: break-word;
}

/* ========================= SPIN MODAL ========================= */

#spinModal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
}

#spinOverlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
}

#spinBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 700px;
  background: #151112;
  border-radius: 12px;
  padding: 40px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.08);
  box-sizing: border-box;
}

#spinTitle {
  font-family: "Bebas Neue";
  font-size: 28px;
  margin-bottom: 30px;
  opacity: 0.8;
  letter-spacing: 2px;
}

#spinContent {
  min-height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.carousel-container {
  width: 516px;
  height: 280px;
  overflow: hidden;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.06);
  background: #0f0c0d;
  margin-bottom: 30px;
  position: relative;
}

.carousel-container::after {
  content: '';
  position: absolute;
  left: 178px;
  top: 10px;
  bottom: 10px;
  width: 160px;
  border: 1px solid rgba(228,225,218,0.18);
  border-radius: 10px;
  pointer-events: none;
  z-index: 2;
}

.carousel {
  display: flex;
  gap: 12px;
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  align-items: center;
  padding-left: 6px;
}

.carousel-item {
  flex-shrink: 0;
  width: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0.3;
  box-sizing: border-box;
  transition: opacity 0.05s ease, transform 0.05s ease;
}

.carousel-item.active {
  opacity: 1;
  transform: scale(1.05);
}

.carousel-cover {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 8px;
  flex-shrink: 0;
  display: block;
}

.carousel-text {
  font-size: 11px;
  text-align: center;
  opacity: 0.85;
  line-height: 1.3;
  width: 150px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.result-text   { font-family: "DM Sans";    font-size: 14px; margin-bottom: 8px; opacity: 0.9; }
.result-artist { font-family: "Bebas Neue"; font-size: 24px; margin-bottom: 8px; }
.result-record { font-family: "Bebas Neue"; font-size: 20px; opacity: 0.8; }

.spin-result {
  opacity: 0;
  animation: fadeIn 0.6s ease-out forwards;
  width: 100%;
}

@keyframes fadeIn {
  0%   { opacity: 0; transform: scale(0.9); }
  100% { opacity: 1; transform: scale(1);   }
}

.result-cover {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  margin: 0 auto 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  display: block;
}

.error-message {
  text-align: center;
  padding: 2rem;
  opacity: 0.6;
  font-size: 14px;
}

</style>
</head>
<body>

<header>
  <h1>Sunday Crates</h1>
  <!-- Disco ball lives here, absolutely positioned in the right portion of the header -->
  <div id="discoBallWrapper">
    <div id="discoBallLight"></div>
    <div id="discoBall">
      <div id="discoBallMiddle"></div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="controls-left">
    <button onclick="toggleAll()">Expand / Collapse All</button>
    <div class="sort-pills">
      <span class="sort-label">Sort:</span>
      <button class="sort-btn active" data-sort="az"      onclick="setSort('az')">A–Z</button>
      <button class="sort-btn"        data-sort="titles"  onclick="setSort('titles')">Title #</button>
      <button class="sort-btn"        data-sort="artists" onclick="setSort('artists')">Artist #</button>
      <button class="sort-btn"        data-sort="genre"   onclick="setSort('genre')">Genre</button>
    </div>
  </div>
  <input type="text" id="searchBar" placeholder="Search artists or records...">
</div>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<div id="spinModal">
  <div id="spinOverlay"></div>
  <div id="spinBox">
    <div id="spinTitle">DIGGING...</div>
    <div id="spinContent">
      <div class="carousel-container">
        <div class="carousel" id="carousel"></div>
      </div>
      <div id="resultDisplay"></div>
    </div>
  </div>
</div>

<script>

/* ========================= DISCO BALL ========================= */

(function(){
  var radius    = 40;   // scaled down from 50 to match 80px ball
  var squareSize = 5.2;
  var prec      = 19.55;
  var fuzzy     = 0.001;
  var inc       = (Math.PI - fuzzy) / prec;
  var discoBall = document.getElementById("discoBall");

  for (var t = fuzzy; t < Math.PI; t += inc) {
    var z = radius * Math.cos(t);
    var currentRadius = Math.abs(
      (radius * Math.cos(0) * Math.sin(t)) -
      (radius * Math.cos(Math.PI) * Math.sin(t))
    ) / 2.5;
    var circumference   = Math.abs(2 * Math.PI * currentRadius);
    var squaresThatFit  = Math.floor(circumference / squareSize);
    var angleInc        = (Math.PI * 2 - fuzzy) / squaresThatFit;

    for (var i = angleInc / 2 + fuzzy; i < (Math.PI * 2); i += angleInc) {
      var square     = document.createElement("div");
      var squareTile = document.createElement("div");

      squareTile.style.width            = squareSize + "px";
      squareTile.style.height           = squareSize + "px";
      squareTile.style.transformOrigin  = "0 0 0";
      squareTile.style.transform        = "rotate(" + i + "rad) rotateY(" + t + "rad)";

      if ((t > 1.3 && t < 1.9) || (t < -1.3 && t > -1.9)) {
        squareTile.style.backgroundColor = randomColor("bright");
      } else {
        squareTile.style.backgroundColor = randomColor("any");
      }

      squareTile.style.animation      = "reflect 2s linear infinite";
      squareTile.style.animationDelay = String(randomNumber(0, 20) / 10) + "s";
      squareTile.style.backfaceVisibility = "hidden";

      square.appendChild(squareTile);
      square.className = "square";

      var x = radius * Math.cos(i) * Math.sin(t);
      var y = radius * Math.sin(i) * Math.sin(t);
      square.style.transform = "translateX(" + x + "px) translateY(" + y + "px) translateZ(" + z + "px)";

      discoBall.appendChild(square);
    }
  }

  function randomColor(type) {
    var c = (type === "bright") ? randomNumber(130, 255) : randomNumber(110, 190);
    return "rgb(" + c + "," + c + "," + c + ")";
  }

  function randomNumber(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }
})();

/* ========================= SHEET ========================= */

const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData      = [];
let filteredData = [];
let sortMode     = 'az';

async function load(){
  try {
    const res  = await fetch(SHEET_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
    allData = (json.table.rows || [])
      .map(r => ({
        artist: r.c?.[1]?.v,
        record: r.c?.[2]?.v,
        cover:  r.c?.[3]?.v,
        genre:  r.c?.[4]?.v || null
      }))
      .filter(x => x.artist && x.record);
    filteredData = [...allData];
    render(filteredData);
  } catch(e) {
    document.getElementById("app").innerHTML =
      '<div class="error-message">Could not load your crates. Please check your connection and refresh.</div>';
    console.error("Load error:", e);
  }
}

load();

document.getElementById("searchBar").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  filteredData = q.length === 0
    ? [...allData]
    : allData.filter(i =>
        i.artist.toLowerCase().includes(q) ||
        i.record.toLowerCase().includes(q)
      );
  render(filteredData);
});

function setSort(mode){
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.sort === mode)
  );
  render(filteredData);
}

function toggle(el){
  const block = el.closest(".letter-block, .bottom-crate");
  if (!block) return;
  block.classList.toggle("active");
  const anyOpen = document.querySelector(".letter-block.active, .bottom-crate.active");
  document.getElementById("app").classList.toggle("focus-mode", !!anyOpen);
}

function toggleAll(){
  const blocks  = document.querySelectorAll(".letter-block, .bottom-crate");
  const app     = document.getElementById("app");
  const anyOpen = document.querySelector(".letter-block.active, .bottom-crate.active");
  if (anyOpen) {
    blocks.forEach(b => b.classList.remove("active"));
    app.classList.remove("focus-mode");
  } else {
    blocks.forEach(b => b.classList.add("active"));
    app.classList.add("focus-mode");
  }
}

function recordsHTML(group){
  let h = "";
  Object.keys(group).sort().forEach(artist => {
    h += `<div class="artist-section"><div class="artist-name">${artist}</div>`;
    group[artist].forEach(r => {
      h += `<div class="record-card">
        ${r.cover ? `<img src="${r.cover}">` : ""}
        <div class="record-title">${r.record}</div>
      </div>`;
    });
    h += `</div>`;
  });
  return h;
}

function buildLetterCrate(title, group){
  if (!group || Object.keys(group).length === 0) return "";
  const tot = Object.values(group).reduce((s,r) => s + r.length, 0);
  const art = Object.keys(group).length;
  return `
    <div class="letter-block">
      <div class="letter-header">
        <span>${title}</span>
        <span>${tot} ${tot===1?'Title':'Titles'}<br>${art} ${art===1?'Artist':'Artists'}</span>
      </div>
      <div class="letter-group">${recordsHTML(group)}</div>
    </div>`;
}

function buildBottomCrate(title, group, spanClass=''){
  if (!group || Object.keys(group).length === 0) return "";
  const tot = Object.values(group).reduce((s,r) => s + r.length, 0);
  const art = Object.keys(group).length;
  const countLine = title === 'Various'
    ? `${tot} ${tot===1?'Title':'Titles'}`
    : `${tot} ${tot===1?'Title':'Titles'}<br>${art} ${art===1?'Artist':'Artists'}`;
  return `
    <div class="bottom-crate ${spanClass}">
      <div class="bottom-crate-header">
        <div class="crate-label">${title}</div>
        <div class="crate-count">${countLine}</div>
      </div>
      <div class="letter-group">${recordsHTML(group)}</div>
    </div>`;
}

function render(data){
  const alpha   = {};
  const various = [];
  const numeric = {};

  data.forEach(item => {
    if (item.artist === "Various") { various.push(item); return; }
    if (/^[0-9]/.test(item.artist)) {
      if (!numeric["#"])              numeric["#"] = {};
      if (!numeric["#"][item.artist]) numeric["#"][item.artist] = [];
      numeric["#"][item.artist].push(item);
      return;
    }
    const letter = item.artist[0].toUpperCase();
    if (!alpha[letter])              alpha[letter] = {};
    if (!alpha[letter][item.artist]) alpha[letter][item.artist] = [];
    alpha[letter][item.artist].push(item);
  });

  let html = "";

  if (sortMode === 'az'){
    Object.keys(alpha).sort().forEach(l => { html += buildLetterCrate(l, alpha[l]); });
  } else if (sortMode === 'titles'){
    Object.keys(alpha)
      .map(l => ({ l, tot: Object.values(alpha[l]).reduce((s,r)=>s+r.length,0) }))
      .sort((a,b) => b.tot - a.tot)
      .forEach(({l}) => { html += buildLetterCrate(l, alpha[l]); });
  } else if (sortMode === 'artists'){
    Object.keys(alpha)
      .map(l => ({ l, cnt: Object.keys(alpha[l]).length }))
      .sort((a,b) => b.cnt - a.cnt)
      .forEach(({l}) => { html += buildLetterCrate(l, alpha[l]); });
  } else if (sortMode === 'genre'){
    const genres = {};
    data.forEach(item => {
      if (!item.genre) return;
      if (item.artist === "Various") return;
      if (/^[0-9]/.test(item.artist)) return;
      const g = item.genre;
      if (!genres[g])              genres[g] = {};
      if (!genres[g][item.artist]) genres[g][item.artist] = [];
      genres[g][item.artist].push(item);
    });
    Object.keys(genres).sort().forEach(g => { html += buildLetterCrate(g, genres[g]); });
  }

  html += buildBottomCrate("#",       numeric["#"] || {});
  html += buildBottomCrate("Various", { "Various": various }, "span-2");

  const totalTitles   = data.length;
  const uniqueArtists = new Set(data.map(r => r.artist)).size;
  const tT = totalTitles   === 1 ? 'Title'  : 'Titles';
  const tA = uniqueArtists === 1 ? 'Artist' : 'Artists';

  html += `
    <div class="random-dig-block" onclick="randomRecord()">
      <div class="random-dig-header">
        <div class="random-dig-title">Random<br>Dig</div>
        <div class="random-dig-count">${totalTitles} ${tT}<br>${uniqueArtists} ${tA}</div>
      </div>
    </div>`;

  document.getElementById("app").innerHTML = html;

  document.querySelectorAll(".letter-header, .bottom-crate-header").forEach(h => {
    h.addEventListener("click", () => toggle(h));
  });
  document.querySelectorAll(".letter-group").forEach(g =>
    g.addEventListener("click", e => e.stopPropagation())
  );
}

function randomRecord(){
  const modal         = document.getElementById("spinModal");
  const carousel      = document.getElementById("carousel");
  const resultDisplay = document.getElementById("resultDisplay");

  modal.style.display = "block";
  carousel.innerHTML  = "";
  resultDisplay.innerHTML = "";

  const src    = filteredData.length > 0 ? filteredData : allData;
  const winner = src[Math.floor(Math.random() * src.length)];

  const seq = [];
  for (let i = 0; i < 50; i++) seq.push(src[Math.floor(Math.random() * src.length)]);
  seq.push(winner);
  seq.push(src[Math.floor(Math.random() * src.length)]);

  seq.forEach(r => {
    const el = document.createElement("div");
    el.className = "carousel-item";
    el.innerHTML = `
      ${r.cover
        ? `<img src="${r.cover}" class="carousel-cover">`
        : `<div style="width:120px;height:120px;background:#1a1617;border-radius:8px;margin-bottom:8px;flex-shrink:0;display:block;"></div>`}
      <div class="carousel-text">${r.artist} — ${r.record}</div>`;
    carousel.appendChild(el);
  });

  const items   = Array.from(carousel.querySelectorAll(".carousel-item"));
  const WIN_IDX = 50;
  const duration  = 3760;
  const startTime = performance.now();

  function easeOutCubic(t){ return 1 - Math.pow(1-t, 3); }

  function animate(now){
    const progress = Math.min((now - startTime) / duration, 1);
    const cur      = Math.round(easeOutCubic(progress) * WIN_IDX);
    items.forEach((it, i) => it.classList.toggle("active", i === cur));
    const offset = Math.max(0, (cur - 1) * 172);
    carousel.style.transform = `translateX(${-offset}px)`;
    if (progress < 1){
      requestAnimationFrame(animate);
    } else {
      resultDisplay.innerHTML = `
        <div class="spin-result">
          ${winner.cover ? `<img src="${winner.cover}" class="result-cover">` : ""}
          <div class="result-text">You found:</div>
          <div class="result-artist">${winner.artist}</div>
          <div class="result-record">${winner.record}</div>
        </div>`;
    }
  }

  requestAnimationFrame(animate);
  modal.onclick = () => modal.style.display = "none";
}

</script>
