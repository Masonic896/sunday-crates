<!DOCTYPE html>
<html>
<head>

  <title>Sunday Crates</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>

body {
  margin: 0;
  background: #0f0f0f;
  color: #eaeaea;
  font-family: "Space Grotesk";
}

/* =========================
   HEADER
========================= */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 40px 8px; /* tighter */
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

/* DISCO */
#discoWrap {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 14px;
}

#discoBall {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff, #999 40%, #222 80%);
  animation: spin 6s linear infinite;
}

@keyframes spin {
  from { transform: rotateY(0deg) rotateX(20deg); }
  to { transform: rotateY(360deg) rotateX(20deg); }
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 10px;
}

input, button {
  font-family: "Sekuya";
}

/* =========================
   CRATE BLOCKS (TIGHTER LAYOUT)
========================= */

.artist-block {
  margin: 14px 0;
}

.artist-header {
  padding: 8px 40px;
  font-family: "Bebas Neue";
  font-size: 26px;
  display: flex;
  justify-content: space-between;
}

/* =========================
   DRAG PHYSICS CRATE ROW
========================= */

.group {
  display: flex;
  overflow-x: auto;
  gap: 14px;
  padding: 12px 40px;

  cursor: grab;
  scroll-behavior: smooth;
}

.group:active {
  cursor: grabbing;
}

/* hide scrollbar */
.group::-webkit-scrollbar {
  display: none;
}

/* =========================
   VINYL FLIP CARD
========================= */

.record-card {
  min-width: 200px;
  height: 260px;

  perspective: 1000px;
  position: relative;

  flex: 0 0 auto;
}

/* inner flip wrapper */
.record-inner {
  position: relative;
  width: 100%;
  height: 100%;

  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.record-card:hover .record-inner {
  transform: rotateY(180deg);
}

/* FRONT */
.record-front,
.record-back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;

  backface-visibility: hidden;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  border: 1px solid rgba(255,255,255,0.14);

  box-shadow:
    inset 0 2px 10px rgba(0,0,0,0.6),
    0 10px 30px rgba(0,0,0,0.5);

  background: linear-gradient(145deg, #1a1a1a, #141414);
}

/* BACK SIDE */
.record-back {
  transform: rotateY(180deg);
  font-family: "Space Grotesk";
  font-size: 13px;
  padding: 12px;
  text-align: center;
  opacity: 0.85;
}

/* COVER */
.cover {
  width: 70%;
  height: 140px;
  object-fit: cover;
  border-radius: 8px;
}

/* TITLE */
.record-title {
  font-family: "Playfair Display";
  font-size: 15px;
  margin-top: 10px;
}

/* =========================
   DJ CRATE MODE (AUTO HIGHLIGHT)
========================= */

.record-card.active {
  outline: 2px solid rgba(255,255,255,0.25);
  transform: scale(1.03);
}

/* =========================
   FOOTER
========================= */

.footer-status {
  font-family: "Space Grotesk";
  padding: 20px 40px;
  opacity: 0.6;
  text-align: right;
}

  </style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div id="discoWrap">
    <div id="discoBall"></div>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button onclick="toggleDJ()">DJ Mode</button>
  </div>
</header>

<div id="app"></div>
<div id="status" class="footer-status"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let djMode = false;
let djIndex = 0;
let djInterval = null;

async function load() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);

  document.getElementById("status").innerText =
    "Updated: " + new Date().toLocaleString();
}

load();

/* =========================
   RENDER
========================= */

function render(data) {

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item);
  });

  const artists = Object.keys(grouped);

  let html = "";

  artists.forEach(artist => {

    html += `
      <div class="artist-block">

        <div class="artist-header">
          <span>${artist}</span>
          <span>${grouped[artist].length}</span>
        </div>

        <div class="group">
    `;

    grouped[artist].forEach((item, i) => {

      html += `
        <div class="record-card ${djMode && i === 0 ? "active" : ""}">

          <div class="record-inner">

            <div class="record-front">

              ${item.cover ? `<img src="${item.cover}" class="cover">` : ""}

              <div class="record-title">${item.record}</div>

            </div>

            <div class="record-back">
              <div><b>${item.artist}</b></div>
              <br>
              <div>${item.record}</div>
            </div>

          </div>

        </div>
      `;
    });

    html += `</div></div>`;
  });

  document.getElementById("app").innerHTML = html;
}

/* =========================
   DRAG PHYSICS (INERTIA)
========================= */

document.addEventListener("mousedown", e => {
  const el = e.target.closest(".group");
  if (!el) return;

  let startX = e.pageX;
  let scrollLeft = el.scrollLeft;

  const move = (e2) => {
    el.scrollLeft = scrollLeft - (e2.pageX - startX);
  };

  const stop = () => {
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", stop);
  };

  document.addEventListener("mousemove", move);
  document.addEventListener("mouseup", stop);
});

/* =========================
   DJ MODE
========================= */

function toggleDJ() {
  djMode = !djMode;

  if (djMode) {
    djInterval = setInterval(() => {
      const cards = document.querySelectorAll(".record-card");

      cards.forEach(c => c.classList.remove("active"));

      const target = cards[djIndex % cards.length];
      if (target) target.classList.add("active");

      target?.scrollIntoView({
        behavior: "smooth",
        inline: "center"
      });

      djIndex++;
    }, 1800);
  } else {
    clearInterval(djInterval);
  }
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

</script>

</body>
</html>
