<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#110808">
<title>Sunday Crates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&family=DM+Sans:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">

<style>

/* ========================= VARS ========================= */
:root {
  --bg:        #110808;
  --bg-deep:   #0c0505;
  --bg-card:   #1a0c0c;
  --bg-inner:  #130909;
  --bg-artist: #221010;
  --bg-record: #1e0e0e;
  --tab:       #ffedf0;
  --red:       #a22a2a;
  --gold:      #daa520;
  --blush:     #ffedf0;
  --teal:      #318781;
  --text:      #ffedf0;
  --now-h:     64px;
  --safe-b:    env(safe-area-inset-bottom, 0px);
}

/* ========================= BASE ========================= */
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html { height: 100%; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Space Grotesk", sans-serif;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  padding-bottom: calc(var(--now-h) + var(--safe-b) + 8px);
  overscroll-behavior: none;
}

/* ========================= HEADER ========================= */

header {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 24px 12px;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 180px;
}

h1 {
  font-family: "Sekuya", sans-serif;
  font-size: 72px;
  margin: 0;
  color: var(--blush);
  position: relative;
  z-index: 1;
  text-align: center;
  letter-spacing: 2px;
}

/* ========================= DISCO BALL ========================= */

#discoBallWrapper {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 0;
  width: 500px;
  height: 180px;
  pointer-events: none;
  overflow: visible;
  z-index: 0;
}

#discoBallLight {
  width: 140px; height: 140px;
  position: absolute;
  top: 20px; left: 50%; margin-left: -70px;
  border-radius: 100%;
  background: white;
  opacity: 0.12;
  filter: blur(28px);
}

#discoBall {
  transform-style: preserve-3d;
  width: 130px; height: 130px;
  position: absolute;
  top: 20px; left: 50%; margin-left: -65px;
  animation: rotateDiscoBall 18s linear infinite;
}

#discoBallMiddle {
  height: 100%; width: 100%;
  border-radius: 100%;
  position: absolute;
  background: linear-gradient(to bottom, #111, #333);
  animation: rotateDiscoBallMiddle 18s linear infinite;
}

@keyframes rotateDiscoBall {
  0%   { transform: rotateX(90deg) rotateZ(0deg)   rotate(0deg); }
  100% { transform: rotateX(90deg) rotateZ(360deg) rotate(0deg); }
}
@keyframes rotateDiscoBallMiddle {
  0%   { transform: rotateX(90deg) rotateY(0deg)    rotate(0deg); }
  100% { transform: rotateX(90deg) rotateY(-360deg) rotate(0deg); }
}
@keyframes reflect {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

.square {
  transform-style: preserve-3d;
  position: absolute;
  top: 65px; left: 65px;
  width: 6px; height: 6px;
}

/* ========================= CONTROLS ========================= */

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  max-width: 1200px;
  margin: 0 auto 16px;
  padding: 0 24px;
  flex-wrap: wrap;
}

.controls-left {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  flex: 1;
  min-width: 0;
}

button {
  font-family: "Sekuya", sans-serif;
  background: #1e0f0f;
  color: var(--blush);
  border: 1px solid rgba(162,42,42,0.35);
  border-radius: 8px;
  padding: 6px 14px;
  height: 36px;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
}
button:hover  { background: #2e1515; }
button:active { background: #3a1a1a; transform: scale(0.97); }

#searchBar {
  width: 220px;
  flex-shrink: 0;
  padding: 8px 12px;
  background: #1e0f0f;
  border: 1px solid rgba(162,42,42,0.35);
  border-radius: 8px;
  color: var(--blush);
  font-family: "Space Grotesk", sans-serif;
  font-size: 16px; /* 16px prevents iOS zoom */
  outline: none;
  height: 36px;
  -webkit-appearance: none;
  appearance: none;
}
#searchBar::placeholder { color: rgba(255,237,240,0.35); }
#searchBar:focus { border-color: var(--teal); }

/* ========================= SORT PILLS ========================= */

.sort-pills { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.sort-label  { font-size: 13px; opacity: 0.5; color: var(--blush); }

.sort-btn {
  font-family: "Space Grotesk", sans-serif;
  font-size: 12px;
  font-weight: 500;
  background: #1e0f0f;
  color: rgba(255,237,240,0.6);
  border: 1px solid rgba(162,42,42,0.3);
  border-radius: 20px;
  padding: 4px 12px;
  height: 30px;
  cursor: pointer;
  transition: all 0.15s;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
}
.sort-btn.active            { background: var(--blush); color: #110808; border-color: var(--blush); }
.sort-btn:hover:not(.active){ background: #2e1515; }

/* ========================= GRID ========================= */

#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

#app {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  padding: 18px;
  border-radius: 14px;
  background-color: var(--bg-deep);
  background-image:
    repeating-linear-gradient(45deg,  rgba(162,42,42,0.18) 0, rgba(162,42,42,0.18) 1.5px, transparent 0, transparent 50%),
    repeating-linear-gradient(-45deg, rgba(162,42,42,0.18) 0, rgba(162,42,42,0.18) 1.5px, transparent 0, transparent 50%);
  background-size: 10px 10px;
}

#app.genre-layout {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 14px;
}

/* ========================= FOCUS MODE ========================= */

#app.focus-mode .letter-block,
#app.focus-mode .bottom-crate,
#app.focus-mode .random-dig-block,
#app.focus-mode .genre-block {
  opacity: 0.28;
  filter: saturate(0.7) contrast(0.9);
  transform: scale(0.985);
}
#app.focus-mode .letter-block.active,
#app.focus-mode .bottom-crate.active,
#app.focus-mode .genre-block.active {
  opacity: 1; transform: scale(1.01) translateY(-2px);
  box-shadow: 0 22px 60px rgba(0,0,0,0.9); filter: none;
}
#app.focus-mode .random-dig-block { animation-play-state: paused; }

/* ========================= LETTER CRATES ========================= */

.letter-block {
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid rgba(162,42,42,0.15);
  overflow: hidden;
  transition: all 0.25s ease;
}

.letter-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  background: var(--tab);
  cursor: pointer;
  min-height: 60px;
  user-select: none;
  -webkit-user-select: none;
}
.letter-header span:first-child {
  font-family: "Sekuya", sans-serif;
  font-size: 36px;
  font-weight: bold;
  line-height: 1;
  color: var(--red);
}
.letter-header span:last-child {
  font-size: 16px;
  font-family: "Space Grotesk", sans-serif;
  text-align: right;
  line-height: 1.4;
  color: var(--teal);
}

.letter-group {
  display: none;
  flex-direction: column;
  max-height: 55vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 14px;
  background: var(--bg-inner);
  gap: 14px;
}
.letter-block.active .letter-group { display: flex; }

/* ========================= SUB-GENRE ========================= */

.subgenre-section {
  margin-bottom: 4px;
}

.subgenre-label {
  font-family: "Bebas Neue", sans-serif;
  font-size: 13px;
  letter-spacing: 1.5px;
  color: var(--teal);
  opacity: 0.8;
  margin-bottom: 8px;
  padding: 0 2px;
  border-bottom: 1px solid rgba(49,135,129,0.2);
  padding-bottom: 4px;
}

/* ========================= GENRE CRATES ========================= */

.genre-block {
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid rgba(162,42,42,0.15);
  overflow: hidden;
  transition: all 0.25s ease;
  flex: 0 0 auto;
}

.genre-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 14px 18px;
  background: var(--tab);
  cursor: pointer;
  min-height: 60px;
  white-space: nowrap;
  user-select: none;
  -webkit-user-select: none;
}
.genre-header .genre-name {
  font-family: "Sekuya", sans-serif;
  font-size: 30px;
  font-weight: bold;
  line-height: 1;
  color: var(--red);
}
.genre-header .genre-count {
  font-size: 14px;
  font-family: "Space Grotesk", sans-serif;
  text-align: right;
  line-height: 1.4;
  color: var(--teal);
  flex-shrink: 0;
}
.genre-block .letter-group { display: none; }
.genre-block.active .letter-group { display: flex; }

/* ========================= BOTTOM CRATES ========================= */

.bottom-crate {
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid rgba(162,42,42,0.15);
  overflow: hidden;
  transition: all 0.25s ease;
}
.bottom-crate.span-2 { grid-column: span 2; }

.bottom-crate-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;
  background: var(--tab);
  cursor: pointer;
  height: 88px;
  gap: 8px;
  user-select: none;
  -webkit-user-select: none;
}
.bottom-crate-header .crate-label {
  font-family: "Sekuya", sans-serif;
  font-size: 36px;
  font-weight: bold;
  line-height: 1.1;
  color: var(--red);
  flex-shrink: 0;
}
.bottom-crate-header .crate-count {
  font-family: "Space Grotesk", sans-serif;
  font-size: 15px;
  color: var(--teal);
  text-align: right;
  line-height: 1.5;
}
.bottom-crate .letter-group { display: none; }
.bottom-crate.active .letter-group { display: flex; }

/* ========================= RANDOM DIG ========================= */

@keyframes digInvite {
  0%,55%,100% { transform: scale(1)    rotate(0deg);    }
  57%         { transform: scale(1.03) rotate(-1.5deg); }
  59%         { transform: scale(1.04) rotate(1.5deg);  }
  61%         { transform: scale(1.04) rotate(-1deg);   }
  63%         { transform: scale(1.03) rotate(0.8deg);  }
  65%         { transform: scale(1.02) rotate(0deg);    }
  69%         { transform: scale(1)    rotate(0deg);    }
}

.random-dig-block {
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid rgba(162,42,42,0.15);
  overflow: hidden;
  cursor: pointer;
  animation: digInvite 4s ease-in-out infinite;
  transform-origin: center;
  transition: filter 0.2s ease;
  touch-action: manipulation;
}
.random-dig-block:hover { filter: brightness(1.15); }

.random-dig-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 16px;
  background: var(--tab);
  height: 88px;
  gap: 6px;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
.random-dig-title {
  font-family: "Sekuya", sans-serif;
  font-size: 30px;
  font-weight: bold;
  line-height: 1.1;
  color: var(--red);
  flex-shrink: 0;
}
.random-dig-count {
  font-family: "Space Grotesk", sans-serif;
  font-size: 13px;
  color: var(--teal);
  text-align: right;
  line-height: 1.6;
  overflow: hidden;
}

/* ========================= ARTISTS / RECORDS ========================= */

.artist-section { background: var(--bg-artist); padding: 12px; border-radius: 10px; }
.artist-name {
  font-size: 16px;
  text-transform: uppercase;
  opacity: 0.85;
  margin-bottom: 10px;
  color: var(--gold);
}

.record-card {
  background: var(--bg-record);
  border-radius: 10px;
  padding: 8px;
  margin-bottom: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  transition: transform 0.15s, filter 0.15s;
  touch-action: manipulation;
}
.record-card:hover  { transform: scale(1.03); filter: brightness(1.1); }
.record-card:active { transform: scale(0.97); }

.record-card img {
  width: 100%; max-width: 90px;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 6px;
  margin-bottom: 6px;
}
.record-title {
  font-family: "DM Sans", sans-serif;
  font-size: 12px;
  text-align: center;
  line-height: 1.3;
  word-break: break-word;
  color: var(--blush);
}

/* ========================= DETAIL MODAL ========================= */

#detailModal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 10001;
}
#detailOverlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.88);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
}
#detailBox {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: min(580px, 93vw);
  background: #140909;
  border-radius: 16px;
  border: 1px solid rgba(162,42,42,0.3);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-height: 90vh;
  max-height: 90dvh;
}
.detail-cover-wrap {
  width: 100%;
  max-height: 260px;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
}
.detail-cover-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.detail-cover-placeholder {
  width: 100%; height: 180px;
  background: var(--bg-artist);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Bebas Neue", sans-serif;
  font-size: 20px;
  color: rgba(255,237,240,0.18);
  letter-spacing: 2px;
}
.detail-close {
  position: absolute;
  top: 12px; right: 12px;
  width: 34px; height: 34px;
  min-width: 44px; min-height: 44px;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  color: var(--blush);
  z-index: 2;
  touch-action: manipulation;
}
.detail-body {
  padding: 22px 24px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex: 1;
}
.detail-artist {
  font-family: "Bebas Neue", sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  color: var(--teal);
  margin-bottom: 4px;
}
.detail-title {
  font-family: "Sekuya", sans-serif;
  font-size: 26px;
  color: var(--blush);
  margin-bottom: 14px;
  line-height: 1.2;
}
.detail-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}
.detail-chip {
  background: var(--bg-artist);
  border: 1px solid rgba(162,42,42,0.2);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  font-family: "Space Grotesk", sans-serif;
  color: var(--gold);
  display: flex;
  align-items: center;
  gap: 6px;
}
.detail-chip span { color: rgba(255,237,240,0.4); font-size: 11px; }

.detail-fav {
  font-family: "DM Sans", sans-serif;
  font-size: 14px;
  color: var(--gold);
  font-style: italic;
  background: var(--bg-artist);
  border-left: 3px solid var(--gold);
  padding: 10px 14px;
  border-radius: 0 8px 8px 0;
  margin-bottom: 14px;
}
.detail-fav-label {
  font-size: 10px;
  font-style: normal;
  letter-spacing: 1px;
  color: rgba(218,165,32,0.6);
  display: block;
  margin-bottom: 4px;
  font-family: "Space Grotesk", sans-serif;
}

.detail-notes {
  font-family: "DM Sans", sans-serif;
  font-size: 13px;
  line-height: 1.7;
  color: rgba(255,237,240,0.65);
  border-top: 1px solid rgba(162,42,42,0.15);
  padding-top: 14px;
  margin-top: 4px;
}

.detail-links {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.detail-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 16px;
  border-radius: 8px;
  font-family: "Space Grotesk", sans-serif;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  transition: filter 0.15s, transform 0.1s;
  touch-action: manipulation;
}
.detail-link:active { transform: scale(0.96); }
.detail-link.spotify {
  background: #1DB954;
  color: #000;
}
.detail-link.apple {
  background: #fc3c44;
  color: #fff;
}
.detail-link:hover { filter: brightness(1.1); }
.detail-link svg { width: 18px; height: 18px; flex-shrink: 0; }

/* ========================= SPIN MODAL ========================= */

#spinModal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
}
#spinOverlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.82);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
}
#spinBox {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: min(700px, 96vw);
  background: #140909;
  border-radius: 14px;
  padding: clamp(18px,4vw,40px);
  text-align: center;
  border: 1px solid rgba(162,42,42,0.25);
  max-height: 95vh;
  max-height: 95dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#spinTitle {
  font-family: "Bebas Neue", sans-serif;
  font-size: 28px;
  margin-bottom: 18px;
  color: var(--blush);
  letter-spacing: 2px;
}
#spinContent { display: flex; flex-direction: column; align-items: center; }

/* ========================= CAROUSEL ========================= */

.carousel-container {
  width: min(516px, 88vw);
  height: clamp(170px, 32vw, 280px);
  overflow: hidden;
  border-radius: 10px;
  border: 1px solid rgba(162,42,42,0.2);
  background: #0c0505;
  margin-bottom: 20px;
  position: relative;
}
.carousel-container::after {
  content: '';
  position: absolute;
  left: calc(50% - 80px);
  top: 10px; bottom: 10px;
  width: 160px;
  border: 1px solid rgba(218,165,32,0.3);
  border-radius: 10px;
  pointer-events: none;
  z-index: 2;
}
.carousel {
  display: flex;
  gap: 12px;
  position: absolute;
  top: 0; bottom: 0; left: 0;
  align-items: center;
  padding-left: 6px;
}
.carousel-item {
  flex-shrink: 0;
  width: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0.3;
  transition: opacity 0.05s, transform 0.05s;
}
.carousel-item.active { opacity: 1; transform: scale(1.05); }
.carousel-cover {
  width: 110px; height: 110px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 8px;
  display: block;
  flex-shrink: 0;
}
.carousel-text {
  font-size: 11px;
  text-align: center;
  opacity: 0.85;
  line-height: 1.3;
  width: 150px;
  color: var(--blush);
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

/* ========================= RESULT ========================= */

.result-text   { font-family:"DM Sans",sans-serif; font-size:14px; margin-bottom:6px; opacity:0.9; }
.result-artist { font-family:"Bebas Neue",sans-serif; font-size:24px; margin-bottom:4px; color:var(--gold); }
.result-record { font-family:"Bebas Neue",sans-serif; font-size:20px; opacity:0.8; margin-bottom:20px; }

.spin-result { opacity:0; animation:fadeIn 0.6s ease-out forwards; width:100%; }
@keyframes fadeIn {
  0%   { opacity:0; transform:scale(0.9); }
  100% { opacity:1; transform:scale(1); }
}
.result-cover {
  width: clamp(110px,22vw,170px);
  height: clamp(110px,22vw,170px);
  object-fit: cover;
  border-radius: 10px;
  margin: 0 auto 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  display: block;
}

.dig-again-btn {
  font-family: "DM Sans", sans-serif;
  font-size: 16px;
  font-style: italic;
  font-weight: 600;
  background: var(--red);
  color: var(--blush);
  border: none;
  border-radius: 8px;
  padding: 11px 32px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  touch-action: manipulation;
  display: block;
  margin: 0 auto;
  -webkit-appearance: none;
  appearance: none;
}

</style>
</head>
<body>

<header>
  <h1>Sunday Crates</h1>
  <div id="discoBallWrapper">
    <div id="discoBallLight"></div>

<div class="controls">

    <div class="sort-pills">

      <button class="sort-btn"        data-sort="artists" onclick="setSort('artists')">Artist #</button>

<!-- DETAIL MODAL -->

<!-- NOW PLAYING BAR -->
<div id="nowPlayingBar">
  <img id="nowCover" src="" alt="">

  <div class="now-info-btn" id="nowInfoBtn" title="View info">ℹ</div>
</div>

<script>

/* ========================= DISCO BALL ========================= */
(function(){
  var radius = 65, sq = 6.5, prec = 19.55, fuzzy = 0.001;
  var inc  = (Math.PI - fuzzy) / prec;
  var ball = document.getElementById("discoBall");
  for (var t = fuzzy; t < Math.PI; t += inc) {
    var z  = radius * Math.cos(t);
    var cr = Math.abs((radius*Math.cos(0)*Math.sin(t))-(radius*Math.cos(Math.PI)*Math.sin(t)))/2.5;
    var n  = Math.floor(Math.abs(2*Math.PI*cr)/sq);
    if (n < 1) continue;
    var ai = (Math.PI*2-fuzzy)/n;
    for (var i = ai/2+fuzzy; i < Math.PI*2; i += ai){
      var s = document.createElement("div");
      var st = document.createElement("div");
      var c = (t>1.3&&t<1.9)?rn(130,255):rn(110,190);
      st.style.cssText=`width:${sq}px;height:${sq}px;transform-origin:0 0 0;transform:rotate(${i}rad) rotateY(${t}rad);background:rgb(${c},${c},${c});animation:reflect 2s linear ${rn(0,20)/10}s infinite;backface-visibility:hidden;-webkit-backface-visibility:hidden;`;
      s.appendChild(st); s.className="square";
      var x=radius*Math.cos(i)*Math.sin(t), y=radius*Math.sin(i)*Math.sin(t);
      s.style.transform=`translateX(${x}px) translateY(${y}px) translateZ(${z}px)`;
      ball.appendChild(s);
    }
  }
  function rn(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
})();

/* ========================= DATA ========================= */

const SHEET_URL="https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData=[], filteredData=[], sortMode='az', lastDig=null;

async function load(){
  try {
    const res  = await fetch(SHEET_URL);
    if (!res.ok) throw new Error();
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf("{"),text.lastIndexOf("}")+1));
    allData = (json.table.rows||[]).map(r=>({
      artist:   r.c?.[1]?.v || "",
      record:   r.c?.[2]?.v || "",
      cover:    r.c?.[3]?.v || null,
      genre:    r.c?.[4]?.v || null,
      subgenre: r.c?.[5]?.v || null,
      year:     r.c?.[6]?.v || null,
      label:    r.c?.[7]?.v || null,
      notes:    r.c?.[8]?.v || null,
      favSong:  r.c?.[9]?.v || null,
      spotify:  r.c?.[10]?.v || null,
      apple:    r.c?.[11]?.v || null
    })).filter(x=>x.artist&&x.record);
    filteredData=[...allData];
    render(filteredData);
  } catch(e){
    document.getElementById("app").innerHTML='<div class="error-message">Could not load your crates.</div>';
  }
}
load();

document.getElementById("searchBar").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();
  filteredData=q.length===0?[...allData]
    :allData.filter(i=>i.artist.toLowerCase().includes(q)||i.record.toLowerCase().includes(q));
  render(filteredData);
});

function setSort(mode){
  sortMode=mode;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b.dataset.sort===mode));
  render(filteredData);
}

/* ========================= TOGGLE ========================= */

function toggle(el){
  const block=el.closest(".letter-block,.bottom-crate,.genre-block");
  if(!block)return;
  block.classList.toggle("active");
  syncFocus();
}

function syncFocus(){
  const anyOpen=document.querySelector(".letter-block.active,.bottom-crate.active,.genre-block.active");
  document.getElementById("app").classList.toggle("focus-mode",!!anyOpen);
}

function toggleAll(){
  const all=document.querySelectorAll(".letter-block,.bottom-crate,.genre-block");
  const any=document.querySelector(".letter-block.active,.bottom-crate.active,.genre-block.active");
  all.forEach(b=>any?b.classList.remove("active"):b.classList.add("active"));
  syncFocus();
}

/* ========================= DETAIL MODAL ========================= */

function openDetail(encoded){
  const r=JSON.parse(decodeURIComponent(encoded));

  // cover
  const cw=document.getElementById("detailCover");
  cw.innerHTML=r.cover
    ?`<img src="${r.cover}" alt="${r.record}">`
    :`<div class="detail-cover-placeholder">NO COVER</div>`;

  document.getElementById("detailArtist").textContent=r.artist;
  document.getElementById("detailTitle").textContent=r.record;

  // chips
  const chips=[];
  if(r.year)     chips.push(`<div class="detail-chip"><span>Year</span>${r.year}</div>`);
  if(r.label)    chips.push(`<div class="detail-chip"><span>Label</span>${r.label}</div>`);
  if(r.genre)    chips.push(`<div class="detail-chip"><span>Genre</span>${r.genre}</div>`);
  if(r.subgenre) chips.push(`<div class="detail-chip"><span>Sub-genre</span>${r.subgenre}</div>`);
  document.getElementById("detailMeta").innerHTML=chips.join("");

  // fav song
  const favEl=document.getElementById("detailFav");
  if(r.favSong){
    favEl.innerHTML=`<div class="detail-fav"><span class="detail-fav-label">FAVORITE TRACK</span>${r.favSong}</div>`;
  } else { favEl.innerHTML=""; }

  // notes
  const notesEl=document.getElementById("detailNotes");
  notesEl.textContent=r.notes||"";
  notesEl.style.display=r.notes?"block":"none";

  // streaming links
  const linksEl=document.getElementById("detailLinks");
  const links=[];
  if(r.spotify) links.push(`<a class="detail-link spotify" href="${r.spotify}" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
    <span>Spotify</span></a>`);
  if(r.apple) links.push(`<a class="detail-link apple" href="${r.apple}" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.994 9.15a6.654 6.654 0 00-3.76-5.404 6.882 6.882 0 00-4.86-.521 6.57 6.57 0 00-3.578 2.131A6.57 6.57 0 008.22 3.225a6.882 6.882 0 00-4.86.521A6.654 6.654 0 00-.006 9.15c-.131 3.141 1.64 7.47 4.86 10.109a11.69 11.69 0 003.36 2.25c.78.33 1.5.49 2.1.49.6 0 1.32-.16 2.1-.49a11.69 11.69 0 003.36-2.25c3.22-2.64 4.99-6.97 4.86-10.109h-.64z"/></svg>
    <span>Apple Music</span></a>`);
  linksEl.innerHTML=links.join("");

  document.getElementById("detailModal").style.display="block";
}

function closeDetail(){
  document.getElementById("detailModal").style.display="none";
}

document.getElementById("detailOverlay").addEventListener("click",closeDetail);
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    closeDetail();
    document.getElementById("spinModal").style.display="none";
  }
});

/* ========================= NOW PLAYING ========================= */

function updateNowPlaying(r){
  lastDig=r;
  const bar=document.getElementById("nowPlayingBar");
  const cover=document.getElementById("nowCover");
  const ph=document.getElementById("nowCoverPlaceholder");

  document.getElementById("nowTitle").textContent=r.record;
  document.getElementById("nowArtist").textContent=r.artist;

  if(r.cover){ cover.src=r.cover; cover.classList.add("visible"); ph.style.display="none"; }
  else { cover.classList.remove("visible"); ph.style.display="flex"; }

  const acts=[];
  if(r.spotify) acts.push(`<a class="now-action-btn spotify-btn" href="${r.spotify}" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
    <span>Spotify</span></a>`);
  if(r.apple) acts.push(`<a class="now-action-btn apple-btn" href="${r.apple}" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.994 9.15a6.654 6.654 0 00-3.76-5.404 6.882 6.882 0 00-4.86-.521 6.57 6.57 0 00-3.578 2.131A6.57 6.57 0 008.22 3.225a6.882 6.882 0 00-4.86.521A6.654 6.654 0 00-.006 9.15c-.131 3.141 1.64 7.47 4.86 10.109a11.69 11.69 0 003.36 2.25c.78.33 1.5.49 2.1.49.6 0 1.32-.16 2.1-.49a11.69 11.69 0 003.36-2.25c3.22-2.64 4.99-6.97 4.86-10.109h-.64z"/></svg>
    <span>Apple Music</span></a>`);
  document.getElementById("nowActions").innerHTML=acts.join("");

  bar.classList.add("visible");

  document.getElementById("nowInfoBtn").onclick=()=>{
    if(lastDig) openDetail(encodeURIComponent(JSON.stringify(lastDig)));
  };
}

/* ========================= RENDER HELPERS ========================= */

function encode(r){
  return encodeURIComponent(JSON.stringify({
    artist:r.artist,record:r.record,cover:r.cover,
    genre:r.genre,subgenre:r.subgenre,year:r.year,label:r.label,
    notes:r.notes,favSong:r.favSong,spotify:r.spotify,apple:r.apple
  }));
}

function recordsHTML(group){
  let h="";
  Object.keys(group).sort().forEach(artist=>{
    h+=`<div class="artist-section"><div class="artist-name">${artist}</div>`;
    group[artist].forEach(r=>{
      h+=`<div class="record-card" onclick="openDetail('${encode(r)}')">
        ${r.cover?`<img src="${r.cover}" loading="lazy">`:""}
        <div class="record-title">${r.record}</div>
      </div>`;
    });
    h+=`</div>`;
  });
  return h;
}

/* Genre content: grouped by sub-genre if available */
function genreContentHTML(group){
  // separate items with subgenre vs without
  const subs={}, noSub={};
  Object.keys(group).sort().forEach(artist=>{
    group[artist].forEach(r=>{
      const sg=r.subgenre||null;
      if(sg){
        if(!subs[sg]) subs[sg]={};
        if(!subs[sg][artist]) subs[sg][artist]=[];
        subs[sg][artist].push(r);
      } else {
        if(!noSub[artist]) noSub[artist]=[];
        noSub[artist].push(r);
      }
    });
  });

  let h="";
  // sub-genres first
  Object.keys(subs).sort().forEach(sg=>{
    h+=`<div class="subgenre-section">
      <div class="subgenre-label">${sg}</div>
      ${recordsHTML(subs[sg])}
    </div>`;
  });
  // ungrouped
  if(Object.keys(noSub).length>0) h+=recordsHTML(noSub);
  return h;
}

function buildLetterCrate(title,group){
  if(!group||Object.keys(group).length===0)return"";
  const tot=Object.values(group).reduce((s,r)=>s+r.length,0);
  const art=Object.keys(group).length;
  return `<div class="letter-block">
    <div class="letter-header">
      <span>${title}</span>
      <span>${tot} ${tot===1?'Title':'Titles'}<br>${art} ${art===1?'Artist':'Artists'}</span>
    </div>
    <div class="letter-group">${recordsHTML(group)}</div>
  </div>`;
}

function buildBottomCrate(title,group,spanClass=''){
  if(!group||Object.keys(group).length===0)return"";
  const tot=Object.values(group).reduce((s,r)=>s+r.length,0);
  const art=Object.keys(group).length;
  const cnt=title==='Various'
    ?`${tot} ${tot===1?'Title':'Titles'}`
    :`${tot} ${tot===1?'Title':'Titles'}<br>${art} ${art===1?'Artist':'Artists'}`;
  return `<div class="bottom-crate ${spanClass}">
    <div class="bottom-crate-header">
      <div class="crate-label">${title}</div>
      <div class="crate-count">${cnt}</div>
    </div>
    <div class="letter-group">${recordsHTML(group)}</div>
  </div>`;
}

function buildGenreCrate(genre,group){
  if(!group||Object.keys(group).length===0)return"";
  const tot=Object.values(group).reduce((s,r)=>s+r.length,0);
  const art=Object.keys(group).length;
  const minW=Math.max(180,genre.length*18+140);
  return `<div class="genre-block" style="min-width:${minW}px;">
    <div class="genre-header">
      <div class="genre-name">${genre}</div>
      <div class="genre-count">${tot} ${tot===1?'Title':'Titles'}<br>${art} ${art===1?'Artist':'Artists'}</div>
    </div>
    <div class="letter-group">${genreContentHTML(group)}</div>
  </div>`;
}

/* ========================= RENDER ========================= */

function render(data){
  const alpha={},various=[],numeric={};
  const app=document.getElementById("app");

  data.forEach(item=>{
    if(item.artist==="Various"){various.push(item);return;}
    if(/^[0-9]/.test(item.artist)){
      if(!numeric["#"])numeric["#"]={};
      if(!numeric["#"][item.artist])numeric["#"][item.artist]=[];
      numeric["#"][item.artist].push(item);return;
    }
    const l=item.artist[0].toUpperCase();
    if(!alpha[l])alpha[l]={};
    if(!alpha[l][item.artist])alpha[l][item.artist]=[];
    alpha[l][item.artist].push(item);
  });

  let html="";

  if(sortMode==='genre'){
    app.classList.add("genre-layout");
    app.classList.remove("focus-mode");
    const genres={};
    data.forEach(item=>{
      if(!item.genre||item.artist==="Various"||/^[0-9]/.test(item.artist))return;
      if(!genres[item.genre])genres[item.genre]={};
      if(!genres[item.genre][item.artist])genres[item.genre][item.artist]=[];
      genres[item.genre][item.artist].push(item);
    });
    Object.keys(genres).sort().forEach(g=>{html+=buildGenreCrate(g,genres[g]);});
    if(!html)html=`<div class="error-message">No genre data found. Add genres in column E of your spreadsheet.</div>`;
    app.innerHTML=html;
    attachListeners();
    return;
  }

  app.classList.remove("genre-layout");

  if(sortMode==='az'){
    Object.keys(alpha).sort().forEach(l=>{html+=buildLetterCrate(l,alpha[l]);});
  } else if(sortMode==='titles'){
    Object.keys(alpha)
      .map(l=>({l,tot:Object.values(alpha[l]).reduce((s,r)=>s+r.length,0)}))
      .sort((a,b)=>b.tot-a.tot)
      .forEach(({l})=>{html+=buildLetterCrate(l,alpha[l]);});
  } else if(sortMode==='artists'){
    Object.keys(alpha)
      .map(l=>({l,cnt:Object.keys(alpha[l]).length}))
      .sort((a,b)=>b.cnt-a.cnt)
      .forEach(({l})=>{html+=buildLetterCrate(l,alpha[l]);});
  }

  html+=buildBottomCrate("#",numeric["#"]||{});
  html+=buildBottomCrate("Various",{"Various":various},"span-2");

  const tt=data.length, ua=new Set(data.map(r=>r.artist)).size;
  html+=`<div class="random-dig-block" onclick="randomRecord()">
    <div class="random-dig-header">
      <div class="random-dig-title">Random<br>Dig</div>
      <div class="random-dig-count">${tt} ${tt===1?'Title':'Titles'}<br>${ua} ${ua===1?'Artist':'Artists'}</div>
    </div>
  </div>`;

  app.innerHTML=html;
  attachListeners();
}

function attachListeners(){
  document.querySelectorAll(".letter-header,.bottom-crate-header,.genre-header").forEach(h=>
    h.addEventListener("click",()=>toggle(h))
  );
  document.querySelectorAll(".letter-group").forEach(g=>
    g.addEventListener("click",e=>e.stopPropagation())
  );
}

/* ========================= SPIN ========================= */

function randomRecord(){
  const modal=document.getElementById("spinModal");
  const carousel=document.getElementById("carousel");
  const result=document.getElementById("resultDisplay");

  modal.style.display="block";
  carousel.innerHTML="";
  result.innerHTML="";

  const src=filteredData.length>0?filteredData:allData;
  const winner=src[Math.floor(Math.random()*src.length)];

  const seq=[];
  for(let i=0;i<50;i++) seq.push(src[Math.floor(Math.random()*src.length)]);
  seq.push(winner);
  seq.push(src[Math.floor(Math.random()*src.length)]);

  seq.forEach(r=>{
    const el=document.createElement("div");
    el.className="carousel-item";
    el.innerHTML=`${r.cover
      ?`<img src="${r.cover}" class="carousel-cover">`
      :`<div style="width:110px;height:110px;background:#221010;border-radius:8px;margin-bottom:8px;flex-shrink:0;"></div>`}
      <div class="carousel-text">${r.artist} — ${r.record}</div>`;
    carousel.appendChild(el);
  });

  const items=Array.from(carousel.querySelectorAll(".carousel-item"));
  const WIN_IDX=50, duration=3760, startTime=performance.now();
  function ease(t){return 1-Math.pow(1-t,3);}

  function animate(now){
    const p=Math.min((now-startTime)/duration,1);
    const cur=Math.round(ease(p)*WIN_IDX);
    items.forEach((it,i)=>it.classList.toggle("active",i===cur));
    carousel.style.transform=`translateX(${-Math.max(0,(cur-1)*172)}px)`;
    if(p<1){ requestAnimationFrame(animate); return; }

    updateNowPlaying(winner);
    result.innerHTML=`<div class="spin-result">
      ${winner.cover?`<img src="${winner.cover}" class="result-cover">`:""}
      <div class="result-text">You found:</div>
      <div class="result-artist">${winner.artist}</div>
      <div class="result-record">${winner.record}</div>
      <button class="dig-again-btn" onclick="randomRecord()">Dig Again</button>
    </div>`;
  }

  requestAnimationFrame(animate);
  document.getElementById("spinOverlay").onclick=()=>modal.style.display="none";
}

</script>
