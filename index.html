<!DOCTYPE html>
<html>
<head>

<title>Sunday Crates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&family=DM+Sans:wght@300..700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #0e0b0c;
  color: #e4e1da;
  font-family: "Space Grotesk";
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 10px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 10px;
  padding: 0 40px;
  margin-bottom: 20px;
}

button {
  font-family: "Sekuya";
  background: #1a1617;
  color: #e4e1da;

  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;

  padding: 6px 14px;
  height: 34px;

  cursor: pointer;
}

/* GRID (BACK TO SIMPLE, NO HORIZONTAL WALL) */
#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  align-items: start;
}

/* CRATE */
.letter-block {
  background: #161314;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.04);
  overflow: hidden;

  display: flex;
  flex-direction: column;
}

/* HEADER */
.letter-header {
  display: flex;
  justify-content: space-between;

  padding: 14px 16px;

  font-family: "Bebas Neue";
  font-size: 22px;

  background: #e2ddd2;
  color: #181515;

  cursor: pointer;
}

/* DROPDOWN */
.letter-group {
  display: none;
  flex-direction: column;

  max-height: 520px;
  overflow-y: auto;

  padding: 14px;
  background: #120f10;

  gap: 14px;
}

.letter-block.active .letter-group {
  display: flex;
}

/* ARTISTS */
.artist-section {
  background: #1a1617;
  padding: 12px;
  border-radius: 10px;
}

.artist-name {
  font-size: 16px;
  text-transform: uppercase;
  opacity: 0.75;
  margin-bottom: 10px;
}

/* RECORDS */
.record-card {
  background: #1f1b1c;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;

  display: flex;
  flex-direction: column;
  align-items: center;
}

.cover {
  width: 100%;
  max-width: 180px;
  height: 140px;
  object-fit: contain;
}

.record-title {
  font-family: "DM Sans";
  font-size: 14px;
  margin-top: 6px;
  text-align: center;
}

</style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>
</header>

<div class="controls">
  <button onclick="toggleAll()">Expand All</button>
  <button onclick="randomRecord()">Random Dig</button>
</div>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

/* LOAD */
async function load(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);
}

load();

/* =========================
   FIXED TOGGLE (IMPORTANT)
========================= */

function toggle(el){
  const block = el.closest(".letter-block");
  block.classList.toggle("active");
}

/* RENDER */
function render(data){

  const alpha = {};
  const various = [];
  const numeric = {};

  data.forEach(item => {

    if (item.artist === "Various") {
      various.push(item);
      return;
    }

    if (/^[0-9]/.test(item.artist)) {
      if (!numeric["#"]) numeric["#"] = {};
      if (!numeric["#"][item.artist]) numeric["#"][item.artist] = [];
      numeric["#"][item.artist].push(item);
      return;
    }

    const letter = item.artist[0].toUpperCase();
    if (!alpha[letter]) alpha[letter] = {};
    if (!alpha[letter][item.artist]) alpha[letter][item.artist] = [];
    alpha[letter][item.artist].push(item);
  });

  let html = "";

  function buildCrate(title, group){

    if (!group || Object.keys(group).length === 0) return;

    html += `
      <div class="letter-block">
        <div class="letter-header" onclick="toggle(this)">
          <span>${title}</span>
          <span>${Object.keys(group).length}</span>
        </div>
        <div class="letter-group">
    `;

    Object.keys(group).sort().forEach(artist => {

      html += `
        <div class="artist-section">
          <div class="artist-name">${artist}</div>
      `;

      group[artist].forEach(r => {
        html += `
          <div class="record-card">
            ${r.cover ? `<img src="${r.cover}" class="cover">` : ""}
            <div class="record-title">${r.record}</div>
          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  }

  Object.keys(alpha).sort().forEach(l => buildCrate(l, alpha[l]));
  buildCrate("Various", { "Various": various });
  buildCrate("#", numeric["#"] || {});

  document.getElementById("app").innerHTML = html;
}

/* ACTIONS */
function toggleAll(){
  document.querySelectorAll(".letter-block")
    .forEach(b => b.classList.toggle("active"));
}

function randomRecord(){
  const pick = allData[Math.floor(Math.random() * allData.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
