<!DOCTYPE html>
<html>
<head>

<title>Sunday Crates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #0f0507;
  color: #d8d9d3;
  font-family: "Space Grotesk";
  overflow-x: hidden;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 6px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

/* =========================
   FIXED CONTROLS (AS REQUESTED)
========================= */

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
}

input {
  font-family: "Bebas Neue";
  background: white;
  color: #0f0507;
  border: 1px solid #ccc;

  padding: 6px 10px;
  border-radius: 6px;

  font-size: 14px;
  height: 32px;
  box-sizing: border-box;
}

button {
  font-family: "Sekuya";
  background: #233d4d;
  color: #d8d9d3;

  border: 1px solid rgba(216,217,211,0.25);

  padding: 6px 10px;
  font-size: 13px;

  cursor: pointer;
  height: 32px;
  display: flex;
  align-items: center;
}

/* WRAPPER */
#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

/* GRID */
#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* =========================
   LETTER CRATES (UNCHANGED STRUCTURE)
========================= */

.artist-block {
  position: relative;
}

.artist-header {
  position: relative;

  padding: 10px 16px;

  font-family: "Bebas Neue";
  font-size: 22px;

  display: inline-block;

  background: #d8d9d3;
  color: #0f0507;

  border-radius: 6px 6px 0 0;
  cursor: pointer;

  border: 1px solid rgba(0,0,0,0.15);
}

.artist-header::after {
  content: "";
  position: absolute;
  left: 6px;
  right: 6px;
  bottom: -6px;
  height: 6px;
  background: rgba(0,0,0,0.15);
  border-radius: 0 0 4px 4px;
}

/* GROUP */
.group {
  display: none;

  padding: 16px;

  background: rgba(0,0,0,0.25);
  border-top: 1px solid rgba(0,0,0,0.4);

  box-shadow: inset 0 10px 20px rgba(0,0,0,0.4);

  flex-direction: column;
  gap: 12px;
}

.artist-block.active .group {
  display: flex;
}

/* RECORD CARD */
.record-card {
  background: rgba(35, 61, 77, 0.18);
  border: 1px solid rgba(216,217,211,0.15);
  border-radius: 10px;

  padding: 12px;

  display: flex;
  flex-direction: column;
  align-items: center;

  width: 100%;
  box-sizing: border-box;
}

/* COVER */
.cover {
  width: 100%;
  max-width: 240px;
  height: 180px;
  object-fit: contain;
  border-radius: 8px;
}

/* =========================
   FIX: TITLE WRAPPING ONLY
========================= */

.record-title {
  font-family: "Playfair Display";
  font-size: 18px;
  text-align: center;
  margin-top: 10px;

  width: 100%;

  white-space: normal;
  overflow-wrap: break-word;
  word-break: break-word;
}

/* =========================
   RANDOM DIG MODAL (RESTORED)
========================= */

#dig {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;

  background: rgba(0,0,0,0.75);
  z-index: 9999;
}

.dig-card {
  background: #111;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px;

  padding: 18px;

  display: flex;
  gap: 18px;
  align-items: center;

  max-width: 700px;
  cursor: pointer;
}

.dig-card img {
  width: 160px;
  height: 160px;
  object-fit: contain;
  border-radius: 10px;
}

</style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button onclick="expandAll()">Expand All</button>
    <button onclick="collapseAll()">Collapse All</button>
    <button onclick="randomRecord()">Random Dig</button>
  </div>
</header>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<!-- RANDOM DIG -->
<div id="dig" onclick="closeDig()">
  <div class="dig-card" id="digContent"></div>
</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let lastFiltered = null;

/* LOAD */
async function load(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);
}

load();

/* GROUP */
function group(data){
  const g = {};
  data.forEach(item => {
    const letter = item.artist[0].toUpperCase();

    if(!g[letter]) g[letter] = {};
    if(!g[letter][item.artist]) g[letter][item.artist] = [];

    g[letter][item.artist].push(item);
  });
  return g;
}

/* RENDER */
function render(data){

  const grouped = group(data);

  let html = "";

  Object.keys(grouped).sort().forEach(letter => {

    html += `
      <div class="artist-block">

        <div class="artist-header" onclick="this.parentElement.classList.toggle('active')">
          <span>${letter}</span>
          <span>${Object.keys(grouped[letter]).length}</span>
        </div>

        <div class="group">
    `;

    Object.keys(grouped[letter]).sort().forEach(artist => {

      html += `
        <div>
          <div style="font-family:Bebas Neue; font-size:18px; margin-bottom:10px;">
            ${artist}
          </div>
      `;

      grouped[letter][artist].forEach(record => {
        html += `
          <div class="record-card">
            ${record.cover ? `<img src="${record.cover}" class="cover">` : ""}
            <div class="record-title">${record.record}</div>
          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById("app").innerHTML = html;
  lastFiltered = data;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

/* EXPAND / COLLAPSE */
function expandAll(){
  document.querySelectorAll(".artist-block").forEach(b => b.classList.add("active"));
}

function collapseAll(){
  document.querySelectorAll(".artist-block").forEach(b => b.classList.remove("active"));
}

/* RANDOM DIG (RESTORED) */
function randomRecord(){

  const pool = lastFiltered || allData;
  const pick = pool[Math.floor(Math.random() * pool.length)];

  const modal = document.getElementById("dig");
  const content = document.getElementById("digContent");

  modal.style.display = "flex";

  content.innerHTML = `
    ${pick.cover ? `<img src="${pick.cover}">` : ""}
    <div>
      <div style="font-family:Bebas Neue; font-size:22px;">NOW DIGGING</div>
      <div style="font-family:Playfair Display; font-size:24px; margin-top:8px;">
        ${pick.artist}
      </div>
      <div style="opacity:0.7; margin-top:6px;">
        ${pick.record}
      </div>
    </div>
  `;
}

function closeDig(){
  document.getElementById("dig").style.display = "none";
}

</script>

</body>
</html>
