<!DOCTYPE html>
<html>
<head>

  <title>Sunday Crates</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>

:root {
  --bg: #074f57;
  --panel: #077187;
  --panel-soft: #064a51;
  --accent: #9ece9a;
  --warm: #e4c5af;
  --text: #e9f6f3;
  --shadow: rgba(0,0,0,0.35);
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Space Grotesk";
  overflow-x: hidden;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 6px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

.controls {
  display: flex;
  gap: 10px;
}

input, button {
  font-family: "Sekuya";
  background: var(--panel);
  border: 1px solid rgba(228,197,175,0.25);
  color: var(--text);
  padding: 6px 10px;
}

/* LAYOUT */
#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* ARTIST */
.artist-block {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.artist-header {
  padding: 8px 20px;
  font-family: "Bebas Neue";
  font-size: 26px;
  display: flex;
  justify-content: space-between;
}

/* SCROLLER */
.group {
  display: flex;
  overflow-x: auto;
  gap: 16px;
  padding: 10px 16px;
  scroll-snap-type: x mandatory;
}

.group::-webkit-scrollbar {
  display: none;
}

.page {
  flex: 0 0 100%;
  display: flex;
  justify-content: center;
  scroll-snap-align: center;
}

/* CARD */
.record-card {
  height: 320px;
  width: 100%;
  max-width: 420px;

  background: linear-gradient(145deg, var(--panel), var(--panel-soft));
  border-radius: 12px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  padding: 14px;

  position: relative;
  overflow: hidden;

  border: 1px solid rgba(228,197,175,0.18);

  box-shadow:
    inset 0 2px 10px rgba(0,0,0,0.35),
    0 10px 30px var(--shadow);

  transition: transform 0.2s ease;
}

.record-card:hover {
  transform: translateY(-4px);
}

.cover {
  width: 100%;
  max-width: 300px;
  height: 230px;
  object-fit: contain;
  border-radius: 10px;
}

.record-title {
  font-family: "Playfair Display";
  font-size: 24px;
  margin-top: 14px;
  text-align: center;
  color: var(--warm);
}

/* SHINE */
.record-card::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;

  background: linear-gradient(
    120deg,
    transparent,
    rgba(228,197,175,0.08),
    transparent
  );

  transform: rotate(25deg);
}

/* FOOTER */
.footer-status {
  padding: 16px 40px;
  opacity: 0.7;
  text-align: right;
}

  </style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>
</header>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<div id="status" class="footer-status"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let lastFiltered = null;

/* =========================
   DATA NORMALIZATION (CRITICAL FIX)
========================= */
function normalize(item) {
  return {
    artist: item.artist?.trim(),
    record: item.record?.trim(),
    cover: item.cover,
    key: item.artist?.trim().toLowerCase() // stable identity key
  };
}

/* =========================
   ORDER-STABLE GROUPING ENGINE
========================= */
function groupPreserveOrder(data) {

  const map = new Map();
  const order = [];

  for (const raw of data) {

    const item = normalize(raw);

    if (!item.artist || !item.record) continue;

    if (!map.has(item.artist)) {
      map.set(item.artist, []);
      order.push(item.artist); // FIRST SEEN WINS
    }

    map.get(item.artist).push(item);
  }

  return { map, order };
}

/* =========================
   LOAD
========================= */
async function load() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(Boolean);

  render(allData);
}

load();

/* =========================
   RENDER (LOCKED ORDER)
========================= */
function render(data) {

  const { map, order } = groupPreserveOrder(data);

  let html = "";

  order.forEach(artist => {

    const records = map.get(artist);
    const pages = chunk(records, 1);

    html += `
      <div class="artist-block">

        <div class="artist-header">
          <span>${artist}</span>
          <span>${records.length}</span>
        </div>

        <div class="group">
    `;

    pages.forEach(page => {

      html += `<div class="page">`;

      page.forEach(item => {
        html += `
          <div class="record-card">

            ${item.cover ? `<img src="${item.cover}" class="cover">` : ""}

            <div class="record-title">${item.record}</div>

          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById("app").innerHTML = html;

  lastFiltered = data;
}

/* =========================
   SEARCH (NO ORDER DRIFT)
========================= */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  const filtered = allData.filter(x =>
    (x.artist || "").toLowerCase().includes(val) ||
    (x.record || "").toLowerCase().includes(val)
  );

  render(filtered);
});

/* =========================
   UTIL
========================= */
function chunk(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) {
    out.push(arr.slice(i, i + size));
  }
  return out;
}

function randomRecord(){
  const pool = lastFiltered || allData;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
