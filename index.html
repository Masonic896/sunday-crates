<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sunday Crates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&family=DM+Sans:wght@300..700&display=swap" rel="stylesheet">

<style>

/* ========================= BASE ========================= */

body {
  margin: 0;
  background: #0e0b0c;
  color: #e4e1da;
  font-family: "Space Grotesk";
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 10px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

.controls {
  display: flex;
  gap: 10px;
  padding: 0 40px;
  margin-bottom: 20px;
  align-items: center;
  flex-wrap: wrap;
}

button {
  font-family: "Sekuya";
  background: #1a1617;
  color: #e4e1da;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 6px 14px;
  height: 34px;
  cursor: pointer;
}

#searchBar {
  flex: 1;
  max-width: 300px;
  padding: 8px 12px;
  background: #1a1617;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  color: #e4e1da;
  font-family: "Space Grotesk";
  font-size: 14px;
  outline: none;
  height: 34px;
  box-sizing: border-box;
}

#searchBar::placeholder { color: rgba(228,225,218,0.4); }
#searchBar:focus { border-color: rgba(255,255,255,0.15); }

/* ========================= SORT PILLS ========================= */

.sort-pills {
  display: flex;
  gap: 6px;
  align-items: center;
}

.sort-label {
  font-size: 13px;
  opacity: 0.5;
  margin-right: 2px;
}

.sort-btn {
  font-family: "Space Grotesk";
  font-size: 12px;
  font-weight: 500;
  background: #1a1617;
  color: rgba(228,225,218,0.6);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  padding: 4px 12px;
  height: 28px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.sort-btn.active {
  background: #e2ddd2;
  color: #181515;
  border-color: #e2ddd2;
}

/* ========================= GRID WALL ========================= */

#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

#app {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  padding: 18px;
  border-radius: 14px;
  background-color: #0a0708;
  background-image:
    repeating-linear-gradient(45deg,  rgba(110,72,35,0.22) 0, rgba(110,72,35,0.22) 1.5px, transparent 0, transparent 50%),
    repeating-linear-gradient(-45deg, rgba(110,72,35,0.22) 0, rgba(110,72,35,0.22) 1.5px, transparent 0, transparent 50%);
  background-size: 10px 10px;
}

/* ========================= FOCUS MODE ========================= */

#app.focus-mode .letter-block {
  opacity: 0.28;
  filter: saturate(0.7) contrast(0.9);
  transform: scale(0.985);
}

#app.focus-mode .letter-block.active {
  opacity: 1;
  transform: scale(1.01) translateY(-2px);
  box-shadow: 0 22px 60px rgba(0,0,0,0.9);
}

/* pause dig animation when any crate is open */
#app.focus-mode .random-dig-block {
  animation-play-state: paused;
}

/* ========================= CRATES ========================= */

.letter-block {
  background: #161314;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.04);
  overflow: hidden;
  transition: all 0.25s ease;
}

.letter-block.span-2 {
  grid-column: span 2;
}

.letter-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  font-family: "Sekuya";
  background: #e2ddd2;
  color: #181515;
  cursor: pointer;
  box-sizing: border-box;
}

/* regular sortable crates — normal header height */
.letter-header span:first-child {
  font-size: 36px;
  font-weight: bold;
  line-height: 1;
}

.letter-header span:last-child {
  font-size: 16px;
  font-family: "Space Grotesk";
  text-align: right;
  line-height: 1.4;
}

.letter-group {
  display: none;
  flex-direction: column;
  max-height: 55vh;
  overflow-y: auto;
  padding: 14px;
  background: #120f10;
  gap: 14px;
}

.letter-block.active .letter-group {
  display: flex;
}

/* ========================= BOTTOM ROW — uniform height ========================= */
/* # , Various, and Random Dig all share this look */

.bottom-crate-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;
  background: #e2ddd2;
  color: #181515;
  cursor: pointer;
  min-height: 88px;
  box-sizing: border-box;
}

.bottom-crate-header .crate-label {
  font-family: "Sekuya";
  font-size: 32px;
  font-weight: bold;
  line-height: 1.1;
  color: #181515;
}

.bottom-crate-header .crate-count {
  font-family: "Space Grotesk";
  font-size: 16px;
  color: #181515;
  text-align: right;
  line-height: 1.5;
}

/* ========================= RANDOM DIG CRATE ========================= */

@keyframes digInvite {
  0%, 55%, 100% { transform: scale(1)    rotate(0deg);    }
  57%           { transform: scale(1.03) rotate(-1.5deg); }
  59%           { transform: scale(1.04) rotate( 1.5deg); }
  61%           { transform: scale(1.04) rotate(-1deg);   }
  63%           { transform: scale(1.03) rotate( 0.8deg); }
  65%           { transform: scale(1.02) rotate(0deg);    }
  69%           { transform: scale(1)    rotate(0deg);    }
}

.random-dig-block {
  background: #161314;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.04);
  overflow: hidden;
  cursor: pointer;
  animation: digInvite 4s ease-in-out infinite;
  transform-origin: center;
  transition: filter 0.2s ease;
}

.random-dig-block:hover {
  filter: brightness(1.15);
}

/* ========================= ARTISTS ========================= */

.artist-section {
  background: #1a1617;
  padding: 12px;
  border-radius: 10px;
}

.artist-name {
  font-size: 16px;
  text-transform: uppercase;
  opacity: 0.85;
  margin-bottom: 10px;
}

/* ========================= RECORDS ========================= */

.record-card {
  background: #1f1b1c;
  border-radius: 10px;
  padding: 8px;
  margin-bottom: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.record-card img {
  width: 100%;
  max-width: 90px;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 6px;
  margin-bottom: 6px;
}

.record-title {
  font-family: "DM Sans";
  font-size: 12px;
  text-align: center;
  line-height: 1.3;
  word-break: break-word;
}

/* ========================= SPIN MODAL ========================= */

#spinModal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
}

#spinOverlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
}

#spinBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 700px;
  background: #151112;
  border-radius: 12px;
  padding: 40px;
  text-align: center;
  border: 4px solid transparent;
  background-image:
    linear-gradient(#151112, #151112),
    repeating-linear-gradient(
      45deg,
      rgba(110,72,35,0.7)  0, rgba(110,72,35,0.7)  1.5px,
      rgba(60,38,15,0.5)   0, rgba(60,38,15,0.5)   50%
    );
  background-size: auto, 8px 8px;
  background-origin: border-box;
  background-clip: padding-box, border-box;
}

#spinTitle {
  font-family: "Bebas Neue";
  font-size: 28px;
  margin-bottom: 30px;
  opacity: 0.8;
  letter-spacing: 2px;
}

#spinContent {
  min-height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ========================= CAROUSEL ========================= */

.carousel-container {
  width: 516px;
  height: 280px;
  overflow: hidden;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: #0f0c0d;
  margin-bottom: 30px;
  display: flex;
  align-items: center;
  position: relative;
}

.carousel-container::after {
  content: '';
  position: absolute;
  left: 178px;
  top: 10px;
  bottom: 10px;
  width: 160px;
  border: 1px solid rgba(228,225,218,0.2);
  border-radius: 10px;
  pointer-events: none;
  z-index: 2;
}

.carousel {
  display: flex;
  gap: 12px;
  transition: none;
}

.carousel-item {
  flex-shrink: 0;
  width: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0.3;
  transition: opacity 0.05s ease, transform 0.05s ease;
  padding: 0 4px;
  box-sizing: border-box;
}

.carousel-item.active {
  opacity: 1;
  transform: scale(1.05);
}

.carousel-cover {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 8px;
  flex-shrink: 0;
}

.carousel-text {
  font-size: 11px;
  text-align: center;
  opacity: 0.85;
  line-height: 1.3;
  width: 100%;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

/* ========================= RESULT ========================= */

.result-text   { font-family: "DM Sans";    font-size: 14px; margin-bottom: 8px; opacity: 0.9; }
.result-artist { font-family: "Bebas Neue"; font-size: 24px; margin-bottom: 8px; }
.result-record { font-family: "Bebas Neue"; font-size: 20px; opacity: 0.8; }

.spin-result {
  opacity: 0;
  animation: fadeIn 0.6s ease-out forwards;
  width: 100%;
}

@keyframes fadeIn {
  0%   { opacity: 0; transform: scale(0.9); }
  100% { opacity: 1; transform: scale(1);   }
}

.result-cover {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* ========================= ERROR STATE ========================= */

.error-message {
  text-align: center;
  padding: 2rem;
  opacity: 0.6;
  font-size: 14px;
}

</style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>
</header>

<div class="controls">
  <input type="text" id="searchBar" placeholder="Search artists or records...">
  <button onclick="toggleAll()">Expand / Collapse All</button>
  <div class="sort-pills">
    <span class="sort-label">Sort:</span>
    <button class="sort-btn active" data-sort="az"     onclick="setSort('az')">A–Z</button>
    <button class="sort-btn"        data-sort="titles" onclick="setSort('titles')">Title #</button>
    <button class="sort-btn"        data-sort="artists"onclick="setSort('artists')">Artist #</button>
    <button class="sort-btn"        data-sort="genre"  onclick="setSort('genre')">Genre</button>
  </div>
</div>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<!-- SPIN MODAL -->
<div id="spinModal">
  <div id="spinOverlay"></div>
  <div id="spinBox">
    <div id="spinTitle">DIGGING...</div>
    <div id="spinContent">
      <div class="carousel-container">
        <div class="carousel" id="carousel"></div>
      </div>
      <div id="resultDisplay"></div>
    </div>
  </div>
</div>

<script>

const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData     = [];
let filteredData = [];
let sortMode    = 'az';

async function load(){
  try {
    const res  = await fetch(SHEET_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));

    allData = (json.table.rows || [])
      .map(r => ({
        artist: r.c?.[1]?.v,
        record: r.c?.[2]?.v,
        cover:  r.c?.[3]?.v,
        genre:  r.c?.[4]?.v || null
      }))
      .filter(x => x.artist && x.record);

    filteredData = [...allData];
    render(filteredData);
  } catch(e) {
    document.getElementById("app").innerHTML =
      '<div class="error-message">Could not load your crates. Please check your connection and refresh.</div>';
    console.error("Load error:", e);
  }
}

load();

/* SEARCH */
document.getElementById("searchBar").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  filteredData = q.length === 0
    ? [...allData]
    : allData.filter(i =>
        i.artist.toLowerCase().includes(q) ||
        i.record.toLowerCase().includes(q)
      );
  render(filteredData);
});

/* SORT */
function setSort(mode){
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.sort === mode)
  );
  render(filteredData);
}

/* TOGGLE — pauses dig animation when any crate is open */
function toggle(el){
  const block  = el.closest(".letter-block");
  block.classList.toggle("active");
  const anyOpen = document.querySelector(".letter-block.active");
  document.getElementById("app").classList.toggle("focus-mode", !!anyOpen);
}

/* EXPAND ALL */
function toggleAll(){
  const blocks  = document.querySelectorAll(".letter-block");
  const app     = document.getElementById("app");
  const anyOpen = document.querySelector(".letter-block.active");
  if (anyOpen) {
    blocks.forEach(b => b.classList.remove("active"));
    app.classList.remove("focus-mode");
  } else {
    blocks.forEach(b => b.classList.add("active"));
    app.classList.add("focus-mode");
  }
}

/* RENDER */
function render(data){

  const alpha   = {};
  const various = [];
  const numeric = {};

  data.forEach(item => {
    if (item.artist === "Various") { various.push(item); return; }
    if (/^[0-9]/.test(item.artist)) {
      if (!numeric["#"])              numeric["#"] = {};
      if (!numeric["#"][item.artist]) numeric["#"][item.artist] = [];
      numeric["#"][item.artist].push(item);
      return;
    }
    const letter = item.artist[0].toUpperCase();
    if (!alpha[letter])              alpha[letter] = {};
    if (!alpha[letter][item.artist]) alpha[letter][item.artist] = [];
    alpha[letter][item.artist].push(item);
  });

  let html = "";

  /* regular sortable letter crates */
  function buildLetterCrate(title, group){
    if (!group || Object.keys(group).length === 0) return;
    const totalRecords = Object.values(group).reduce((s,r) => s + r.length, 0);
    const totalArtists = Object.keys(group).length;
    const tText = totalRecords === 1 ? 'Title'  : 'Titles';
    const aText = totalArtists === 1 ? 'Artist' : 'Artists';

    html += `
      <div class="letter-block">
        <div class="letter-header">
          <span>${title}</span>
          <span>${totalRecords} ${tText}<br>${totalArtists} ${aText}</span>
        </div>
        <div class="letter-group">
    `;
    Object.keys(group).sort().forEach(artist => {
      html += `<div class="artist-section"><div class="artist-name">${artist}</div>`;
      group[artist].forEach(r => {
        html += `
          <div class="record-card">
            ${r.cover ? `<img src="${r.cover}">` : ""}
            <div class="record-title">${r.record}</div>
          </div>`;
      });
      html += `</div>`;
    });
    html += `</div></div>`;
  }

  /* bottom-row crate builder — # and Various, uniform height, expandable */
  function buildBottomCrate(title, group, spanClass = ''){
    if (!group || Object.keys(group).length === 0) return;
    const totalRecords = Object.values(group).reduce((s,r) => s + r.length, 0);
    const totalArtists = title === 'Various' ? null : Object.keys(group).length;
    const tText = totalRecords === 1 ? 'Title'  : 'Titles';
    const countLine = title === 'Various'
      ? `${totalRecords} ${tText}`
      : `${totalRecords} ${tText}<br>${totalArtists} ${totalArtists === 1 ? 'Artist' : 'Artists'}`;

    html += `
      <div class="letter-block ${spanClass}">
        <div class="bottom-crate-header">
          <div class="crate-label">${title}</div>
          <div class="crate-count">${countLine}</div>
        </div>
        <div class="letter-group">
    `;
    Object.keys(group).sort().forEach(artist => {
      html += `<div class="artist-section"><div class="artist-name">${artist}</div>`;
      group[artist].forEach(r => {
        html += `
          <div class="record-card">
            ${r.cover ? `<img src="${r.cover}">` : ""}
            <div class="record-title">${r.record}</div>
          </div>`;
      });
      html += `</div>`;
    });
    html += `</div></div>`;
  }

  /* ---- sort logic (letter crates only) ---- */
  if (sortMode === 'az'){
    Object.keys(alpha).sort().forEach(l => buildLetterCrate(l, alpha[l]));

  } else if (sortMode === 'titles'){
    const groups = Object.keys(alpha).map(l => ({
      key: l, group: alpha[l],
      total: Object.values(alpha[l]).reduce((s,r) => s + r.length, 0)
    }));
    groups.sort((a,b) => b.total - a.total);
    groups.forEach(g => buildLetterCrate(g.key, g.group));

  } else if (sortMode === 'artists'){
    const groups = Object.keys(alpha).map(l => ({
      key: l, group: alpha[l],
      count: Object.keys(alpha[l]).length
    }));
    groups.sort((a,b) => b.count - a.count);
    groups.forEach(g => buildLetterCrate(g.key, g.group));

  } else if (sortMode === 'genre'){
    const genres = {};
    data.forEach(item => {
      if (item.artist === "Various" || /^[0-9]/.test(item.artist)) return;
      const g = item.genre || 'Other';
      if (!genres[g])              genres[g] = {};
      if (!genres[g][item.artist]) genres[g][item.artist] = [];
      genres[g][item.artist].push(item);
    });
    Object.keys(genres).sort().forEach(g => buildLetterCrate(g, genres[g]));
  }

  /* always last: # → Various → Random Dig */
  buildBottomCrate("#",       numeric["#"] || {});
  buildBottomCrate("Various", { "Various": various }, "span-2");

  const totalTitles   = data.length;
  const uniqueArtists = new Set(data.map(r => r.artist)).size;
  const tText = totalTitles   === 1 ? 'Title'  : 'Titles';
  const aText = uniqueArtists === 1 ? 'Artist' : 'Artists';

  html += `
    <div class="random-dig-block" onclick="randomRecord()">
      <div class="bottom-crate-header" style="cursor:pointer;">
        <div class="crate-label">Random<br>Dig</div>
        <div class="crate-count">${totalTitles} ${tText}<br>${uniqueArtists} ${aText}</div>
      </div>
    </div>
  `;

  document.getElementById("app").innerHTML = html;

  document.querySelectorAll(".letter-header, .bottom-crate-header").forEach(h => {
    if (h.closest(".random-dig-block")) return; // skip dig crate
    h.addEventListener("click", () => toggle(h));
  });
  document.querySelectorAll(".letter-group").forEach(g =>
    g.addEventListener("click", e => e.stopPropagation())
  );
}

/* RANDOM RECORD SELECTOR */
function randomRecord(){
  const modal         = document.getElementById("spinModal");
  const carousel      = document.getElementById("carousel");
  const resultDisplay = document.getElementById("resultDisplay");

  modal.style.display = "block";
  carousel.innerHTML  = "";
  resultDisplay.innerHTML = "";

  const dataSource = filteredData.length > 0 ? filteredData : allData;
  const winner     = dataSource[Math.floor(Math.random() * dataSource.length)];

  const sequence = [];
  for (let i = 0; i < 50; i++){
    sequence.push(dataSource[Math.floor(Math.random() * dataSource.length)]);
  }
  sequence.push(winner);
  sequence.push(dataSource[Math.floor(Math.random() * dataSource.length)]);

  const STEP          = 172; // 160px item + 12px gap
  const CENTER_OFFSET = 178; // left edge of center slot in 516px window

  sequence.forEach(record => {
    const item = document.createElement("div");
    item.className = "carousel-item";
    item.innerHTML = `
      ${record.cover
        ? `<img src="${record.cover}" class="carousel-cover">`
        : '<div style="width:120px;height:120px;background:#1a1617;border-radius:8px;margin-bottom:8px;flex-shrink:0"></div>'}
      <div class="carousel-text">${record.artist} — ${record.record}</div>
    `;
    carousel.appendChild(item);
  });

  const items      = Array.from(carousel.querySelectorAll(".carousel-item"));
  const WINNER_IDX = 50;
  const duration   = 3760;
  const startTime  = performance.now();

  function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }

  function animate(now){
    let progress   = Math.min((now - startTime) / duration, 1);
    const eased    = easeOutCubic(progress);
    const curIdx   = Math.round(eased * WINNER_IDX);

    items.forEach((item, idx) =>
      item.classList.toggle("active", idx === curIdx)
    );

    const offset = Math.max(0, curIdx * STEP - CENTER_OFFSET);
    carousel.style.transform = `translateX(${-offset}px)`;

    if (progress < 1){
      requestAnimationFrame(animate);
    } else {
      resultDisplay.innerHTML = `
        <div class="spin-result">
          ${winner.cover ? `<img src="${winner.cover}" class="result-cover">` : ""}
          <div class="result-text">You found:</div>
          <div class="result-artist">${winner.artist}</div>
          <div class="result-record">${winner.record}</div>
        </div>`;
    }
  }

  requestAnimationFrame(animate);
  modal.onclick = () => modal.style.display = "none";
}

</script>
</body>
</html>
