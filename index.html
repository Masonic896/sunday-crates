<!DOCTYPE html>
<html>
<head>

<title>Sunday Crates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE
========================= */

body {
  margin: 0;
  background: #0e0b0c;
  color: #e4e1da;
  font-family: "Space Grotesk";
  letter-spacing: 0.2px;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 10px;
}

h1 {
  font-family: "Playfair Display";
  font-size: 44px;
  font-weight: 500;
  margin: 0;
  letter-spacing: 0.5px;
}

/* SEARCH */
.search-bar input {
  width: 320px;
  max-width: 45vw;

  font-family: "Bebas Neue";
  font-size: 16px;

  background: #1a1617;
  color: #e4e1da;

  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;

  padding: 6px 10px;
  height: 34px;

  box-sizing: border-box;
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 10px;
  padding: 0 40px;
  margin-top: 10px;
  margin-bottom: 28px;
}

/* BUTTONS (micro depth) */
button {
  font-family: "Space Grotesk";

  background: #1a1617;
  color: #e4e1da;

  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;

  font-size: 13px;
  letter-spacing: 0.5px;

  padding: 6px 14px;
  height: 34px;

  cursor: pointer;

  box-shadow: 0 6px 14px rgba(0,0,0,0.7);

  transition: transform 0.08s ease, box-shadow 0.08s ease;
}

button:active {
  transform: translateY(1px);
  box-shadow: inset 0 3px 6px rgba(0,0,0,0.6);
}

/* =========================
   GRID
========================= */

#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* =========================
   CRATES
========================= */

.letter-block {
  background: #161314;
  border-radius: 12px;

  border: 1px solid rgba(255,255,255,0.04);

  box-shadow:
    0 14px 40px rgba(0,0,0,0.75),
    inset 0 1px 0 rgba(255,255,255,0.02);

  overflow: hidden;

  transition: transform 0.15s ease;
}

.letter-block:hover {
  transform: translateY(-2px);
}

/* HEADER TAB */
.letter-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;

  padding: 14px 16px;

  font-family: "Bebas Neue";
  font-size: 22px;
  letter-spacing: 1.5px;

  background: #e2ddd2;
  color: #181515;

  border-bottom: 1px solid rgba(0,0,0,0.15);

  cursor: pointer;

  transition: transform 0.08s ease, box-shadow 0.08s ease;
}

.letter-header:active {
  transform: translateY(1px);
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.25);
}

/* =========================
   CRATE CONTENT
========================= */

.letter-group {
  display: none;

  max-height: 420px;
  overflow-y: auto;

  padding: 14px;

  background: #120f10;

  box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);

  flex-direction: column;
  gap: 14px;
}

.letter-block.active .letter-group {
  display: flex;
}

/* =========================
   ARCHIVE LABEL (ARTIST)
========================= */

.artist-section {
  padding: 12px;

  border-radius: 10px;

  background: #1a1617;

  border: 1px solid rgba(255,255,255,0.04);
}

.artist-name {
  font-family: "Space Grotesk";
  font-size: 13px;

  text-transform: uppercase;
  letter-spacing: 0.8px;

  opacity: 0.7;

  margin-bottom: 10px;
}

/* =========================
   RECORDS (TACTILE OBJECT)
========================= */

.record-card {
  width: 100%;
  box-sizing: border-box;

  margin-bottom: 10px;
  padding: 10px;

  border-radius: 10px;

  background: #1f1b1c;

  border: 1px solid rgba(255,255,255,0.05);

  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.02),
    0 6px 14px rgba(0,0,0,0.65);

  display: flex;
  flex-direction: column;
  align-items: center;

  overflow: hidden;

  transition: transform 0.12s ease, box-shadow 0.12s ease;
}

.record-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.75);
}

.record-card:active {
  transform: translateY(1px);
  box-shadow: inset 0 3px 6px rgba(0,0,0,0.5);
}

/* COVER */
.cover {
  width: 100%;
  max-width: 180px;
  height: 140px;
  object-fit: contain;
  border-radius: 6px;
}

/* TITLE */
.record-title {
  font-family: "Playfair Display";
  font-size: 15px;

  color: #dcd8cf;

  text-align: center;
  margin-top: 6px;

  width: 100%;
  line-height: 1.3;

  word-break: break-word;
}

/* =========================
   MODAL (RANDOM DIG)
========================= */

#dig-modal {
  position: fixed;
  inset: 0;

  display: none;
  align-items: center;
  justify-content: center;

  background: rgba(0,0,0,0.75);
  z-index: 999;
}

.dig-card {
  background: #1a1617;
  border-radius: 12px;

  padding: 20px;

  max-width: 320px;

  border: 1px solid rgba(255,255,255,0.08);

  box-shadow: 0 20px 50px rgba(0,0,0,0.85);
}

.dig-card img {
  width: 100%;
  height: 200px;
  object-fit: contain;
  border-radius: 8px;
}

.dig-title {
  font-family: "Playfair Display";
  margin-top: 10px;
  font-size: 18px;
}

.dig-artist {
  font-family: "Bebas Neue";
  font-size: 16px;
  opacity: 0.7;
}

</style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="search-bar">
    <input id="search" placeholder="Search..." />
  </div>
</header>

<div class="controls">
  <button id="toggleAllBtn" onclick="toggleAll()">Expand All</button>
  <button onclick="randomRecord()">Random Dig</button>
</div>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<!-- RANDOM DIG -->
<div id="dig-modal" onclick="closeDig()">
  <div class="dig-card">
    <img id="dig-img">
    <div class="dig-title" id="dig-title"></div>
    <div class="dig-artist" id="dig-artist"></div>
  </div>
</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let lastFiltered = null;
let expanded = false;

async function load(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);
}

load();

/* SAME LOGIC YOU ALREADY HAD */
function render(data){

  const alpha = {};
  const various = [];
  const numeric = {};

  data.forEach(item => {

    const artist = item.artist;

    if (artist === "Various") {
      various.push(item);
      return;
    }

    if (/^[0-9]/.test(artist)) {
      if (!numeric["#"]) numeric["#"] = {};
      if (!numeric["#"][artist]) numeric["#"][artist] = [];
      numeric["#"][artist].push(item);
      return;
    }

    const letter = artist[0].toUpperCase();
    if (!alpha[letter]) alpha[letter] = {};
    if (!alpha[letter][artist]) alpha[letter][artist] = [];
    alpha[letter][artist].push(item);
  });

  let html = "";

  Object.keys(alpha).sort().forEach(letter => {

    html += `
      <div class="letter-block">
        <div class="letter-header" onclick="toggleOnly(this)">
          <span>${letter}</span>
          <span>${Object.keys(alpha[letter]).length}</span>
        </div>
        <div class="letter-group">
    `;

    Object.keys(alpha[letter]).sort().forEach(artist => {

      html += `
        <div class="artist-section">
          <div class="artist-name">${artist}</div>
      `;

      alpha[letter][artist].forEach(r => {
        html += `
          <div class="record-card">
            ${r.cover ? `<img src="${r.cover}" class="cover">` : ""}
            <div class="record-title">${r.record}</div>
          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  });

  if (various.length) {
    html += `
      <div class="letter-block">
        <div class="letter-header" onclick="toggleOnly(this)">
          <span>Various</span>
          <span>${various.length}</span>
        </div>
        <div class="letter-group">
          <div class="artist-section">
            <div class="artist-name">Various</div>
    `;

    various.forEach(r => {
      html += `
        <div class="record-card">
          ${r.cover ? `<img src="${r.cover}" class="cover">` : ""}
          <div class="record-title">${r.record}</div>
        </div>
      `;
    });

    html += `</div></div></div>`;
  }

  if (numeric["#"]) {
    html += `
      <div class="letter-block">
        <div class="letter-header" onclick="toggleOnly(this)">
          <span>#</span>
          <span>${Object.keys(numeric["#"]).length}</span>
        </div>
        <div class="letter-group">
    `;

    Object.keys(numeric["#"]).sort().forEach(artist => {

      html += `
        <div class="artist-section">
          <div class="artist-name">${artist}</div>
      `;

      numeric["#"][artist].forEach(r => {
        html += `
          <div class="record-card">
            ${r.cover ? `<img src="${r.cover}" class="cover">` : ""}
            <div class="record-title">${r.record}</div>
          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  }

  document.getElementById("app").innerHTML = html;
  lastFiltered = data;
}

function toggleOnly(el){
  const block = el.parentElement;
  document.querySelectorAll(".letter-block").forEach(b => {
    if (b !== block) b.classList.remove("active");
  });
  block.classList.toggle("active");
}

function toggleAll(){
  const blocks = document.querySelectorAll(".letter-block");
  expanded = !expanded;
  blocks.forEach(b => expanded ? b.classList.add("active") : b.classList.remove("active"));
  document.getElementById("toggleAllBtn").innerText =
    expanded ? "Collapse All" : "Expand All";
}

/* RANDOM DIG */
function randomRecord(){
  const pool = lastFiltered || allData;
  const pick = pool[Math.floor(Math.random() * pool.length)];

  document.getElementById("dig-img").src = pick.cover || "";
  document.getElementById("dig-title").innerText = pick.record;
  document.getElementById("dig-artist").innerText = pick.artist;

  document.getElementById("dig-modal").style.display = "flex";
}

function closeDig(){
  document.getElementById("dig-modal").style.display = "none";
}

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

</script>

</body>
</html>
