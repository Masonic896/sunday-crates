<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sunday Crates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&family=DM+Sans:wght@300..700&display=swap" rel="stylesheet">

<style>

/* ========================= BASE ========================= */

body {
  margin: 0;
  background: #0e0b0c;
  color: #e4e1da;
  font-family: "Space Grotesk";
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 10px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

.controls {
  display: flex;
  gap: 10px;
  padding: 0 40px;
  margin-bottom: 20px;
}

button {
  font-family: "Sekuya";
  background: #1a1617;
  color: #e4e1da;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 6px 14px;
  height: 34px;
  cursor: pointer;
}

/* ========================= GRID WALL ========================= */

#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

#app {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}

/* ========================= FOCUS MODE ========================= */

#app.focus-mode .letter-block {
  opacity: 0.28;
  filter: saturate(0.7) contrast(0.9);
  transform: scale(0.985);
}

#app.focus-mode .letter-block.active {
  opacity: 1;
  transform: scale(1.01) translateY(-2px);
  box-shadow: 0 22px 60px rgba(0,0,0,0.9);
}

/* ========================= CRATES ========================= */

.letter-block {
  background: #161314;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.04);
  overflow: hidden;
  transition: all 0.25s ease;
}

.letter-block.span-2 {
  grid-column: span 2;
}

.letter-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  font-family: "Sekuya";
  background: #e2ddd2;
  color: #181515;
  cursor: pointer;
  min-height: 60px;
}

.letter-header span:first-child {
  font-size: 36px;
  font-weight: bold;
}

.letter-header span:last-child {
  font-size: 22px;
  font-family: "Space Grotesk";
  text-align: right;
}

.letter-group {
  display: none;
  flex-direction: column;
  max-height: 55vh;
  overflow-y: auto;
  padding: 14px;
  background: #120f10;
  gap: 14px;
}

.letter-block.active .letter-group {
  display: flex;
}

/* ========================= RANDOM DIG BUTTON CRATE ========================= */

.random-dig-block {
  background: #161314;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.04);
  grid-column: span 2;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.25s ease;
  min-height: 200px;
}

.random-dig-block:hover {
  background: #1a1617;
  border-color: rgba(255,255,255,0.1);
}

.random-dig-content {
  text-align: center;
}

.random-dig-content .dig-title {
  font-family: "Sekuya";
  font-size: 42px;
  margin-bottom: 12px;
  color: #181515;
}

.random-dig-content .dig-subtitle {
  font-family: "Space Grotesk";
  font-size: 16px;
  color: rgba(24, 21, 21, 0.7);
}

/* ========================= ARTISTS ========================= */

.artist-section {
  background: #1a1617;
  padding: 12px;
  border-radius: 10px;
}

.artist-name {
  font-size: 16px;
  text-transform: uppercase;
  opacity: 0.85;
  margin-bottom: 10px;
}

/* ========================= RECORDS ========================= */

.record-card {
  background: #1f1b1c;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.record-title {
  font-family: "DM Sans";
  font-size: 14px;
  margin-top: 6px;
  text-align: center;
}

/* ========================= SPIN MODAL ========================= */

#spinModal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
}

#spinOverlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
}

#spinBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 700px;
  background: #151112;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 40px;
  text-align: center;
}

#spinTitle {
  font-family: "Bebas Neue";
  font-size: 28px;
  margin-bottom: 30px;
  opacity: 0.8;
  letter-spacing: 2px;
}

#spinContent {
  min-height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.carousel-container {
  width: 516px;
  height: 280px;
  overflow: hidden;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #0f0c0d;
  margin-bottom: 30px;
  display: flex;
  align-items: center;
}

.carousel {
  display: flex;
  gap: 12px;
  transition: none;
  padding: 0 10px;
}

.carousel-item {
  flex-shrink: 0;
  width: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0.3;
  transition: opacity 0.05s ease, transform 0.05s ease;
}

.carousel-item.active {
  opacity: 1;
  transform: scale(1.1);
}

.carousel-cover {
  width: 140px;
  height: 140px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 10px;
}

.carousel-text {
  font-size: 12px;
  text-align: center;
  opacity: 0.8;
  line-height: 1.3;
  max-width: 150px;
}

.result-text {
  font-family: "DM Sans";
  font-size: 14px;
  margin-bottom: 8px;
  opacity: 0.9;
}

.result-artist {
  font-family: "Bebas Neue";
  font-size: 24px;
  margin-bottom: 8px;
}

.result-record {
  font-family: "Bebas Neue";
  font-size: 20px;
  opacity: 0.8;
}

.spin-result {
  opacity: 0;
  animation: fadeIn 0.6s ease-out forwards;
  width: 100%;
}

@keyframes fadeIn {
  0% { 
    opacity: 0;
    transform: scale(0.9);
  }
  100% { 
    opacity: 1;
    transform: scale(1);
  }
}

.result-cover {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* ========================= ERROR STATE ========================= */

.error-message {
  text-align: center;
  padding: 2rem;
  opacity: 0.6;
  font-size: 14px;
}

</style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>
</header>

<div class="controls">
  <button onclick="toggleAll()">Expand / Collapse All</button>
</div>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<!-- SPIN MODAL -->
<div id="spinModal">
  <div id="spinOverlay"></div>
  <div id="spinBox">
    <div id="spinTitle">DIGGING...</div>
    <div id="spinContent">
      <div class="carousel-container">
        <div class="carousel" id="carousel"></div>
      </div>
      <div id="resultDisplay"></div>
    </div>
  </div>
</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

async function load(){
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const text = await res.text();
    const json = JSON.parse(
      text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
    );

    allData = (json.table.rows || [])
      .map(r => ({
        artist: r.c?.[1]?.v,
        record: r.c?.[2]?.v,
        cover: r.c?.[3]?.v
      }))
      .filter(x => x.artist && x.record);

    render(allData);
  } catch (e) {
    document.getElementById("app").innerHTML = 
      '<div class="error-message">Could not load your crates. Please check your connection and refresh.</div>';
    console.error("Load error:", e);
  }
}

load();

/* TOGGLE */
function toggle(el){
  const block = el.closest(".letter-block");
  block.classList.toggle("active");

  const anyOpen = document.querySelector(".letter-block.active");
  document.getElementById("app").classList.toggle("focus-mode", !!anyOpen);
}

/* EXPAND ALL */
function toggleAll(){
  const blocks = document.querySelectorAll(".letter-block");
  const app = document.getElementById("app");
  const anyOpen = document.querySelector(".letter-block.active");

  if (anyOpen) {
    blocks.forEach(b => b.classList.remove("active"));
    app.classList.remove("focus-mode");
  } else {
    blocks.forEach(b => b.classList.add("active"));
    app.classList.add("focus-mode");
  }
}

/* RENDER */
function render(data){

  const alpha = {};
  const various = [];
  const numeric = {};

  data.forEach(item => {

    if (item.artist === "Various") {
      various.push(item);
      return;
    }

    if (/^[0-9]/.test(item.artist)) {
      if (!numeric["#"]) numeric["#"] = {};
      if (!numeric["#"][item.artist]) numeric["#"][item.artist] = [];
      numeric["#"][item.artist].push(item);
      return;
    }

    const letter = item.artist[0].toUpperCase();
    if (!alpha[letter]) alpha[letter] = {};
    if (!alpha[letter][item.artist]) alpha[letter][item.artist] = [];
    alpha[letter][item.artist].push(item);
  });

  let html = "";

  function build(title, group, isVarious = false){

    if (!group || Object.keys(group).length === 0) return;

    const totalRecords = Object.values(group).reduce((sum, records) => sum + records.length, 0);
    const totalArtists = Object.keys(group).length;
    const titleText = totalRecords === 1 ? 'Title' : 'Titles';
    const artistText = totalArtists === 1 ? 'Artist' : 'Artists';

    let countHTML = '';
    let spanClass = '';
    
    if (isVarious) {
      countHTML = `${totalRecords} ${titleText}`;
      spanClass = 'span-2';
    } else {
      countHTML = `${totalRecords} ${titleText}, ${totalArtists} ${artistText}`;
    }

    html += `
      <div class="letter-block ${spanClass}">
        <div class="letter-header">
          <span>${title}</span>
          <span>${countHTML}</span>
        </div>
        <div class="letter-group" onclick="toggle(event.currentTarget.parentElement.querySelector('.letter-header'))">
    `;

    Object.keys(group).sort().forEach(artist => {

      html += `
        <div class="artist-section">
          <div class="artist-name">${artist}</div>
      `;

      group[artist].forEach(r => {
        html += `
          <div class="record-card">
            ${r.cover ? `<img src="${r.cover}" class="spin-cover">` : ""}
            <div class="record-title">${r.record}</div>
          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  }

  // Build in new order: A-Z, then #, then Various
  Object.keys(alpha).sort().forEach(l => build(l, alpha[l]));
  build("#", numeric["#"] || {});
  build("Various", { "Various": various }, true);

  // Add Random Dig button as a crate
  html += `
    <div class="random-dig-block" onclick="randomRecord()">
      <div class="random-dig-content">
        <div class="dig-title">Random Dig</div>
        <div class="dig-subtitle">Find a record</div>
      </div>
    </div>
  `;

  document.getElementById("app").innerHTML = html;

  // Attach toggle listeners to headers
  document.querySelectorAll(".letter-header").forEach(header => {
    header.addEventListener("click", () => toggle(header));
  });
}

/* RANDOM RECORD SELECTOR WITH SHUFFLE */
function randomRecord(){
  const modal = document.getElementById("spinModal");
  const carousel = document.getElementById("carousel");
  const resultDisplay = document.getElementById("resultDisplay");

  modal.style.display = "block";
  carousel.innerHTML = "";
  resultDisplay.innerHTML = "";

  // Pick the winner
  const winner = allData[Math.floor(Math.random() * allData.length)];

  // Create sequence: 50 random records + winner at the end
  const sequence = [];
  for (let i = 0; i < 50; i++) {
    sequence.push(allData[Math.floor(Math.random() * allData.length)]);
  }
  sequence.push(winner);

  // Render all items
  sequence.forEach((record, idx) => {
    const item = document.createElement("div");
    item.className = "carousel-item";
    if (idx === 0) item.classList.add("active");

    item.innerHTML = `
      ${record.cover ? `<img src="${record.cover}" class="carousel-cover">` : '<div style="width:140px;height:140px;background:#1a1617;border-radius:8px;margin-bottom:10px;"></div>'}
      <div class="carousel-text">${record.artist} — ${record.record}</div>
    `;

    carousel.appendChild(item);
  });

  const items = Array.from(carousel.querySelectorAll(".carousel-item"));
  const finalIndex = items.length - 1;

  // Animation parameters
  const duration = 3760; // 3.76 seconds
  const startTime = performance.now();
  let animationFrameId;

  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function animate(now) {
    const elapsed = now - startTime;
    let progress = elapsed / duration;

    if (progress > 1) progress = 1;

    // Calculate which item to show
    const currentIndex = Math.round(easeOutCubic(progress) * finalIndex);

    // Update active state
    items.forEach((item, idx) => {
      item.classList.toggle("active", idx === currentIndex);
    });

    // Scroll carousel - position current item in the middle (2nd of 3 visible)
    const offset = Math.max(0, (currentIndex - 1) * 172);
    carousel.style.transform = `translateX(${-offset}px)`;

    if (progress < 1) {
      animationFrameId = requestAnimationFrame(animate);
    } else {
      // Animation complete - show result
      resultDisplay.innerHTML = `
        <div class="spin-result">
          ${winner.cover ? `<img src="${winner.cover}" class="result-cover">` : ""}
          <div class="result-text">You found:</div>
          <div class="result-artist">${winner.artist}</div>
          <div class="result-record">${winner.record}</div>
        </div>
      `;
    }
  }

  animationFrameId = requestAnimationFrame(animate);

  modal.onclick = () => modal.style.display = "none";
}

</script>

</body>
</html>
