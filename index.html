<!DOCTYPE html>
<html>
<head>
  <title>Vinyl Collection</title>

  <style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #eaeaea;
  padding: 24px;
}

h1 {
  font-size: 36px;
  margin-bottom: 20px;
}

#status {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 10px;
}

.artist {
  font-weight: 700;
  margin-top: 26px;
  padding-bottom: 6px;
  border-bottom: 1px solid #2a2a2a;
  cursor: pointer;
}

.record-card {
  margin-left: 20px;
  padding: 6px 10px;
  margin-bottom: 4px;
  background: #1b1b1b;
  border-radius: 6px;
}

.record-card:hover {
  background: #2a2a2a;
}

.group {
  display: block;
}

.hidden {
  display: none;
}

input {
  padding: 8px;
  width: 300px;
  margin-bottom: 15px;
}

button {
  padding: 8px;
  margin-left: 10px;
}
  </style>
</head>

<body>

<h1>My Vinyl Collection</h1>

<div id="status">Loading...</div>

<input id="search" placeholder="Search records or artists..." />
<button onclick="randomRecord()">Random Dig</button>

<div id="app">Loading...</div>

<script>

/* =======================
   MAIN SHEET
======================= */

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

/* =======================
   CACHE LOAD (INSTANT)
======================= */

const cached = localStorage.getItem("vinyl_cache");

if (cached) {
  try {
    allData = JSON.parse(cached);
    render(allData);
    document.getElementById("status").innerText = "Loaded from cache";
  } catch (e) {
    console.log("cache error");
  }
}

/* =======================
   FETCH LIVE DATA
======================= */

async function loadData() {
  try {

    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const json = JSON.parse(
      text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
    );

    const newData = (json.table.rows || [])
      .map(r => ({
        artist: r.c?.[1]?.v,
        record: r.c?.[2]?.v
      }))
      .filter(x => x.artist && x.record);

    allData = newData;

    localStorage.setItem("vinyl_cache", JSON.stringify(allData));

    render(allData);

    document.getElementById("status").innerText =
      "Updated: " + new Date().toLocaleTimeString();

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText =
      "Offline (using cache)";
  }
}

loadData();

/* =======================
   RENDER (UNCHANGED LOGIC)
======================= */

function render(data) {

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item.record);
  });

  let html = "";

  Object.keys(grouped).forEach(artist => {

    html += `
      <div class="artist" onclick="toggle('${artist.replace(/\s/g,'_')}')">
        ${artist}
      </div>

      <div class="group" id="group-${artist.replace(/\s/g,'_')}">
    `;

    grouped[artist].forEach(record => {
      html += `<div class="record-card">${record}</div>`;
    });

    html += `</div>`;
  });

  document.getElementById("app").innerHTML = html;
}

/* =======================
   TOGGLE
======================= */

function toggle(id) {
  const el = document.getElementById("group-" + id);
  if (el) el.classList.toggle("hidden");
}

/* =======================
   SEARCH
======================= */

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

/* =======================
   RANDOM
======================= */

function randomRecord() {
  const pick = allData[Math.floor(Math.random() * allData.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
