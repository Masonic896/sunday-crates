<!DOCTYPE html>
<html>
<head>
  <title>Vinyl Collection</title>

  <style>
html, body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom left, #111, #222);
  color: #eaeaea;
}

/* =======================
   HEADER
======================= */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  position: relative;
}

h1 {
  font-size: 36px;
  margin: 0;
}

/* =======================
   LIVE STATUS
======================= */

#status {
  position: absolute;
  top: 60px;
  left: 24px;
  font-size: 12px;
  opacity: 0.6;
}

/* =======================
   CONTROLS
======================= */

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

input {
  padding: 8px;
  width: 260px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

/* =======================
   GRID UI
======================= */

.artist {
  font-weight: 800;
  margin-top: 28px;
  padding-bottom: 8px;
  border-bottom: 1px solid #2a2a2a;
  cursor: pointer;

  display: flex;
  justify-content: space-between;
  align-items: center;
}

.count {
  font-size: 12px;
  opacity: 0.7;
  background: #1b1b1b;
  padding: 4px 8px;
  border-radius: 20px;
}

.group {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  margin-top: 12px;
  margin-bottom: 24px;
}

.record-card {
  padding: 10px 12px;
  background: #1b1b1b;
  border-radius: 10px;
  transition: 0.15s ease;
  display: flex;
  align-items: center;
}

.record-card:hover {
  background: #2a2a2a;
}

/* =======================
   DISCO (unchanged)
======================= */

#discoBallLight {
  width: 100px;
  height: 100px;
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 50%;
  background: white;
  opacity: 0.18;
  filter: blur(20px);
}

#discoBall {
  width: 100px;
  height: 100px;
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%) rotateX(70deg);
}

  </style>
</head>

<body>

<header>
  <h1>My Vinyl Collection</h1>

  <div id="discoBallLight"></div>
  <div id="discoBall"></div>

  <div class="controls">
    <input id="search" placeholder="Search records or artists..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>

  <div id="status">Loading cache...</div>
</header>

<div id="app">Loading...</div>

<script>

/* =======================
   SHEETS
======================= */

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

const COUNTS_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Counts";

/* =======================
   STATE
======================= */

let allData = [];
let artistRank = {};
let lastHash = "";

/* =======================
   HELPERS
======================= */

function norm(str) {
  return (str || "").toLowerCase().trim().replace(/\s+/g, " ");
}

function parseSheet(text) {
  const start = text.indexOf("{");
  const end = text.lastIndexOf("}");
  return JSON.parse(text.slice(start, end + 1));
}

/* simple change detector */
function hashData(data) {
  return JSON.stringify(data).length + ":" + data.length;
}

/* =======================
   CACHE LOAD (INSTANT)
======================= */

const cached = localStorage.getItem("vinyl_cache");

if (cached) {
  try {
    const data = JSON.parse(cached);
    allData = data.allData || [];
    artistRank = data.artistRank || {};

    render(allData);

    document.getElementById("status").innerText =
      "Loaded from cache";

  } catch (e) {
    console.log("cache error");
  }
}

/* =======================
   LIVE SYNC FETCH
======================= */

Promise.all([
  fetch(SHEET_URL).then(r => r.text()),
  fetch(COUNTS_URL).then(r => r.text())
])
.then(([recordsText, countsText]) => {

  const recordsJson = parseSheet(recordsText);
  const countsJson = parseSheet(countsText);

  const newData = (recordsJson.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v
    }))
    .filter(x => x.artist && x.record);

  const newRank = {};

  (countsJson.table.rows || []).forEach(r => {
    const artist = r.c?.[0]?.v;
    const count = r.c?.[1]?.v;
    if (artist) newRank[norm(artist)] = Number(count) || 0;
  });

  /* sort */
  newData.sort((a, b) =>
    (newRank[norm(b.artist)] ?? 0) - (newRank[norm(a.artist)] ?? 0)
  );

  const newHash = hashData(newData);

  /* =======================
     SMART DIFF UPDATE
  ======================= */

  if (newHash !== lastHash) {

    allData = newData;
    artistRank = newRank;
    lastHash = newHash;

    localStorage.setItem("vinyl_cache", JSON.stringify({
      allData,
      artistRank
    }));

    render(allData);

    document.getElementById("status").innerText =
      "Updated: " + new Date().toLocaleTimeString();
  }

})
.catch(err => {
  console.error(err);
  document.getElementById("status").innerText =
    "Offline / using cache";
});

/* =======================
   RENDER
======================= */

function render(data) {

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item.record);
  });

  let html = "";

  Object.keys(grouped).forEach(artist => {

    const records = grouped[artist];

    html += `
      <div class="artist" onclick="toggle('${artist.replace(/\s/g,'_')}')">
        <span>${artist}</span>
        <span class="count">${artistRank[norm(artist)] ?? records.length}</span>
      </div>

      <div class="group" id="group-${artist.replace(/\s/g,'_')}">
    `;

    records.forEach(r => {
      html += `<div class="record-card">${r}</div>`;
    });

    html += `</div>`;
  });

  document.getElementById("app").innerHTML = html;
}

/* =======================
   TOGGLE
======================= */

function toggle(a) {
  const el = document.getElementById("group-" + a);
  if (!el) return;
  el.classList.toggle("hidden");
}

/* =======================
   SEARCH
======================= */

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

/* =======================
   RANDOM
======================= */

function randomRecord() {
  const pick = allData[Math.floor(Math.random() * allData.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
