<!DOCTYPE html>
<html>
<head>

  <title>Sunday Crates</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>

:root {

  /* =========================
     DEFAULT: MIDNIGHT SHOP
  ========================= */

  --bg: #0b0c10;
  --panel: #14161b;
  --panel-2: #1a1d24;

  --text: #e6e1d9;
  --muted: #a8a39b;

  --accent: #d6a85c;

  --border: rgba(255,255,255,0.10);
  --shadow: rgba(0,0,0,0.55);

  --glow: rgba(214,168,92,0.10);
}

/* =========================
   NEON CRATES THEME
========================= */

body.theme-neon {
  --bg: #07060a;
  --panel: #151022;
  --panel-2: #1e1630;

  --text: #e9e3ff;
  --muted: #a79fbd;

  --accent: #7c5cff;

  --border: rgba(124,92,255,0.18);
  --shadow: rgba(0,0,0,0.6);

  --glow: rgba(124,92,255,0.18);
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Space Grotesk";
  overflow-x: hidden;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 6px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 10px;
  align-items: center;
}

input, button {
  font-family: "Sekuya";
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 10px;
}

/* THEME BUTTON */
#themeToggle {
  cursor: pointer;
}

/* OUTER */
#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

/* GRID */
#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* ARTIST */
.artist-block {
  display: flex;
  flex-direction: column;
}

.artist-header {
  padding: 8px 20px;
  font-family: "Bebas Neue";
  font-size: 26px;
  display: flex;
  justify-content: space-between;
}

/* SCROLLER */
.group {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  padding: 10px 16px;
  gap: 16px;
}

.group::-webkit-scrollbar {
  display: none;
}

.page {
  flex: 0 0 100%;
  display: flex;
  justify-content: center;
  scroll-snap-align: center;
}

/* CARD */
.record-card {
  height: 320px;
  width: 100%;
  max-width: 420px;

  background: linear-gradient(145deg, var(--panel), var(--panel-2));
  border-radius: 12px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  padding: 14px;

  position: relative;
  overflow: hidden;

  border: 1px solid var(--border);

  box-shadow:
    inset 0 2px 10px rgba(0,0,0,0.6),
    0 10px 30px var(--shadow);

  transition: transform 0.2s ease;
}

.record-card:hover {
  transform: translateY(-4px);
}

/* COVER */
.cover {
  width: 100%;
  max-width: 300px;
  height: 230px;

  object-fit: contain;
  border-radius: 10px;

  /* 🔥 reflection base */
  filter: brightness(1);
  transition: transform 0.2s ease;
}

/* TITLE */
.record-title {
  font-family: "Playfair Display";
  font-size: 24px;
  margin-top: 14px;
}

/* =========================
   VINYL REFLECTION LAYER
========================= */

.record-card::before {
  content: "";
  position: absolute;
  inset: 0;

  background: radial-gradient(
    circle at var(--x, 50%) var(--y, 50%),
    var(--glow),
    transparent 60%
  );

  pointer-events: none;
  transition: background 0.1s linear;
}

/* subtle sheen overlay */
.record-card::after {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;

  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.06),
    transparent
  );

  transform: rotate(25deg);
  pointer-events: none;
}

/* FOOTER */
.footer-status {
  font-family: "Space Grotesk";
  padding: 16px 40px;
  opacity: 0.6;
  text-align: right;
  color: var(--muted);
}

  </style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button id="themeToggle">Theme</button>
    <button onclick="randomRecord()">Random Dig</button>
  </div>
</header>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<div id="status" class="footer-status"></div>

<script>

let allData = [];
let lastFiltered = null;

/* =========================
   THEME TOGGLE
========================= */

document.getElementById("themeToggle").addEventListener("click", () => {
  document.body.classList.toggle("theme-neon");
});

/* =========================
   REFLECTION TRACKING
========================= */

document.addEventListener("mousemove", (e) => {
  document.querySelectorAll(".record-card").forEach(card => {
    const rect = card.getBoundingClientRect();

    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;

    card.style.setProperty("--x", `${x}%`);
    card.style.setProperty("--y", `${y}%`);
  });
});

/* =========================
   DATA
========================= */

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

async function load() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);
}

load();

/* =========================
   RENDER
========================= */

function render(data) {

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item);
  });

  const artists = Object.keys(grouped);

  let html = "";

  artists.forEach(artist => {

    html += `
      <div class="artist-block">

        <div class="artist-header">
          <span>${artist}</span>
          <span>${grouped[artist].length}</span>
        </div>

        <div class="group">
          <div class="page">
    `;

    grouped[artist].forEach(item => {
      html += `
        <div class="record-card">

          ${item.cover ? `<img src="${item.cover}" class="cover">` : ""}

          <div class="record-title">${item.record}</div>

        </div>
      `;
    });

    html += `
          </div>
        </div>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;

  lastFiltered = data;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  const filtered = allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  );

  render(filtered);
});

function randomRecord(){
  const pool = lastFiltered || allData;
  const pick = pool[Math.floor(Math.random()*pool.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
