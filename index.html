<!DOCTYPE html>
<html>
<head>
  <title>Vinyl Collection</title>

  <style>
html, body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom left, #111, #222);
  color: #eaeaea;
}

/* =======================
   HEADER
======================= */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  position: relative;
}

h1 {
  font-size: 36px;
  margin: 0;
  letter-spacing: 1px;
}

/* =======================
   DISCO BALL (unchanged)
======================= */

#discoBallLight {
  width: 100px;
  height: 100px;
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 50%;
  background: white;
  opacity: 0.18;
  filter: blur(20px);
}

#discoBall {
  width: 100px;
  height: 100px;
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%) rotateX(70deg);
  transform-style: preserve-3d;
  animation: spin 14s linear infinite;
}

.square {
  position: absolute;
  width: 6px;
  height: 6px;
  transform-style: preserve-3d;
}

.square div {
  width: 6px;
  height: 6px;
  position: absolute;
  backface-visibility: hidden;
  animation: shimmer 2s linear infinite;
}

@keyframes spin {
  from { transform: translateX(-50%) rotateX(70deg) rotateZ(0deg); }
  to   { transform: translateX(-50%) rotateX(70deg) rotateZ(360deg); }
}

@keyframes shimmer {
  0%   { opacity: 0.5; filter: brightness(60%); }
  50%  { opacity: 1;   filter: brightness(140%); }
  100% { opacity: 0.6; filter: brightness(90%); }
}

/* =======================
   CONTROLS
======================= */

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

input {
  padding: 8px;
  width: 260px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

/* =======================
   GRID SYSTEM
======================= */

.artist {
  font-weight: 800;
  margin-top: 28px;
  padding-bottom: 8px;
  border-bottom: 1px solid #2a2a2a;
  cursor: pointer;
  font-size: 18px;

  display: flex;
  justify-content: space-between;
  align-items: center;
}

.count {
  font-size: 12px;
  opacity: 0.7;
  background: #1b1b1b;
  padding: 4px 8px;
  border-radius: 20px;
}

.group {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  margin-top: 12px;
  margin-bottom: 24px;
}

.record-card {
  padding: 10px 12px;
  background: #1b1b1b;
  border-radius: 10px;
  transition: 0.15s ease;
  display: flex;
  align-items: center;
  min-height: 40px;
}

.record-card:hover {
  background: #2a2a2a;
  transform: translateY(-2px);
}

.hidden {
  display: none !important;
}

#app {
  padding: 0 24px 40px;
}

  </style>
</head>

<body>

<header>

  <h1>My Vinyl Collection</h1>

  <div id="discoBallLight"></div>
  <div id="discoBall"></div>

  <div class="controls">
    <input id="search" placeholder="Search records or artists..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>

</header>

<div id="app">Loading...</div>

<script>

/* =======================
   SHEETS
======================= */

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

const COUNTS_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Counts";

/* =======================
   DATA STORAGE
======================= */

let allData = [];
let artistRank = {};

/* =======================
   FETCH DATA
======================= */

Promise.all([
  fetch(SHEET_URL).then(r => r.text()),
  fetch(COUNTS_URL).then(r => r.text())
])
.then(([recordsText, countsText]) => {

  const recordsJson = JSON.parse(
    recordsText.substring(recordsText.indexOf("{"), recordsText.lastIndexOf("}") + 1)
  );

  const countsJson = JSON.parse(
    countsText.substring(countsText.indexOf("{"), countsText.lastIndexOf("}") + 1)
  );

  /* records */
  allData = recordsJson.table.rows.map(r => ({
    artist: r.c[1]?.v,
    record: r.c[2]?.v
  })).filter(x => x.artist && x.record);

  /* ranking map */
  countsJson.table.rows.forEach(r => {
    const artist = r.c[0]?.v;
    const count = r.c[1]?.v;

    if (artist) artistRank[artist] = count;
  });

  /* SORT HERE (KEY CHANGE) */
  allData.sort((a, b) => {
    return (artistRank[b.artist] ?? 0) - (artistRank[a.artist] ?? 0);
  });

  render(allData);
});

/* =======================
   RENDER (UNCHANGED LOGIC)
======================= */

function render(data) {

  const grouped = {};
  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item.record);
  });

  let html = "";

  Object.keys(grouped).forEach(artist => {

    const records = grouped[artist];

    html += `
      <div class="artist" onclick="toggle('${artist.replace(/\s/g, "_")}')">
        <span>${artist}</span>
        <span class="count">${artistRank[artist] ?? records.length}</span>
      </div>

      <div class="group" id="group-${artist.replace(/\s/g, "_")}">
    `;

    records.forEach(record => {
      html += `<div class="record-card">${record}</div>`;
    });

    html += `</div>`;
  });

  document.getElementById("app").innerHTML = html;
}

/* =======================
   TOGGLE
======================= */

function toggle(artist) {
  const el = document.getElementById("group-" + artist);
  if (!el) return;
  el.classList.toggle("hidden");
}

/* =======================
   SEARCH
======================= */

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

/* =======================
   RANDOM
======================= */

function randomRecord() {
  const pick = allData[Math.floor(Math.random() * allData.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

/* =======================
   DISCO BALL (unchanged)
======================= */

window.addEventListener("DOMContentLoaded", () => {

  const disco = document.getElementById("discoBall");

  const radius = 50;
  const squareSize = 6;
  const steps = 16;

  for (let t = 0; t < Math.PI; t += Math.PI / steps) {

    const z = radius * Math.cos(t);
    const r = Math.abs(radius * Math.sin(t));

    const count = Math.max(6, Math.floor((2 * Math.PI * r) / squareSize));
    const step = (Math.PI * 2) / count;

    for (let i = 0; i < Math.PI * 2; i += step) {

      const square = document.createElement("div");
      square.className = "square";

      const tile = document.createElement("div");

      const x = radius * Math.cos(i) * Math.sin(t);
      const y = radius * Math.sin(i) * Math.sin(t);

      square.style.transform =
        `translate3d(${x}px, ${y}px, ${z}px)`;

      square.appendChild(tile);
      disco.appendChild(square);
    }
  }

});

</script>

</body>
</html>
