<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sunday Crates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&family=DM+Sans:wght@300..700&display=swap" rel="stylesheet">

<style>

/* ========================= BASE ========================= */

body {
  margin: 0;
  background: #0e0b0c;
  color: #e4e1da;
  font-family: "Space Grotesk";
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 10px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

.controls {
  display: flex;
  gap: 10px;
  padding: 0 40px;
  margin-bottom: 20px;
  align-items: center;
}

button {
  font-family: "Sekuya";
  background: #1a1617;
  color: #e4e1da;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 6px 14px;
  height: 34px;
  cursor: pointer;
}

#searchBar {
  flex: 1;
  max-width: 300px;
  padding: 8px 12px;
  background: #1a1617;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  color: #e4e1da;
  font-family: "Space Grotesk";
  font-size: 14px;
  outline: none;
}

#searchBar::placeholder {
  color: rgba(228, 225, 218, 0.4);
}

#searchBar:focus {
  border-color: rgba(255,255,255,0.15);
}

/* ========================= GRID WALL ========================= */

#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

#app {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}

/* ========================= FOCUS MODE ========================= */

#app.focus-mode .letter-block {
  opacity: 0.28;
  filter: saturate(0.7) contrast(0.9);
  transform: scale(0.985);
}

#app.focus-mode .letter-block.active {
  opacity: 1;
  transform: scale(1.01) translateY(-2px);
  box-shadow: 0 22px 60px rgba(0,0,0,0.9);
}

/* ========================= CRATES ========================= */

.letter-block {
  background: #161314;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.04);
  overflow: hidden;
  transition: all 0.25s ease;
}

.letter-block.span-2 {
  grid-column: span 2;
}

.letter-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  font-family: "Sekuya";
  background: #e2ddd2;
  color: #181515;
  cursor: pointer;
  min-height: 60px;
}

.letter-header span:first-child {
  font-size: 36px;
  font-weight: bold;
}

.letter-header span:last-child {
  font-size: 22px;
  font-family: "Space Grotesk";
  text-align: right;
}

.letter-group {
  display: none;
  flex-direction: column;
  max-height: 55vh;
  overflow-y: auto;
  padding: 14px;
  background: #120f10;
  gap: 14px;
}

.letter-block.active .letter-group {
  display: flex;
}

/* ========================= RANDOM DIG CRATE ========================= */

.random-dig-block {
  background: #161314;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.04);
  overflow: hidden;
  transition: all 0.25s ease;
  cursor: pointer;
}

.random-dig-block:hover {
  filter: brightness(1.1);
}

.random-dig-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  background: #e2ddd2;
  color: #181515;
  min-height: 60px;
}

.random-dig-header-left {
  font-family: "Sekuya";
  font-size: 28px;
  font-weight: bold;
  line-height: 1;
  color: #181515;
}

.random-dig-header-right {
  font-family: "Space Grotesk";
  font-size: 15px;
  color: #181515;
  text-align: right;
  line-height: 1.4;
}

/* ========================= ARTISTS ========================= */

.artist-section {
  background: #1a1617;
  padding: 12px;
  border-radius: 10px;
}

.artist-name {
  font-size: 16px;
  text-transform: uppercase;
  opacity: 0.85;
  margin-bottom: 10px;
}

/* ========================= RECORDS ========================= */

.record-card {
  background: #1f1b1c;
  border-radius: 10px;
  padding: 8px;
  margin-bottom: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.record-card img {
  width: 100%;
  max-width: 90px;
  height: auto;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 6px;
  margin-bottom: 6px;
}

.record-title {
  font-family: "DM Sans";
  font-size: 12px;
  text-align: center;
  line-height: 1.3;
  word-break: break-word;
}

/* ========================= SPIN MODAL ========================= */

#spinModal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
}

#spinOverlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
}

#spinBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 700px;
  background: #151112;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 40px;
  text-align: center;
}

#spinTitle {
  font-family: "Bebas Neue";
  font-size: 28px;
  margin-bottom: 30px;
  opacity: 0.8;
  letter-spacing: 2px;
}

#spinContent {
  min-height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.carousel-container {
  width: 516px;
  height: 280px;
  overflow: hidden;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #0f0c0d;
  margin-bottom: 30px;
  display: flex;
  align-items: center;
  position: relative;
}

/* highlight the center slot */
.carousel-container::after {
  content: '';
  position: absolute;
  left: 50%;
  top: 10px;
  bottom: 10px;
  width: 160px;
  transform: translateX(-50%);
  border: 1px solid rgba(228, 225, 218, 0.15);
  border-radius: 10px;
  pointer-events: none;
}

.carousel {
  display: flex;
  gap: 12px;
  transition: none;
  padding: 0 10px;
}

.carousel-item {
  flex-shrink: 0;
  width: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0.3;
  transition: opacity 0.05s ease, transform 0.05s ease;
}

.carousel-item.active {
  opacity: 1;
  transform: scale(1.05);
}

.carousel-cover {
  width: 140px;
  height: 140px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 10px;
}

.carousel-text {
  font-size: 12px;
  text-align: center;
  opacity: 0.8;
  line-height: 1.3;
  max-width: 150px;
}

.result-text {
  font-family: "DM Sans";
  font-size: 14px;
  margin-bottom: 8px;
  opacity: 0.9;
}

.result-artist {
  font-family: "Bebas Neue";
  font-size: 24px;
  margin-bottom: 8px;
}

.result-record {
  font-family: "Bebas Neue";
  font-size: 20px;
  opacity: 0.8;
}

.spin-result {
  opacity: 0;
  animation: fadeIn 0.6s ease-out forwards;
  width: 100%;
}

@keyframes fadeIn {
  0% { opacity: 0; transform: scale(0.9); }
  100% { opacity: 1; transform: scale(1); }
}

.result-cover {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* ========================= ERROR STATE ========================= */

.error-message {
  text-align: center;
  padding: 2rem;
  opacity: 0.6;
  font-size: 14px;
}

</style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>
</header>

<div class="controls">
  <input type="text" id="searchBar" placeholder="Search artists or records...">
  <button onclick="toggleAll()">Expand / Collapse All</button>
</div>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<!-- SPIN MODAL -->
<div id="spinModal">
  <div id="spinOverlay"></div>
  <div id="spinBox">
    <div id="spinTitle">DIGGING...</div>
    <div id="spinContent">
      <div class="carousel-container">
        <div class="carousel" id="carousel"></div>
      </div>
      <div id="resultDisplay"></div>
    </div>
  </div>
</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let filteredData = [];

async function load(){
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const text = await res.text();
    const json = JSON.parse(
      text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
    );

    allData = (json.table.rows || [])
      .map(r => ({
        artist: r.c?.[1]?.v,
        record: r.c?.[2]?.v,
        cover: r.c?.[3]?.v
      }))
      .filter(x => x.artist && x.record);

    filteredData = [...allData];
    render(filteredData);
  } catch (e) {
    document.getElementById("app").innerHTML =
      '<div class="error-message">Could not load your crates. Please check your connection and refresh.</div>';
    console.error("Load error:", e);
  }
}

load();

/* SEARCH */
document.getElementById("searchBar").addEventListener("input", (e) => {
  const query = e.target.value.toLowerCase();
  filteredData = query.length === 0
    ? [...allData]
    : allData.filter(item =>
        item.artist.toLowerCase().includes(query) ||
        item.record.toLowerCase().includes(query)
      );
  render(filteredData);
});

/* TOGGLE */
function toggle(el){
  const block = el.closest(".letter-block");
  block.classList.toggle("active");
  const anyOpen = document.querySelector(".letter-block.active");
  document.getElementById("app").classList.toggle("focus-mode", !!anyOpen);
}

/* EXPAND ALL */
function toggleAll(){
  const blocks = document.querySelectorAll(".letter-block");
  const app = document.getElementById("app");
  const anyOpen = document.querySelector(".letter-block.active");
  if (anyOpen) {
    blocks.forEach(b => b.classList.remove("active"));
    app.classList.remove("focus-mode");
  } else {
    blocks.forEach(b => b.classList.add("active"));
    app.classList.add("focus-mode");
  }
}

/* RENDER */
function render(data){

  const alpha = {};
  const various = [];
  const numeric = {};

  data.forEach(item => {
    if (item.artist === "Various") {
      various.push(item);
      return;
    }
    if (/^[0-9]/.test(item.artist)) {
      if (!numeric["#"]) numeric["#"] = {};
      if (!numeric["#"][item.artist]) numeric["#"][item.artist] = [];
      numeric["#"][item.artist].push(item);
      return;
    }
    const letter = item.artist[0].toUpperCase();
    if (!alpha[letter]) alpha[letter] = {};
    if (!alpha[letter][item.artist]) alpha[letter][item.artist] = [];
    alpha[letter][item.artist].push(item);
  });

  let html = "";

  function build(title, group, isVarious = false){
    if (!group || Object.keys(group).length === 0) return;

    const totalRecords = Object.values(group).reduce((sum, r) => sum + r.length, 0);
    const totalArtists = Object.keys(group).length;
    const titleText = totalRecords === 1 ? 'Title' : 'Titles';
    const artistText = totalArtists === 1 ? 'Artist' : 'Artists';
    const countHTML = isVarious
      ? `${totalRecords} ${titleText}`
      : `${totalRecords} ${titleText}, ${totalArtists} ${artistText}`;
    const spanClass = isVarious ? 'span-2' : '';

    html += `
      <div class="letter-block ${spanClass}">
        <div class="letter-header">
          <span>${title}</span>
          <span>${countHTML}</span>
        </div>
        <div class="letter-group">
    `;

    Object.keys(group).sort().forEach(artist => {
      html += `<div class="artist-section"><div class="artist-name">${artist}</div>`;
      group[artist].forEach(r => {
        html += `
          <div class="record-card">
            ${r.cover ? `<img src="${r.cover}">` : ""}
            <div class="record-title">${r.record}</div>
          </div>`;
      });
      html += `</div>`;
    });

    html += `</div></div>`;
  }

  Object.keys(alpha).sort().forEach(l => build(l, alpha[l]));
  build("#", numeric["#"] || {});
  build("Various", { "Various": various }, true);

  // Random Dig crate
  const totalTitles = data.length;
  const uniqueArtists = new Set(data.map(r => r.artist)).size;
  const tText = totalTitles === 1 ? 'Title' : 'Titles';
  const aText = uniqueArtists === 1 ? 'Artist' : 'Artists';

  html += `
    <div class="random-dig-block" onclick="randomRecord()">
      <div class="random-dig-header">
        <div class="random-dig-header-left">Random<br>Dig</div>
        <div class="random-dig-header-right">${totalTitles} ${tText}<br>${uniqueArtists} ${aText}</div>
      </div>
    </div>
  `;

  document.getElementById("app").innerHTML = html;

  document.querySelectorAll(".letter-header").forEach(header => {
    header.addEventListener("click", () => toggle(header));
  });
  document.querySelectorAll(".letter-group").forEach(group => {
    group.addEventListener("click", (e) => e.stopPropagation());
  });
}

/* RANDOM RECORD SELECTOR */
function randomRecord(){
  const modal = document.getElementById("spinModal");
  const carousel = document.getElementById("carousel");
  const resultDisplay = document.getElementById("resultDisplay");

  modal.style.display = "block";
  carousel.innerHTML = "";
  resultDisplay.innerHTML = "";

  const dataSource = filteredData.length > 0 ? filteredData : allData;
  const winnerIndex = 50; // winner is always at index 50
  const winner = dataSource[Math.floor(Math.random() * dataSource.length)];

  // Build sequence:
  // 50 random records, then winner at index 50, then 1 more random after
  const sequence = [];
  for (let i = 0; i < 50; i++) {
    sequence.push(dataSource[Math.floor(Math.random() * dataSource.length)]);
  }
  sequence.push(winner); // index 50 = winner
  sequence.push(dataSource[Math.floor(Math.random() * dataSource.length)]); // index 51 = after

  sequence.forEach((record) => {
    const item = document.createElement("div");
    item.className = "carousel-item";
    item.innerHTML = `
      ${record.cover
        ? `<img src="${record.cover}" class="carousel-cover">`
        : '<div style="width:140px;height:140px;background:#1a1617;border-radius:8px;margin-bottom:10px;"></div>'}
      <div class="carousel-text">${record.artist} — ${record.record}</div>
    `;
    carousel.appendChild(item);
  });

  const items = Array.from(carousel.querySelectorAll(".carousel-item"));
  const duration = 3760;
  const startTime = performance.now();

  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function animate(now) {
    let progress = Math.min((now - startTime) / duration, 1);
    const eased = easeOutCubic(progress);

    // Animate from index 0 up to winnerIndex (50)
    const currentIndex = Math.round(eased * winnerIndex);

    items.forEach((item, idx) => {
      item.classList.toggle("active", idx === currentIndex);
    });

    // Center the active item in the window:
    // offset so that currentIndex is in the middle slot (slot 1 of 3)
    // window is 516px wide, items are 172px each (160 + 12 gap)
    // center slot starts at 172px from left
    const offset = Math.max(0, (currentIndex - 1) * 172);
    carousel.style.transform = `translateX(${-offset}px)`;

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      resultDisplay.innerHTML = `
        <div class="spin-result">
          ${winner.cover ? `<img src="${winner.cover}" class="result-cover">` : ""}
          <div class="result-text">You found:</div>
          <div class="result-artist">${winner.artist}</div>
          <div class="result-record">${winner.record}</div>
        </div>
      `;
    }
  }

  requestAnimationFrame(animate);
  modal.onclick = () => modal.style.display = "none";
}

</script>

</body>
</html>
