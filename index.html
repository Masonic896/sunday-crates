<!DOCTYPE html>
<html>
<head>

<title>Sunday Crates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #0f0507;
  color: #d8d9d3;
  font-family: "Space Grotesk";
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 10px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

/* SEARCH */
.search-bar input {
  width: 320px;
  max-width: 45vw;
  font-family: "Bebas Neue";
  background: white;
  color: #0f0507;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 16px;
  padding: 6px 10px;
  height: 34px;
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 10px;
  padding: 0 40px;
  margin-top: 10px;
  margin-bottom: 28px;
}

button {
  font-family: "Sekuya";
  background: #233d4d;
  color: #d8d9d3;
  border: 1px solid rgba(216,217,211,0.25);
  border-radius: 6px;
  font-size: 14px;
  padding: 6px 12px;
  height: 34px;
  cursor: pointer;
}

button:hover {
  filter: brightness(1.1);
}

/* GRID */
#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* CRATE */
.letter-block {
  background: rgba(0,0,0,0.18);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  overflow: hidden;
}

.letter-header {
  display: flex;
  justify-content: space-between;
  padding: 10px 14px;
  font-family: "Bebas Neue";
  font-size: 26px;
  background: #d8d9d3;
  color: #0f0507;
  cursor: pointer;
}

/* SCROLL */
.letter-group {
  display: none;
  max-height: 420px;
  overflow-y: auto;
  padding: 14px;
  background: rgba(0,0,0,0.25);
  flex-direction: column;
  gap: 14px;
}

.letter-block.active .letter-group {
  display: flex;
}

/* ARTIST */
.artist-section {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}

.artist-name {
  font-family: "Bebas Neue";
  font-size: 20px;
  margin-bottom: 12px;
}

/* RECORD */
.record-card {
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;

  margin-bottom: 10px;
  padding: 8px;

  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);

  display: flex;
  flex-direction: column;
  align-items: center;

  overflow: hidden; /* FIX */
}

.cover {
  width: 100%;
  max-width: 180px;
  height: 140px;
  object-fit: contain;
  border-radius: 6px;
}

.record-title {
  font-family: "Playfair Display";
  font-size: 15px;

  text-align: center;
  margin-top: 6px;

  width: 100%;
  max-width: 100%;

  line-height: 1.2;

  white-space: normal;
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;

  box-sizing: border-box; /* FIX */
}

/* RANDOM DIG MODAL */
#dig-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.dig-card {
  background: #111;
  border-radius: 12px;
  padding: 20px;
  max-width: 300px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
}

.dig-card img {
  width: 100%;
  height: 200px;
  object-fit: contain;
  border-radius: 8px;
}

.dig-title {
  font-family: "Playfair Display";
  margin-top: 10px;
  font-size: 18px;
}

.dig-artist {
  font-family: "Bebas Neue";
  font-size: 16px;
  opacity: 0.7;
}

</style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="search-bar">
    <input id="search" placeholder="Search..." />
  </div>
</header>

<div class="controls">
  <button id="toggleAllBtn" onclick="toggleAll()">Expand All</button>
  <button onclick="randomRecord()">Random Dig</button>
</div>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<!-- MODAL -->
<div id="dig-modal" onclick="closeDig()">
  <div class="dig-card">
    <img id="dig-img">
    <div class="dig-title" id="dig-title"></div>
    <div class="dig-artist" id="dig-artist"></div>
  </div>
</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let lastFiltered = null;
let expanded = false;

async function load(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);
}

load();

function render(data){

  const alpha = {};
  const various = [];
  const numeric = {};

  data.forEach(item => {

    const artist = item.artist;

    if (artist === "Various") {
      various.push(item);
      return;
    }

    if (/^[0-9]/.test(artist)) {
      if (!numeric["#"]) numeric["#"] = {};
      if (!numeric["#"][artist]) numeric["#"][artist] = [];
      numeric["#"][artist].push(item);
      return;
    }

    const letter = artist[0].toUpperCase();
    if (!alpha[letter]) alpha[letter] = {};
    if (!alpha[letter][artist]) alpha[letter][artist] = [];
    alpha[letter][artist].push(item);
  });

  let html = "";

  Object.keys(alpha).sort().forEach(letter => {

    html += `
      <div class="letter-block">
        <div class="letter-header" onclick="toggleOnly(this)">
          <span>${letter}</span>
          <span>${Object.keys(alpha[letter]).length}</span>
        </div>
        <div class="letter-group">
    `;

    Object.keys(alpha[letter]).sort().forEach(artist => {

      html += `
        <div class="artist-section">
          <div class="artist-name">${artist}</div>
      `;

      alpha[letter][artist].forEach(r => {
        html += `
          <div class="record-card">
            ${r.cover ? `<img src="${r.cover}" class="cover">` : ""}
            <div class="record-title">${r.record}</div>
          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  });

  if (various.length) {
    html += `
      <div class="letter-block">
        <div class="letter-header" onclick="toggleOnly(this)">
          <span>Various</span>
          <span>${various.length}</span>
        </div>
        <div class="letter-group">
          <div class="artist-section">
            <div class="artist-name">Various</div>
    `;

    various.forEach(r => {
      html += `
        <div class="record-card">
          ${r.cover ? `<img src="${r.cover}" class="cover">` : ""}
          <div class="record-title">${r.record}</div>
        </div>
      `;
    });

    html += `</div></div></div>`;
  }

  if (numeric["#"]) {
    html += `
      <div class="letter-block">
        <div class="letter-header" onclick="toggleOnly(this)">
          <span>#</span>
          <span>${Object.keys(numeric["#"]).length}</span>
        </div>
        <div class="letter-group">
    `;

    Object.keys(numeric["#"]).sort().forEach(artist => {

      html += `
        <div class="artist-section">
          <div class="artist-name">${artist}</div>
      `;

      numeric["#"][artist].forEach(r => {
        html += `
          <div class="record-card">
            ${r.cover ? `<img src="${r.cover}" class="cover">` : ""}
            <div class="record-title">${r.record}</div>
          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  }

  document.getElementById("app").innerHTML = html;
  lastFiltered = data;
}

function toggleOnly(el){
  const block = el.parentElement;
  document.querySelectorAll(".letter-block").forEach(b => {
    if (b !== block) b.classList.remove("active");
  });
  block.classList.toggle("active");
}

function toggleAll(){
  const blocks = document.querySelectorAll(".letter-block");
  expanded = !expanded;

  blocks.forEach(b => {
    expanded ? b.classList.add("active") : b.classList.remove("active");
  });

  document.getElementById("toggleAllBtn").innerText =
    expanded ? "Collapse All" : "Expand All";
}

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

/* RANDOM DIG */
function randomRecord(){
  const pool = lastFiltered || allData;
  const pick = pool[Math.floor(Math.random() * pool.length)];

  document.getElementById("dig-img").src = pick.cover || "";
  document.getElementById("dig-title").innerText = pick.record;
  document.getElementById("dig-artist").innerText = pick.artist;

  document.getElementById("dig-modal").style.display = "flex";
}

function closeDig(){
  document.getElementById("dig-modal").style.display = "none";
}

</script>

</body>
</html>
