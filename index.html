<!DOCTYPE html>
<html>
<head>
  <title>Vinyl Collection</title>

  <style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom left, #111, #222);
  color: #eaeaea;
}

/* =======================
   DISCO BALL BACKGROUND
======================= */

#discoBall {
  position: fixed;
  top: 45%;
  left: 50%;
  width: 140px;
  height: 140px;
  margin-left: -70px;
  transform-style: preserve-3d;
  animation: rotate 18s linear infinite;
  z-index: 0;
}

#discoBallLight {
  position: fixed;
  top: 45%;
  left: 50%;
  width: 140px;
  height: 140px;
  margin-left: -70px;
  background: white;
  border-radius: 50%;
  opacity: 0.15;
  filter: blur(25px);
  z-index: 0;
}

.square {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #ff8800;
  animation: flicker 1.5s infinite alternate;
}

@keyframes rotate {
  from { transform: rotateX(90deg) rotateZ(0deg); }
  to { transform: rotateX(90deg) rotateZ(360deg); }
}

@keyframes flicker {
  0% { opacity: 0.3; }
  50% { opacity: 1; }
  100% { opacity: 0.4; }
}

/* =======================
   UI LAYER
======================= */

h1, input, button, #app {
  position: relative;
  z-index: 2;
}

h1 {
  font-weight: 600;
  margin: 20px 0;
  letter-spacing: 1px;
}

input {
  padding: 8px;
  width: 300px;
  margin-bottom: 15px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px;
  margin-left: 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

/* =======================
   VINYL UI
======================= */

.artist {
  font-weight: 700;
  margin-top: 26px;
  padding-bottom: 6px;
  border-bottom: 1px solid #2a2a2a;
  cursor: pointer;
}

.group {
  display: block;
}

.record-card {
  margin-left: 20px;
  padding: 6px 10px;
  margin-bottom: 4px;
  background: #1b1b1b;
  border-radius: 6px;
  transition: 0.15s;
}

.record-card:hover {
  background: #2a2a2a;
  transform: translateX(4px);
}

  </style>
</head>

<body>

<!-- DISCO BALL -->
<div id="discoBallLight"></div>
<div id="discoBall"></div>

<h1>My Vinyl Collection</h1>

<input id="search" placeholder="Search records or artists..." />
<button onclick="randomRecord()">Random Dig</button>

<div id="app">Loading...</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

/* =======================
   LOAD SHEET DATA
======================= */

fetch(SHEET_URL)
  .then(res => res.text())
  .then(text => {

    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    allData = rows.map(r => ({
      artist: r.c[1]?.v,
      record: r.c[2]?.v
    })).filter(x => x.artist && x.record);

    render(allData);
  })
  .catch(err => {
    console.error(err);
    document.getElementById("app").innerHTML = "Error loading data";
  });

/* =======================
   RENDER UI
======================= */

function render(data) {
  let html = "";
  let currentArtist = "";
  let openGroup = false;

  data.forEach(item => {

    if (item.artist !== currentArtist) {

      if (openGroup) html += "</div>";

      currentArtist = item.artist;
      openGroup = true;

      html += `
        <div class="artist" onclick="toggleArtist('${item.artist.replace(/'/g,"")}')">
          ${item.artist}
        </div>
        <div id="group-${item.artist}" class="group">
      `;
    }

    html += `
      <div class="record-card">
        ${item.record}
      </div>
    `;
  });

  if (openGroup) html += "</div>";

  document.getElementById("app").innerHTML = html;
}

/* =======================
   SEARCH
======================= */

document.getElementById("search").addEventListener("input", function(e) {
  const val = e.target.value.toLowerCase();

  const filtered = allData.filter(item =>
    item.artist.toLowerCase().includes(val) ||
    item.record.toLowerCase().includes(val)
  );

  render(filtered);
});

/* =======================
   RANDOM DIG
======================= */

function randomRecord() {
  if (!allData.length) return;

  const pick = allData[Math.floor(Math.random() * allData.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

/* =======================
   COLLAPSE ARTISTS
======================= */

function toggleArtist(artist) {
  const el = document.getElementById("group-" + artist);
  if (!el) return;

  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* =======================
   DISCO BALL GENERATION
======================= */

const discoBall = document.getElementById("discoBall");

const squares = 120;

for (let i = 0; i < squares; i++) {
  const sq = document.createElement("div");
  sq.className = "square";
  discoBall.appendChild(sq);
}

</script>

</body>
</html>
