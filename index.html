<!DOCTYPE html>
<html>
<head>

  <title>Sunday Crates</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>

:root {
  --bg: #101316;
  --panel: #1a2026;
  --panel-2: #232b33;

  --text: #e6edf3;
  --muted: #9fb0c0;

  --accent: #6fb7ff;

  --border: rgba(159, 176, 192, 0.18);
  --shadow: rgba(0, 0, 0, 0.45);
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Space Grotesk";
  overflow-x: hidden;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 6px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

.controls {
  display: flex;
  gap: 10px;
}

input, button {
  font-family: "Sekuya";
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 10px;
}

/* OUTER WRAPPER */
#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

/* GRID */
#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* ARTIST BLOCK */
.artist-block {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* HEADER */
.artist-header {
  padding: 8px 20px;
  font-family: "Bebas Neue";
  font-size: 26px;
  display: flex;
  justify-content: space-between;
  color: var(--text);
}

.artist-header span:last-child {
  color: var(--muted);
}

/* SCROLLER */
.group {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;

  padding: 10px 16px;
  gap: 16px;
}

.group::-webkit-scrollbar {
  display: none;
}

/* PAGE */
.page {
  flex: 0 0 100%;
  display: flex;
  justify-content: center;
  scroll-snap-align: center;
}

/* CARD */
.record-card {
  height: 320px;
  width: 100%;
  max-width: 420px;

  background: linear-gradient(145deg, var(--panel), var(--panel-2));
  border-radius: 12px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  padding: 14px;

  position: relative;
  overflow: hidden;

  border: 1px solid var(--border);

  box-shadow:
    inset 0 2px 10px rgba(0,0,0,0.55),
    0 12px 30px var(--shadow);

  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.record-card:hover {
  transform: translateY(-4px);
  box-shadow:
    inset 0 2px 10px rgba(0,0,0,0.55),
    0 16px 40px rgba(0,0,0,0.6),
    0 0 18px rgba(111,183,255,0.08);
}

/* COVER */
.cover {
  width: 100%;
  max-width: 300px;
  height: 230px;
  object-fit: contain;
  margin: 0 auto;
  display: block;
  border-radius: 10px;
}

/* TITLE */
.record-title {
  font-family: "Playfair Display";
  font-size: 24px;
  text-align: center;
  margin-top: 14px;
  color: var(--text);
}

.record-title:hover {
  color: var(--accent);
}

/* =========================
   VINYL SLEEVE GLOSS LAYER
========================= */

.record-card::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: 12px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,0.10) 0%,
      rgba(255,255,255,0.04) 18%,
      transparent 40%
    ),
    linear-gradient(
      220deg,
      rgba(111,183,255,0.10),
      transparent 60%
    );

  mix-blend-mode: screen;
  opacity: 0.55;
}

/* sleeve edge / depth seal */
.record-card::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: 12px;

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.05),
    inset 0 -10px 20px rgba(0,0,0,0.25);
}

/* FOOTER */
.footer-status {
  font-family: "Space Grotesk";
  padding: 16px 40px;
  opacity: 0.6;
  text-align: right;
  color: var(--muted);
}

  </style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>
</header>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<div id="status" class="footer-status"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let lastFiltered = null;

async function load() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);
}

load();

function chunk(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) {
    out.push(arr.slice(i, i + size));
  }
  return out;
}

function getSortedArtists(grouped) {
  return Object.keys(grouped).sort((a, b) => {
    const diff = grouped[b].length - grouped[a].length;
    if (diff !== 0) return diff;
    return a.localeCompare(b);
  });
}

function render(data) {

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item);
  });

  const artists = getSortedArtists(grouped);

  let html = "";

  artists.forEach(artist => {

    const pages = chunk(grouped[artist], 1);

    html += `
      <div class="artist-block">

        <div class="artist-header">
          <span>${artist}</span>
          <span>${grouped[artist].length}</span>
        </div>

        <div class="group">
    `;

    pages.forEach(page => {

      html += `<div class="page">`;

      page.forEach(item => {
        html += `
          <div class="record-card">

            ${item.cover ? `<img src="${item.cover}" class="cover">` : ""}

            <div class="record-title">${item.record}</div>

          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById("app").innerHTML = html;

  lastFiltered = data;
}

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  const filtered = allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  );

  render(filtered);
});

function randomRecord(){
  const pool = lastFiltered || allData;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
