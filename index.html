<!DOCTYPE html>
<html>
<head>

  <title>Sunday Crates</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>

body {
  margin: 0;
  background: #0f0507;
  color: #d8d9d3;
  font-family: "Space Grotesk";
  overflow-x: hidden;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 6px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
  color: #d8d9d3;
}

.controls {
  display: flex;
  gap: 10px;
}

input {
  font-family: "Bebas Neue";
  background: white;
  color: #0f0507;
  border: 1px solid #ccc;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 18px;
}

button {
  font-family: "Sekuya";
  background: #233d4d;
  color: #d8d9d3;
  border: 1px solid rgba(216,217,211,0.25);
  padding: 6px 10px;
  cursor: pointer;
}

/* WRAPPER */
#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

/* =========================
   CRATE WALL (ARTIST GRID)
========================= */

#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* =========================
   CRATE (ARTIST BLOCK)
========================= */

.artist-block {
  background: linear-gradient(145deg, #1a1a1a, #141414);
  border: 1px solid rgba(216,217,211,0.12);
  border-radius: 10px;

  overflow: hidden;
  cursor: pointer;

  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.artist-block:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

/* =========================
   WOOD TAB HEADER (LIKE FILE FOLDER)
========================= */

.artist-header {
  position: relative;
  padding: 14px 16px;

  font-family: "Bebas Neue";
  font-size: 26px;

  background: linear-gradient(180deg, #2a1a14, #1b120e);
  border-bottom: 1px solid rgba(216,217,211,0.15);

  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* tab notch */
.artist-header::before {
  content: "";
  position: absolute;
  left: -6px;
  top: 12px;
  width: 10px;
  height: 18px;
  background: #0f0507;
  border-radius: 4px;
}

/* count */
.artist-count {
  font-size: 16px;
  opacity: 0.7;
}

/* =========================
   CRATE CONTENT (RECORDS)
========================= */

.artist-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, padding 0.3s ease;

  padding: 0 14px;
}

.artist-block.open .artist-content {
  max-height: 900px;
  padding: 14px;
}

/* RECORD GRID INSIDE CRATE */
.record-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

/* RECORD CARD */
.record-card {
  background: rgba(35, 61, 77, 0.18);
  border: 1px solid rgba(216,217,211,0.15);
  border-radius: 10px;

  padding: 12px;

  display: flex;
  flex-direction: column;
  align-items: center;

  transition: transform 0.2s ease;
}

.record-card:hover {
  transform: translateY(-3px);
}

/* COVER */
.cover {
  width: 100%;
  max-width: 240px;
  height: 180px;
  object-fit: contain;
  border-radius: 8px;
}

/* TITLE */
.record-title {
  font-family: "Playfair Display";
  font-size: 20px;
  text-align: center;
  margin-top: 10px;
}

/* FOOTER */
.footer-status {
  padding: 16px 40px;
  opacity: 0.7;
  text-align: right;
}

  </style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>
</header>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<div id="status" class="footer-status"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let lastFiltered = null;

async function load() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);
}

load();

/* toggle crate */
function toggleCrate(el) {
  el.classList.toggle("open");
}

/* group helper */
function groupByArtist(data) {
  const grouped = {};
  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item);
  });
  return grouped;
}

/* render */
function render(data) {

  const grouped = groupByArtist(data);

  let html = "";

  Object.keys(grouped).forEach(artist => {

    html += `
      <div class="artist-block" onclick="toggleCrate(this)">

        <div class="artist-header">
          <span>${artist}</span>
          <span class="artist-count">${grouped[artist].length}</span>
        </div>

        <div class="artist-content">

          <div class="record-grid">
    `;

    grouped[artist].forEach(item => {
      html += `
        <div class="record-card">
          ${item.cover ? `<img src="${item.cover}" class="cover">` : ""}
          <div class="record-title">${item.record}</div>
        </div>
      `;
    });

    html += `
          </div>
        </div>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;
  lastFiltered = data;
}

/* search */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  const filtered = allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  );

  render(filtered);
});

/* random */
function randomRecord(){
  const pool = lastFiltered || allData;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
