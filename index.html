<!DOCTYPE html>
<html>
<head>
  <title>Vinyl Collection</title>

  <style>
html, body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom left, #111, #222);
  color: #eaeaea;
}

/* =======================
   HEADER LAYOUT
======================= */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  position: relative;
}

/* LEFT TITLE */
h1 {
  font-size: 20px;
  margin: 0;
}

/* RIGHT CONTROLS */
.controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

input {
  padding: 8px;
  width: 260px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

/* =======================
   DISCO BALL (CENTER TOP)
======================= */

#discoWrapper {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 6px;
  width: 80px;
  height: 80px;
  perspective: 800px;
}

#discoBall {
  width: 80px;
  height: 80px;
  position: relative;
  transform-style: preserve-3d;
  animation: spin 10s linear infinite;
}

#discoBallLight {
  position: absolute;
  width: 80px;
  height: 80px;
  background: white;
  border-radius: 50%;
  opacity: 0.12;
  filter: blur(18px);
}

.square {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #ff9a00;
}

@keyframes spin {
  from { transform: rotateY(0deg) rotateX(15deg); }
  to { transform: rotateY(360deg) rotateX(15deg); }
}

/* =======================
   VINYL LIST
======================= */

#app {
  padding: 0 24px 40px 24px;
}

.artist {
  font-weight: 700;
  margin-top: 26px;
  padding-bottom: 6px;
  border-bottom: 1px solid #2a2a2a;
  cursor: pointer;
}

.group {
  display: block;
}

.record-card {
  margin-left: 20px;
  padding: 6px 10px;
  margin-bottom: 4px;
  background: #1b1b1b;
  border-radius: 6px;
  transition: 0.15s;
}

.record-card:hover {
  background: #2a2a2a;
  transform: translateX(4px);
}

  </style>
</head>

<body>

<header>

  <h1>My Vinyl Collection</h1>

  <!-- DISCO BALL -->
  <div id="discoWrapper">
    <div id="discoBallLight"></div>
    <div id="discoBall"></div>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search records or artists..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>

</header>

<div id="app">Loading...</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

/* =======================
   FETCH DATA
======================= */

fetch(SHEET_URL)
  .then(res => res.text())
  .then(text => {

    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    allData = rows.map(r => ({
      artist: r.c[1]?.v,
      record: r.c[2]?.v
    })).filter(x => x.artist && x.record);

    render(allData);
  });

/* =======================
   RENDER
======================= */

function render(data) {
  let html = "";
  let currentArtist = "";
  let openGroup = false;

  data.forEach(item => {

    if (item.artist !== currentArtist) {

      if (openGroup) html += "</div>";

      currentArtist = item.artist;
      openGroup = true;

      html += `
        <div class="artist" onclick="toggleArtist('${item.artist.replace(/'/g,"")}')">
          ${item.artist}
        </div>
        <div id="group-${item.artist}" class="group">
      `;
    }

    html += `
      <div class="record-card">
        ${item.record}
      </div>
    `;
  });

  if (openGroup) html += "</div>";

  document.getElementById("app").innerHTML = html;
}

/* =======================
   SEARCH
======================= */

document.getElementById("search").addEventListener("input", function(e) {
  const val = e.target.value.toLowerCase();

  const filtered = allData.filter(item =>
    item.artist.toLowerCase().includes(val) ||
    item.record.toLowerCase().includes(val)
  );

  render(filtered);
});

/* =======================
   RANDOM
======================= */

function randomRecord() {
  if (!allData.length) return;
  const pick = allData[Math.floor(Math.random() * allData.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

/* =======================
   COLLAPSE
======================= */

function toggleArtist(artist) {
  const el = document.getElementById("group-" + artist);
  if (!el) return;
  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* =======================
   DISCO BALL GENERATION
======================= */

const discoBall = document.getElementById("discoBall");

for (let i = 0; i < 140; i++) {
  const sq = document.createElement("div");
  sq.className = "square";

  const angle = Math.random() * Math.PI * 2;
  const radius = 35 + Math.random() * 5;

  const x = Math.cos(angle) * radius;
  const y = Math.sin(angle) * radius;
  const z = Math.random() * 40;

  sq.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;

  discoBall.appendChild(sq);
}

</script>

</body>
</html>
