<!DOCTYPE html>
<html>
<head>
  <title>Vinyl Collection</title>

  <style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #eaeaea;
  margin: 0;
}

/* =======================
   HEADER LAYOUT
======================= */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  position: relative;
}

h1 {
  font-size: 34px;
  margin: 0;
}

/* center disco container */
#discoWrap {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 10px;
}

/* right controls */
.controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

input {
  padding: 8px;
  width: 260px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

/* =======================
   STATUS
======================= */

#status {
  font-size: 12px;
  opacity: 0.6;
  padding-left: 24px;
}

/* =======================
   DISCO BALL (simple working version)
======================= */

#discoBall {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff, #999 40%, #222 80%);
  animation: spin 6s linear infinite;
  box-shadow: 0 0 25px rgba(255,255,255,0.2);
}

@keyframes spin {
  from { transform: rotateY(0deg) rotateX(20deg); }
  to   { transform: rotateY(360deg) rotateX(20deg); }
}

/* =======================
   GRID LIST
======================= */

#app {
  padding: 0 24px 40px;
}

.artist {
  font-weight: 700;
  margin-top: 26px;
  padding-bottom: 6px;
  border-bottom: 1px solid #2a2a2a;
  cursor: pointer;
}

.record-card {
  margin-left: 20px;
  padding: 6px 10px;
  margin-bottom: 4px;
  background: #1b1b1b;
  border-radius: 6px;
}

.record-card:hover {
  background: #2a2a2a;
}

.group {
  display: block;
}

.hidden {
  display: none;
}

  </style>
</head>

<body>

<header>

  <!-- LEFT -->
  <h1>My Vinyl Collection</h1>

  <!-- CENTER DISCO -->
  <div id="discoWrap">
    <div id="discoBall"></div>
  </div>

  <!-- RIGHT -->
  <div class="controls">
    <input id="search" placeholder="Search records or artists..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>

</header>

<div id="status">Loading...</div>

<div id="app">Loading...</div>

<script>

/* =======================
   SHEET
======================= */

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

/* =======================
   CACHE
======================= */

const cached = localStorage.getItem("vinyl_cache");

if (cached) {
  try {
    allData = JSON.parse(cached);
    render(allData);
    document.getElementById("status").innerText = "Loaded from cache";
  } catch (e) {}
}

/* =======================
   LIVE FETCH
======================= */

async function load() {
  try {

    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const json = JSON.parse(
      text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
    );

    allData = (json.table.rows || [])
      .map(r => ({
        artist: r.c?.[1]?.v,
        record: r.c?.[2]?.v
      }))
      .filter(x => x.artist && x.record);

    localStorage.setItem("vinyl_cache", JSON.stringify(allData));

    render(allData);

    document.getElementById("status").innerText =
      "Updated: " + new Date().toLocaleTimeString();

  } catch (err) {
    document.getElementById("status").innerText =
      "Offline (cache active)";
  }
}

load();

/* =======================
   RENDER
======================= */

function render(data) {

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item.record);
  });

  let html = "";

  Object.keys(grouped).forEach(artist => {

    html += `
      <div class="artist" onclick="toggle('${artist.replace(/\s/g,'_')}')">
        ${artist}
      </div>

      <div class="group" id="group-${artist.replace(/\s/g,'_')}">
    `;

    grouped[artist].forEach(record => {
      html += `<div class="record-card">${record}</div>`;
    });

    html += `</div>`;
  });

  document.getElementById("app").innerHTML = html;
}

/* =======================
   TOGGLE
======================= */

function toggle(id) {
  const el = document.getElementById("group-" + id);
  if (el) el.classList.toggle("hidden");
}

/* =======================
   SEARCH
======================= */

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

/* =======================
   RANDOM
======================= */

function randomRecord() {
  const pick = allData[Math.floor(Math.random() * allData.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
