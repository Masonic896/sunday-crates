<!DOCTYPE html>
<html>
<head>

  <title>Sunday Crates</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>

body {
  margin: 0;
  background: #074f57;
  color: #e9f6f3;
  font-family: "Space Grotesk";
  overflow-x: hidden;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 6px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

.controls {
  display: flex;
  gap: 10px;
}

input, button {
  font-family: "Sekuya";
  background: #077187;
  border: 1px solid rgba(228, 197, 175, 0.25);
  color: #e9f6f3;
  padding: 6px 10px;
}

/* WRAPPER */
#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

/* GRID */
#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* ARTIST BLOCK */
.artist-block {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* HEADER */
.artist-header {
  padding: 8px 20px;
  font-family: "Bebas Neue";
  font-size: 26px;
  display: flex;
  justify-content: space-between;
}

/* =========================
   CRATE LANE (MOMENTUM SCROLL)
========================= */

.group {
  display: flex;
  overflow-x: auto;
  gap: 16px;
  padding: 10px 16px;

  scroll-snap-type: x mandatory;
  scroll-behavior: auto;

  cursor: grab;

  -webkit-overflow-scrolling: touch;
}

.group:active {
  cursor: grabbing;
}

.group::-webkit-scrollbar {
  display: none;
}

/* PAGE */
.page {
  flex: 0 0 100%;
  display: flex;
  justify-content: center;
  scroll-snap-align: center;
}

/* CARD */
.record-card {
  height: 320px;
  width: 100%;
  max-width: 420px;

  background: linear-gradient(145deg, #077187, #064a51);
  border-radius: 12px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  padding: 14px;

  position: relative;
  overflow: hidden;

  border: 1px solid rgba(228, 197, 175, 0.18);

  box-shadow:
    inset 0 2px 10px rgba(0,0,0,0.35),
    0 10px 30px rgba(0,0,0,0.35);

  transition: transform 0.2s ease;
}

.record-card:hover {
  transform: translateY(-4px);
}

/* COVER */
.cover {
  width: 100%;
  max-width: 300px;
  height: 230px;
  object-fit: contain;
  display: block;
  border-radius: 10px;
}

/* TITLE */
.record-title {
  font-family: "Playfair Display";
  font-size: 24px;
  text-align: center;
  margin-top: 14px;
  color: #e4c5af;
}

/* SHINE */
.record-card::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;

  background: linear-gradient(
    120deg,
    transparent,
    rgba(228, 197, 175, 0.08),
    transparent
  );

  transform: rotate(25deg);
}

/* FOOTER */
.footer-status {
  font-family: "Space Grotesk";
  padding: 16px 40px;
  opacity: 0.7;
  text-align: right;
}

  </style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>
</header>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<div id="status" class="footer-status"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let lastFiltered = null;

/* stable sorting */
function getSortedArtists(grouped) {
  return Object.keys(grouped).sort((a, b) => a.localeCompare(b));
}

/* MOMENTUM DRAG SYSTEM */
function enableDrag(el) {
  let isDown = false;
  let startX;
  let scrollLeft;
  let velocity = 0;
  let lastX;
  let frame;

  el.addEventListener("pointerdown", (e) => {
    isDown = true;
    el.setPointerCapture(e.pointerId);

    startX = e.pageX;
    scrollLeft = el.scrollLeft;
    lastX = e.pageX;
    velocity = 0;

    cancelAnimationFrame(frame);
  });

  el.addEventListener("pointermove", (e) => {
    if (!isDown) return;

    const x = e.pageX;
    const walk = (x - startX);

    el.scrollLeft = scrollLeft - walk;

    velocity = x - lastX;
    lastX = x;
  });

  const momentum = () => {
    if (Math.abs(velocity) < 0.5) return;

    el.scrollLeft -= velocity * 1.2;
    velocity *= 0.92;

    frame = requestAnimationFrame(momentum);
  };

  el.addEventListener("pointerup", () => {
    isDown = false;
    frame = requestAnimationFrame(momentum);
  });

  el.addEventListener("pointerleave", () => {
    isDown = false;
    frame = requestAnimationFrame(momentum);
  });
}

/* LOAD */
async function load() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);
}

load();

/* RENDER */
function render(data) {

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item);
  });

  const artists = getSortedArtists(grouped);

  let html = "";

  artists.forEach(artist => {

    const pages = chunk(grouped[artist], 1);

    html += `
      <div class="artist-block">

        <div class="artist-header">
          <span>${artist}</span>
          <span>${grouped[artist].length}</span>
        </div>

        <div class="group">
    `;

    pages.forEach(page => {

      html += `<div class="page">`;

      page.forEach(item => {
        html += `
          <div class="record-card">

            ${item.cover ? `<img src="${item.cover}" class="cover">` : ""}

            <div class="record-title">${item.record}</div>

          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  });

  const app = document.getElementById("app");
  app.innerHTML = html;

  /* activate drag physics AFTER render */
  document.querySelectorAll(".group").forEach(enableDrag);

  lastFiltered = data;
}

/* chunk helper */
function chunk(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) {
    out.push(arr.slice(i, i + size));
  }
  return out;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

function randomRecord(){
  const pool = lastFiltered || allData;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
