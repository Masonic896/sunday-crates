<!DOCTYPE html>
<html>
<head>
  <title>Vinyl Collection</title>

  <style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #eaeaea;
  margin: 0;
}

/* =======================
   HEADER
======================= */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  position: relative;
}

h1 {
  font-size: 34px;
  margin: 0;
}

/* disco */
#discoWrap {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 10px;
}

#discoBall {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff, #999 40%, #222 80%);
  animation: spin 6s linear infinite;
  box-shadow: 0 0 25px rgba(255,255,255,0.2);
}

@keyframes spin {
  from { transform: rotateY(0deg) rotateX(20deg); }
  to   { transform: rotateY(360deg) rotateX(20deg); }
}

/* controls */
.controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

input {
  padding: 8px;
  width: 260px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

/* =======================
   STATUS
======================= */

#status {
  font-size: 12px;
  opacity: 0.6;
  padding: 10px 24px 0;
}

/* =======================
   ARTIST GRID
======================= */

#app {
  padding: 0 24px 40px;

  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

@media (max-width: 1000px) {
  #app {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 650px) {
  #app {
    grid-template-columns: 1fr;
  }
}

/* =======================
   ARTIST CARD
======================= */

.artist-block {
  background: #151515;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* PERFECT CENTER HEADER */
.artist-header {
  padding: 16px 12px;
  font-weight: 800;
  font-size: 18px;

  cursor: pointer;

  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;

  border-bottom: 1px solid #222;
  background: #141414;
}

.artist-header:hover {
  background: #1a1a1a;
}

/* true center name */
.artist-header span:first-child {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

/* count right aligned */
.artist-header span:last-child {
  position: absolute;
  right: 12px;
  font-size: 14px;
  opacity: 0.7;
}

/* =======================
   RECORD GRID
======================= */

.group {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;

  padding: 10px;

  /* animation */
  max-height: 1000px;
  overflow: hidden;
  transition: max-height 0.35s ease, opacity 0.25s ease;
  opacity: 1;
}

.group.hidden {
  max-height: 0;
  opacity: 0;
  padding-top: 0;
  padding-bottom: 0;
}

/* tiles */
.record-card {
  background: #1b1b1b;
  border-radius: 8px;
  padding: 12px;

  display: flex;
  align-items: center;
  justify-content: center;

  text-align: center;
  min-height: 55px;

  transition: 0.15s ease;
}

.record-card:hover {
  background: #2a2a2a;
  transform: scale(1.03);
}

  </style>
</head>

<body>

<header>

  <h1>My Vinyl Collection</h1>

  <div id="discoWrap">
    <div id="discoBall"></div>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search records or artists..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>

</header>

<div id="status">Loading...</div>
<div id="app">Loading...</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

/* CACHE */
const cached = localStorage.getItem("vinyl_cache");

if (cached) {
  try {
    allData = JSON.parse(cached);
    render(allData);
    document.getElementById("status").innerText = "Loaded from cache";
  } catch (e) {}
}

/* LOAD */
async function load() {
  try {

    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const json = JSON.parse(
      text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
    );

    allData = (json.table.rows || [])
      .map(r => ({
        artist: r.c?.[1]?.v,
        record: r.c?.[2]?.v
      }))
      .filter(x => x.artist && x.record);

    localStorage.setItem("vinyl_cache", JSON.stringify(allData));

    render(allData);

    document.getElementById("status").innerText =
      "Updated: " + new Date().toLocaleTimeString();

  } catch (err) {
    document.getElementById("status").innerText =
      "Offline (cache active)";
  }
}

load();

/* =======================
   RENDER
======================= */

function render(data) {

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item.record);
  });

  let html = "";

  Object.keys(grouped)
    .sort() // alphabetical
    .forEach(artist => {

      const id = artist.replace(/[^a-zA-Z0-9]/g, "_");

      html += `
        <div class="artist-block">

          <div class="artist-header" onclick="toggle('${id}')">
            <span>${artist}</span>
            <span>${grouped[artist].length}</span>
          </div>

          <div class="group" id="group-${id}">
      `;

      grouped[artist].forEach(record => {
        html += `<div class="record-card">${record}</div>`;
      });

      html += `
          </div>
        </div>
      `;
    });

  document.getElementById("app").innerHTML = html;
}

/* TOGGLE */
function toggle(id) {
  const el = document.getElementById("group-" + id);
  if (el) el.classList.toggle("hidden");
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

/* RANDOM */
function randomRecord() {
  const pick = allData[Math.floor(Math.random() * allData.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
