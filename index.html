<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sunday Crates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&family=DM+Sans:wght@300..700&display=swap" rel="stylesheet">

<style>

/* ========================= BASE ========================= */

body {
  margin: 0;
  background: #0e0b0c;
  color: #e4e1da;
  font-family: "Space Grotesk";
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 10px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

.controls {
  display: flex;
  gap: 10px;
  padding: 0 40px;
  margin-bottom: 20px;
}

button {
  font-family: "Sekuya";
  background: #1a1617;
  color: #e4e1da;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 6px 14px;
  height: 34px;
  cursor: pointer;
}

/* ========================= GRID WALL ========================= */

#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

#app {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}

/* ========================= FOCUS MODE ========================= */

#app.focus-mode .letter-block {
  opacity: 0.28;
  filter: saturate(0.7) contrast(0.9);
  transform: scale(0.985);
}

#app.focus-mode .letter-block.active {
  opacity: 1;
  transform: scale(1.01) translateY(-2px);
  box-shadow: 0 22px 60px rgba(0,0,0,0.9);
}

/* ========================= CRATES ========================= */

.letter-block {
  background: #161314;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.04);
  overflow: hidden;
  transition: all 0.25s ease;
}

.letter-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  font-family: "Sekuya";
  font-size: 48px;
  background: #e2ddd2;
  color: #181515;
  cursor: pointer;
}

.letter-header span:first-child {
  font-size: 48px;
  font-weight: bold;
}

.letter-header span:last-child {
  font-size: 14px;
  font-family: "Space Grotesk";
}

.letter-group {
  display: none;
  flex-direction: column;
  max-height: 55vh;
  overflow-y: auto;
  padding: 14px;
  background: #120f10;
  gap: 14px;
}

.letter-block.active .letter-group {
  display: flex;
}

/* ========================= ARTISTS ========================= */

.artist-section {
  background: #1a1617;
  padding: 12px;
  border-radius: 10px;
}

.artist-name {
  font-size: 16px;
  text-transform: uppercase;
  opacity: 0.85;
  margin-bottom: 10px;
}

/* ========================= RECORDS ========================= */

.record-card {
  background: #1f1b1c;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.record-title {
  font-family: "DM Sans";
  font-size: 14px;
  margin-top: 6px;
  text-align: center;
}

/* ========================= SPIN MODAL ========================= */

#spinModal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
}

#spinOverlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
}

#spinBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 520px;
  background: #151112;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 40px;
  text-align: center;
}

#spinTitle {
  font-family: "Bebas Neue";
  font-size: 28px;
  margin-bottom: 30px;
  opacity: 0.8;
  letter-spacing: 2px;
}

#spinContent {
  min-height: 200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.spin-loader {
  width: 50px;
  height: 50px;
  border: 3px solid rgba(228, 225, 218, 0.2);
  border-top: 3px solid #e4e1da;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.spin-result {
  opacity: 0;
  animation: fadeIn 0.6s ease-out forwards;
}

@keyframes fadeIn {
  0% { 
    opacity: 0;
    transform: scale(0.9);
  }
  100% { 
    opacity: 1;
    transform: scale(1);
  }
}

.result-cover {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.result-text {
  font-family: "DM Sans";
  font-size: 16px;
  margin-bottom: 8px;
  opacity: 0.9;
}

.result-artist {
  font-family: "Bebas Neue";
  font-size: 24px;
  margin-bottom: 8px;
}

.result-record {
  font-family: "Bebas Neue";
  font-size: 20px;
  opacity: 0.8;
}

/* ========================= ERROR STATE ========================= */

.error-message {
  text-align: center;
  padding: 2rem;
  opacity: 0.6;
  font-size: 14px;
}

</style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>
</header>

<div class="controls">
  <button onclick="toggleAll()">Expand / Collapse All</button>
  <button onclick="randomRecord()">Random Dig</button>
</div>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<!-- SPIN MODAL -->
<div id="spinModal">
  <div id="spinOverlay"></div>
  <div id="spinBox">
    <div id="spinTitle">DIGGING...</div>
    <div id="spinContent">
      <div class="spin-loader"></div>
    </div>
  </div>
</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

async function load(){
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const text = await res.text();
    const json = JSON.parse(
      text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
    );

    allData = (json.table.rows || [])
      .map(r => ({
        artist: r.c?.[1]?.v,
        record: r.c?.[2]?.v,
        cover: r.c?.[3]?.v
      }))
      .filter(x => x.artist && x.record);

    render(allData);
  } catch (e) {
    document.getElementById("app").innerHTML = 
      '<div class="error-message">Could not load your crates. Please check your connection and refresh.</div>';
    console.error("Load error:", e);
  }
}

load();

/* TOGGLE */
function toggle(el){
  const block = el.closest(".letter-block");
  block.classList.toggle("active");

  const anyOpen = document.querySelector(".letter-block.active");
  document.getElementById("app").classList.toggle("focus-mode", !!anyOpen);
}

/* EXPAND ALL */
function toggleAll(){
  const blocks = document.querySelectorAll(".letter-block");
  const app = document.getElementById("app");
  const anyOpen = document.querySelector(".letter-block.active");

  if (anyOpen) {
    blocks.forEach(b => b.classList.remove("active"));
    app.classList.remove("focus-mode");
  } else {
    blocks.forEach(b => b.classList.add("active"));
    app.classList.add("focus-mode");
  }
}

/* RENDER */
function render(data){

  const alpha = {};
  const various = [];
  const numeric = {};

  data.forEach(item => {

    if (item.artist === "Various") {
      various.push(item);
      return;
    }

    if (/^[0-9]/.test(item.artist)) {
      if (!numeric["#"]) numeric["#"] = {};
      if (!numeric["#"][item.artist]) numeric["#"][item.artist] = [];
      numeric["#"][item.artist].push(item);
      return;
    }

    const letter = item.artist[0].toUpperCase();
    if (!alpha[letter]) alpha[letter] = {};
    if (!alpha[letter][item.artist]) alpha[letter][item.artist] = [];
    alpha[letter][item.artist].push(item);
  });

  let html = "";

  function build(title, group){

    if (!group || Object.keys(group).length === 0) return;

    const totalRecords = Object.values(group).reduce((sum, records) => sum + records.length, 0);
    const totalArtists = Object.keys(group).length;
    const titleText = totalRecords === 1 ? 'Title' : 'Titles';
    const artistText = totalArtists === 1 ? 'Artist' : 'Artists';

    html += `
      <div class="letter-block">
        <div class="letter-header">
          <span>${title}</span>
          <span>${totalRecords} ${titleText}, ${totalArtists} ${artistText}</span>
        </div>
        <div class="letter-group" onclick="toggle(event.currentTarget.parentElement.querySelector('.letter-header'))">
    `;

    Object.keys(group).sort().forEach(artist => {

      html += `
        <div class="artist-section">
          <div class="artist-name">${artist}</div>
      `;

      group[artist].forEach(r => {
        html += `
          <div class="record-card">
            ${r.cover ? `<img src="${r.cover}" class="spin-cover">` : ""}
            <div class="record-title">${r.record}</div>
          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  }

  Object.keys(alpha).sort().forEach(l => build(l, alpha[l]));
  build("Various", { "Various": various });
  build("#", numeric["#"] || {});

  document.getElementById("app").innerHTML = html;

  // Attach toggle listeners to headers
  document.querySelectorAll(".letter-header").forEach(header => {
    header.addEventListener("click", () => toggle(header));
  });
}

/* RANDOM RECORD SELECTOR */
function randomRecord(){
  const modal = document.getElementById("spinModal");
  const content = document.getElementById("spinContent");

  modal.style.display = "block";
  
  // Show loading state
  content.innerHTML = '<div class="spin-loader"></div>';

  // Simulate digging time
  setTimeout(() => {
    const winner = allData[Math.floor(Math.random() * allData.length)];

    let resultHTML = '<div class="spin-result">';
    
    if (winner.cover) {
      resultHTML += `<img src="${winner.cover}" class="result-cover">`;
    }
    
    resultHTML += `
      <div class="result-text">You found:</div>
      <div class="result-artist">${winner.artist}</div>
      <div class="result-record">${winner.record}</div>
    </div>`;

    content.innerHTML = resultHTML;
  }, 2500);

  modal.onclick = () => modal.style.display = "none";
}

</script>

</body>
</html>
