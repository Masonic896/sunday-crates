<!DOCTYPE html>
<html>
<head>
  <title>Vinyl Collection</title>

  <style>
html {
  width: 100%;
  height: 100%;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom left, #111, #222);
  color: #eaeaea;
  padding: 24px;
  margin: 0;
}

/* DISCO BALL BACKGROUND */
#discoBall {
  transform-style: preserve-3d;
  width: 120px;
  height: 120px;
  position: fixed;
  top: 40%;
  left: 50%;
  margin-left: -60px;
  animation: rotateDiscoBall 18s linear infinite;
  z-index: 0;
}

#discoBallLight {
  width: 120px;
  height: 120px;
  position: fixed;
  top: 40%;
  left: 50%;
  margin-left: -60px;
  border-radius: 100%;
  background-color: white;
  opacity: 0.15;
  filter: blur(25px);
  z-index: 0;
}

@keyframes rotateDiscoBall {
  0% { transform: rotateX(90deg) rotateZ(0deg); }
  100% { transform: rotateX(90deg) rotateZ(360deg); }
}

/* UI ABOVE BACKGROUND */
h1, input, button, #app {
  position: relative;
  z-index: 2;
}

h1 {
  font-weight: 600;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

input {
  padding: 8px;
  width: 300px;
  margin-bottom: 15px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px;
  margin-left: 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

/* VINYL UI */
.record-card {
  margin-left: 20px;
  padding: 6px 10px;
  margin-bottom: 4px;
  background: #1b1b1b;
  border-radius: 6px;
  transition: 0.15s;
}

.record-card:hover {
  background: #2a2a2a;
  transform: translateX(4px);
}

.artist {
  font-weight: 700;
  margin-top: 26px;
  padding-bottom: 6px;
  border-bottom: 1px solid #2a2a2a;
  color: #ffffff;
  cursor: pointer;
}

.group {
  display: block;
}
  </style>
</head>

<body>

<!-- DISCO BALL -->
<div id="discoBallLight"></div>
<div id="discoBall"></div>

<h1>My Vinyl Collection</h1>

<input id="search" placeholder="Search records or artists..." />
<button onclick="randomRecord()">Random Dig</button>

<div id="app">Loading...</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

fetch(SHEET_URL)
  .then(res => res.text())
  .then(text => {

    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    allData = rows.map(r => ({
      artist: r.c[1]?.v,
      record: r.c[2]?.v
    })).filter(x => x.artist && x.record);

    render(allData);
  })
  .catch(err => {
    console.error(err);
    document.getElementById("app").innerHTML = "Error loading data";
  });

function render(data) {
  let html = "";
  let currentArtist = "";
  let openGroup = false;

  data.forEach(item => {

    if (item.artist !== currentArtist) {

      if (openGroup) html += "</div>";

      currentArtist = item.artist;
      openGroup = true;

      html += `
        <div class="artist" onclick="toggleArtist('${item.artist.replace(/'/g,"")}')">
          ${item.artist}
        </div>
        <div id="group-${item.artist}" class="group">
      `;
    }

    html += `
      <div class="record-card">
        ${item.record}
      </div>
    `;
  });

  if (openGroup) html += "</div>";

  document.getElementById("app").innerHTML = html;
}

document.getElementById("search").addEventListener("input", function(e) {
  const val = e.target.value.toLowerCase();

  const filtered = allData.filter(item =>
    item.artist.toLowerCase().includes(val) ||
    item.record.toLowerCase().includes(val)
  );

  render(filtered);
});

function randomRecord() {
  if (!allData.length) return;

  const pick = allData[Math.floor(Math.random() * allData.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

function toggleArtist(artist) {
  const el = document.getElementById("group-" + artist);
  if (!el) return;

  el.style.display = el.style.display === "none" ? "block" : "none";
}

</script>

</body>
</html>
