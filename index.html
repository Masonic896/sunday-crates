<!DOCTYPE html>
<html>
<head>

<title>Sunday Crates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #0f0507;
  color: #d8d9d3;
  font-family: "Space Grotesk";
}

/* HEADER (UNCHANGED) */
header {
  display: flex;
  justify-content: space-between;
  padding: 22px 40px 6px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 10px;
  align-items: center;
}

input {
  font-family: "Bebas Neue";
  background: white;
  color: #0f0507;

  border: 1px solid #ccc;
  border-radius: 6px;

  font-size: 16px;

  padding: 6px 10px;
  height: 34px;

  box-sizing: border-box;
}

button {
  font-family: "Sekuya";
  background: #233d4d;
  color: #d8d9d3;

  border: 1px solid rgba(216,217,211,0.25);
  border-radius: 6px;

  font-size: 14px;

  padding: 6px 12px;
  height: 34px;

  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  white-space: nowrap;
}

button:hover {
  filter: brightness(1.1);
}

/* WALL */
#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* CRATES */
.letter-block {
  background: rgba(0,0,0,0.18);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  overflow: hidden;
}

.letter-header {
  display: flex;
  justify-content: space-between;
  padding: 10px 14px;
  font-family: "Bebas Neue";
  font-size: 26px;
  background: #d8d9d3;
  color: #0f0507;
}

/* LANE */
.letter-group {
  display: none;
  padding: 14px;
  background: rgba(0,0,0,0.25);

  overflow-x: auto;
  display: flex;
  flex-direction: row;
  gap: 14px;
}

.letter-block.active .letter-group {
  display: flex;
}

/* ARTIST */
.artist-section {
  min-width: 100%;
  flex: 0 0 auto;

  padding: 10px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}

.artist-name {
  font-family: "Bebas Neue";
  font-size: 20px;
  margin-bottom: 12px;
}

/* RECORD */
.record-card {
  width: 100%;
  box-sizing: border-box;

  margin-bottom: 10px;
  padding: 8px;

  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);

  display: flex;
  flex-direction: column;
  align-items: center;
}

.cover {
  width: 100%;
  max-width: 180px;
  height: 140px;
  object-fit: contain;
  border-radius: 6px;
}

.record-title {
  font-family: "Playfair Display";
  font-size: 15px;

  text-align: center;
  margin-top: 6px;

  width: 100%;

  white-space: normal;
  overflow-wrap: break-word;
  word-break: break-word;
}

</style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button onclick="expandAll()">Expand All</button>
    <button onclick="collapseAll()">Collapse All</button>
    <button onclick="randomRecord()">Random Dig</button>
  </div>
</header>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let lastFiltered = null;

async function load(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);
}

load();

/* GROUP */
function group(data){
  const g = {};
  data.forEach(item => {
    const letter = item.artist[0].toUpperCase();

    if(!g[letter]) g[letter] = {};
    if(!g[letter][item.artist]) g[letter][item.artist] = [];

    g[letter][item.artist].push(item);
  });
  return g;
}

/* RENDER */
function render(data){

  const grouped = group(data);

  let html = "";

  const letters = Object.keys(grouped).sort();

  letters.forEach(letter => {

    html += `
      <div class="letter-block">

        <div class="letter-header" onclick="this.parentElement.classList.toggle('active')">
          <span>${letter}</span>
          <span>${Object.keys(grouped[letter]).length}</span>
        </div>

        <div class="letter-group">
    `;

    Object.keys(grouped[letter]).sort().forEach(artist => {

      html += `
        <div class="artist-section">
          <div class="artist-name">${artist}</div>
      `;

      grouped[letter][artist].forEach(record => {
        html += `
          <div class="record-card">
            ${record.cover ? `<img src="${record.cover}" class="cover">` : ""}
            <div class="record-title">${record.record}</div>
          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  });

  /* VARIOUS (SECOND-TO-LAST) */
  if (grouped["V"] || grouped["v"]) {
    const variousKey = Object.keys(grouped).find(k => k.toLowerCase() === "v" || k.toLowerCase() === "various");

    if (variousKey && Object.keys(grouped[variousKey]).some(a => a.toLowerCase() === "various")) {

      const variousRecords = grouped[variousKey]["Various"] || grouped[variousKey]["various"];

      html += `
        <div class="letter-block active">
          <div class="letter-header" onclick="this.parentElement.classList.toggle('active')">
            <span>Various</span>
            <span>${variousRecords.length}</span>
          </div>

          <div class="letter-group">
      `;

      variousRecords.forEach(record => {
        html += `
          <div class="record-card">
            ${record.cover ? `<img src="${record.cover}" class="cover">` : ""}
            <div class="record-title">${record.record}</div>
          </div>
        `;
      });

      html += `</div></div>`;
    }
  }

  /* # (LAST) */
  const numericArtists = data.filter(x => /^[0-9]/.test(x.artist));

  if (numericArtists.length) {

    const groupedNum = {};

    numericArtists.forEach(item => {
      if (!groupedNum[item.artist]) groupedNum[item.artist] = [];
      groupedNum[item.artist].push(item);
    });

    html += `
      <div class="letter-block active">
        <div class="letter-header" onclick="this.parentElement.classList.toggle('active')">
          <span>#</span>
          <span>${Object.keys(groupedNum).length}</span>
        </div>

        <div class="letter-group">
    `;

    Object.keys(groupedNum).sort().forEach(artist => {

      html += `
        <div class="artist-section">
          <div class="artist-name">${artist}</div>
      `;

      groupedNum[artist].forEach(record => {
        html += `
          <div class="record-card">
            ${record.cover ? `<img src="${record.cover}" class="cover">` : ""}
            <div class="record-title">${record.record}</div>
          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  }

  document.getElementById("app").innerHTML = html;
  lastFiltered = data;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

/* EXPAND */
function expandAll(){
  document.querySelectorAll(".letter-block").forEach(b => b.classList.add("active"));
}

/* COLLAPSE */
function collapseAll(){
  document.querySelectorAll(".letter-block").forEach(b => b.classList.remove("active"));
}

/* RANDOM */
function randomRecord(){
  const pool = lastFiltered || allData;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
