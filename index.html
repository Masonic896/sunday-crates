<!DOCTYPE html>
<html>
<head>

  <title>Sunday Crates</title>

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

body {
  font-family: "Sekuya", "Space Grotesk", system-ui, -apple-system, sans-serif;
  background: #0f0f0f;
  color: #eaeaea;
  margin: 0;
  -webkit-font-smoothing: antialiased;
}

/* =========================
   HEADER
========================= */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  position: relative;
}

h1 {
  font-family: "Sekuya", system-ui, sans-serif;
  font-size: 34px;
  margin: 0;
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* =========================
   DISCO
========================= */

#discoWrap {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 10px;
}

#discoBall {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff, #999 40%, #222 80%);
  animation: spin 6s linear infinite;
  box-shadow: 0 0 25px rgba(255,255,255,0.2);
}

@keyframes spin {
  from { transform: rotateY(0deg) rotateX(20deg); }
  to   { transform: rotateY(360deg) rotateX(20deg); }
}

/* =========================
   CONTROLS
========================= */

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

input,
button {
  font-family: "Sekuya", system-ui, sans-serif;
  font-size: 14px;
}

input {
  padding: 8px;
  width: 260px;
  border-radius: 6px;
  border: none;
  background: #1a1a1a;
  color: white;
}

button {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  background: #222;
  color: white;
}

/* =========================
   FOOTER STATUS
========================= */

.footer-status {
  position: fixed;
  bottom: 12px;
  right: 16px;
  font-size: 12px;
  opacity: 0.6;
  font-family: "Sekuya", system-ui, sans-serif;
}

/* =========================
   GRID
========================= */

#app {
  padding: 0 24px 60px;
  margin-top: 28px;

  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* =========================
   ARTIST BLOCK
========================= */

.artist-block {
  background: #151515;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* =========================
   ARTIST HEADER
========================= */

.artist-header {
  padding: 16px 12px;
  cursor: pointer;

  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;

  border-bottom: 1px solid #222;
  background: #141414;
}

.artist-header span:first-child {
  font-family: "Bebas Neue", sans-serif;
  font-size: 26px;
  letter-spacing: 1px;

  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.artist-header span:last-child {
  position: absolute;
  right: 12px;
  font-size: 14px;
  opacity: 0.7;
  font-family: "Sekuya", system-ui, sans-serif;
}

/* =========================
   RECORD GRID
========================= */

.group {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 10px;
}

.group.hidden {
  display: none;
}

/* =========================
   RECORD CARD
========================= */

.record-card {
  background: #1a1a1a;
  border-radius: 8px;
  padding: 10px;

  display: flex;
  flex-direction: column;
  align-items: center;

  border: 1px solid rgba(255,255,255,0.12);

  cursor: pointer;

  transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
}

.record-card:hover {
  transform: scale(1.04);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  filter: brightness(1.1);
}

/* =========================
   COVER
========================= */

.cover {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 6px;
  margin-bottom: 6px;
}

/* =========================
   RECORD TITLE (FIXED + ISOLATED)
========================= */

.record-title {
  font-family: "Playfair Display", serif;
  font-size: 15px;
  font-style: italic;
  font-weight: 400;
  text-align: center;
  margin-top: 6px;
  letter-spacing: 0.2px;

  /* critical isolation */
  font-synthesis: none;
}

/* =========================
   DETAILS
========================= */

.record-details {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: all 0.25s ease;
  font-size: 12px;
  text-align: center;
  margin-top: 6px;
  font-family: "Sekuya", system-ui, sans-serif;
}

.record-card.expanded .record-details {
  max-height: 60px;
  opacity: 1;
}

  </style>
</head>

<body>

<header>

  <h1>Sunday Crates</h1>

  <div id="discoWrap">
    <div id="discoBall"></div>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>

</header>

<div id="app">Loading...</div>
<div id="status" class="footer-status">Loading...</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

async function load() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const json = JSON.parse(
      text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
    );

    allData = (json.table.rows || [])
      .map(r => ({
        artist: r.c?.[1]?.v,
        record: r.c?.[2]?.v,
        cover: r.c?.[3]?.v
      }))
      .filter(x => x.artist && x.record);

    render(allData);

    const now = new Date();
    document.getElementById("status").innerText =
      "Updated: " + now.toLocaleDateString() + " • " + now.toLocaleTimeString();

  } catch {
    document.getElementById("status").innerText = "Error loading data";
  }
}

load();

/* =========================
   RENDER
========================= */

function render(data) {

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item);
  });

  const artists = Object.keys(grouped)
    .sort((a,b) => grouped[b].length - grouped[a].length);

  let html = "";

  artists.forEach(artist => {

    const id = artist.replace(/[^a-zA-Z0-9]/g,"_");

    html += `
      <div class="artist-block">

        <div class="artist-header" onclick="toggle('${id}')">
          <span>${artist}</span>
          <span>${grouped[artist].length}</span>
        </div>

        <div class="group" id="group-${id}">
    `;

    grouped[artist].forEach(item => {
      html += `
        <div class="record-card" onclick="toggleRecord(this)">

          ${item.cover ? `<img src="${item.cover}" class="cover">` : ""}

          <div class="record-title">${item.record}</div>

          <div class="record-details">
            <div>${item.artist}</div>
          </div>

        </div>
      `;
    });

    html += `</div></div>`;
  });

  document.getElementById("app").innerHTML = html;
}

/* =========================
   TOGGLES
========================= */

function toggle(id){
  document.getElementById("group-"+id).classList.toggle("hidden");
}

function toggleRecord(el){
  el.classList.toggle("expanded");
}

/* =========================
   SEARCH
========================= */

document.getElementById("search").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase();

  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

/* =========================
   RANDOM
========================= */

function randomRecord(){
  const pick = allData[Math.floor(Math.random()*allData.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
