<!DOCTYPE html>
<html>
<head>

<title>Sunday Crates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #0f0507;
  color: #d8d9d3;
  font-family: "Space Grotesk";
}

/* HEADER (UNCHANGED) */
header {
  display: flex;
  justify-content: space-between;
  padding: 22px 40px 6px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
}

.controls {
  display: flex;
  gap: 10px;
}

input {
  font-family: "Bebas Neue";
  background: white;
  color: #0f0507;
  border: 1px solid #ccc;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 18px;
}

button {
  font-family: "Sekuya";
  background: #233d4d;
  color: #d8d9d3;
  border: 1px solid rgba(216,217,211,0.25);
  padding: 6px 10px;
  cursor: pointer;
}

/* WALL */
#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* =========================
   LETTER CRATE
========================= */

.letter-block {
  background: rgba(0,0,0,0.18);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  overflow: hidden;
}

.letter-header {
  display: flex;
  justify-content: space-between;
  padding: 10px 14px;
  font-family: "Bebas Neue";
  font-size: 26px;
  background: #d8d9d3;
  color: #0f0507;
}

/* =========================
   SINGLE ARTIST LANE (FIXED)
========================= */

.letter-group {
  display: none;
  padding: 14px;
  background: rgba(0,0,0,0.25);

  overflow-x: auto;
  overflow-y: hidden;

  display: flex;
  flex-direction: row;
  gap: 14px;
}

.letter-block.active .letter-group {
  display: flex;
}

/* ONE ARTIST CARD PER VIEW */
.artist-section {
  min-width: 100%;
  flex: 0 0 auto;

  padding: 10px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}

/* ARTIST TITLE */
.artist-name {
  font-family: "Bebas Neue";
  font-size: 20px;
  margin-bottom: 12px;
}

/* =========================
   RECORDS (CLEAN + UNIFORM)
========================= */

.record-card {
  width: 100%;
  box-sizing: border-box;

  margin-bottom: 10px;
  padding: 8px;

  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);

  display: flex;
  flex-direction: column;
  align-items: center;
}

/* COVER */
.cover {
  width: 100%;
  max-width: 180px;
  height: 140px;
  object-fit: contain;
  border-radius: 6px;
}

/* TITLE WRAP FIX */
.record-title {
  font-family: "Playfair Display";
  font-size: 15px;

  text-align: center;
  margin-top: 6px;

  width: 100%;

  white-space: normal;
  overflow-wrap: break-word;
  word-break: break-word;

  line-height: 1.2;
}

</style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button onclick="expandAll()">Expand All</button>
    <button onclick="collapseAll()">Collapse All</button>
    <button onclick="randomRecord()">Random Dig</button>
  </div>
</header>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let lastFiltered = null;

/* LOAD */
async function load(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);
}

load();

/* GROUP */
function group(data){
  const g = {};
  data.forEach(item => {
    const letter = item.artist[0].toUpperCase();
    if(!g[letter]) g[letter] = {};

    if(!g[letter][item.artist]) {
      g[letter][item.artist] = [];
    }

    g[letter][item.artist].push(item);
  });
  return g;
}

/* RENDER (ONE ARTIST PER LANE) */
function render(data){

  const grouped = group(data);

  let html = "";

  Object.keys(grouped).sort().forEach(letter => {

    html += `
      <div class="letter-block">

        <div class="letter-header" onclick="this.parentElement.classList.toggle('active')">
          <span>${letter}</span>
          <span>${Object.keys(grouped[letter]).length}</span>
        </div>

        <div class="letter-group">
    `;

    Object.keys(grouped[letter]).sort().forEach(artist => {

      html += `
        <div class="artist-section">
          <div class="artist-name">${artist}</div>
      `;

      grouped[letter][artist].forEach(record => {
        html += `
          <div class="record-card">
            ${record.cover ? `<img src="${record.cover}" class="cover">` : ""}
            <div class="record-title">${record.record}</div>
          </div>
        `;
      });

      html += `</div>`;
    });

    html += `
        </div>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;
  lastFiltered = data;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

/* EXPAND / COLLAPSE */
function expandAll(){
  document.querySelectorAll(".letter-block").forEach(b => b.classList.add("active"));
}

function collapseAll(){
  document.querySelectorAll(".letter-block").forEach(b => b.classList.remove("active"));
}

/* RANDOM */
function randomRecord(){
  const pool = lastFiltered || allData;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
