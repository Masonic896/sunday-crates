<!DOCTYPE html>
<html>
<head>
  <title>Vinyl Collection</title>

  <style>
html, body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom left, #111, #222);
  color: #eaeaea;
}

/* =======================
   HEADER
======================= */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  position: relative;
}

h1 {
  font-size: 20px;
  margin: 0;
}

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

input {
  padding: 8px;
  width: 260px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

/* =======================
   DISCO BALL (WORKING VERSION)
======================= */

#discoBallLight {
  width: 100px;
  height: 100px;
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 50%;
  background: white;
  opacity: 0.18;
  filter: blur(20px);
}

#discoBall {
  width: 100px;
  height: 100px;
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  transform-style: preserve-3d;
  animation: spin 14s linear infinite;
}

.square {
  position: absolute;
  width: 6px;
  height: 6px;
  transform-style: preserve-3d;
}

.square div {
  width: 6px;
  height: 6px;
  position: absolute;
  backface-visibility: hidden;
  animation: flicker 2s linear infinite;
}

@keyframes spin {
  from { transform: translateX(-50%) rotateX(70deg) rotateZ(0deg); }
  to   { transform: translateX(-50%) rotateX(70deg) rotateZ(360deg); }
}

@keyframes flicker {
  0% { opacity: 0.5; filter: brightness(60%); }
  50% { opacity: 1; filter: brightness(140%); }
  100% { opacity: 0.6; filter: brightness(90%); }
}

/* =======================
   VINYL LIST
======================= */

#app {
  padding: 0 24px 40px 24px;
}

.artist {
  font-weight: 700;
  margin-top: 26px;
  padding-bottom: 6px;
  border-bottom: 1px solid #2a2a2a;
  cursor: pointer;
}

.group {
  display: block;
}

.record-card {
  margin-left: 20px;
  padding: 6px 10px;
  margin-bottom: 4px;
  background: #1b1b1b;
  border-radius: 6px;
  transition: 0.15s;
}

.record-card:hover {
  background: #2a2a2a;
  transform: translateX(4px);
}

  </style>
</head>

<body>

<header>

  <h1>My Vinyl Collection</h1>

  <div id="discoBallLight"></div>
  <div id="discoBall"></div>

  <div class="controls">
    <input id="search" placeholder="Search records or artists..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>

</header>

<div id="app">Loading...</div>

<script>

/* =======================
   VINYL DATA
======================= */

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

fetch(SHEET_URL)
  .then(res => res.text())
  .then(text => {
    const start = text.indexOf("{");
    const end = text.lastIndexOf("}");
    const json = JSON.parse(text.slice(start, end + 1));

    const rows = json.table.rows;

    allData = rows.map(r => ({
      artist: r.c[1]?.v,
      record: r.c[2]?.v
    })).filter(x => x.artist && x.record);

    render(allData);
  });

/* =======================
   RENDER
======================= */

function render(data) {
  let html = "";
  let currentArtist = "";
  let openGroup = false;

  data.forEach(item => {

    if (item.artist !== currentArtist) {

      if (openGroup) html += "</div>";

      currentArtist = item.artist;
      openGroup = true;

      html += `
        <div class="artist" onclick="toggleArtist('${item.artist.replace(/'/g,"")}')">
          ${item.artist}
        </div>
        <div id="group-${item.artist}" class="group">
      `;
    }

    html += `<div class="record-card">${item.record}</div>`;
  });

  if (openGroup) html += "</div>";

  document.getElementById("app").innerHTML = html;
}

/* =======================
   SEARCH
======================= */

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  render(allData.filter(item =>
    item.artist.toLowerCase().includes(val) ||
    item.record.toLowerCase().includes(val)
  ));
});

/* =======================
   RANDOM
======================= */

function randomRecord() {
  const pick = allData[Math.floor(Math.random() * allData.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

/* =======================
   COLLAPSE
======================= */

function toggleArtist(artist) {
  const el = document.getElementById("group-" + artist);
  if (!el) return;
  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* =======================
   DISCO BALL (STABLE BUILD)
======================= */

window.addEventListener("DOMContentLoaded", () => {

  const disco = document.getElementById("discoBall");

  const radius = 45;
  const count = 180;

  for (let i = 0; i < count; i++) {

    const square = document.createElement("div");
    square.className = "square";

    const tile = document.createElement("div");

    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos((Math.random() * 2) - 1);

    const x = radius * Math.sin(phi) * Math.cos(theta);
    const y = radius * Math.sin(phi) * Math.sin(theta);
    const z = radius * Math.cos(phi);

    tile.style.background = `rgb(
      ${120 + Math.random()*120},
      ${120 + Math.random()*120},
      ${120 + Math.random()*120}
    )`;

    square.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;

    square.appendChild(tile);
    disco.appendChild(square);
  }

});

</script>

</body>
</html>
