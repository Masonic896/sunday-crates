<!DOCTYPE html>
<html>
<head>
  <title>Vinyl Collection</title>
  <style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #eaeaea;
  padding: 24px;
}

h1 {
  font-weight: 600;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.artist {
  font-weight: 700;
  margin-top: 26px;
  padding-bottom: 6px;
  border-bottom: 1px solid #2a2a2a;
  color: #ffffff;
}

.record {
  margin-left: 18px;
  padding: 4px 0;
  opacity: 0.75;
  transition: 0.15s ease;
}

.record:hover {
  opacity: 1;
  transform: translateX(4px);
}
</style>
  </style>
</head>
<body>

<h1>My Vinyl Collection</h1>
<div id="app">Loading...</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

fetch(SHEET_URL)
  .then(res => res.text())
  .then(data => {
    const json = JSON.parse(data.substring(47).slice(0, -2));
    const rows = json.table.rows;

    let html = "";
    let currentArtist = "";

    rows.forEach(r => {
      const artist = r.c[1]?.v;
      const record = r.c[2]?.v;

      if (!artist || !record) return;

      if (artist !== currentArtist) {
        currentArtist = artist;
        html += `<div class="artist">${artist}</div>`;
      }

      html += `<div class="record">🎵 ${record}</div>`;
    });

    document.getElementById("app").innerHTML = html;
  });
</script>

</body>
</html>
