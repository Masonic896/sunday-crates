<!DOCTYPE html>
<html>
<head>

  <title>Vinyl Collection</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

:root {
  /* UI FONT (Sakuya fallback replaced with Space Grotesk) */
  --font-ui: "Space Grotesk", system-ui, -apple-system, sans-serif;

  --font-artist: "Bebas Neue", sans-serif;
  --font-record: "Playfair Display", serif;
}

/* =========================
   GLOBAL UI (Sakuya role)
========================= */

body {
  font-family: var(--font-ui);
  background: #0f0f0f;
  color: #eaeaea;
  margin: 0;
  -webkit-font-smoothing: antialiased;
}

h1,
.controls,
input,
button,
.footer-status {
  font-family: var(--font-ui);
}

/* =========================
   HEADER
========================= */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  position: relative;
}

h1 {
  font-size: 34px;
  margin: 0;
  font-weight: 600;
}

/* =========================
   DISCO (unchanged)
========================= */

#discoWrap {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 10px;
}

#discoBall {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff, #999 40%, #222 80%);
  animation: spin 6s linear infinite;
  box-shadow: 0 0 25px rgba(255,255,255,0.2);
}

@keyframes spin {
  from { transform: rotateY(0deg) rotateX(20deg); }
  to   { transform: rotateY(360deg) rotateX(20deg); }
}

/* =========================
   ARTIST FONT (Bebas Neue)
========================= */

.artist-header span:first-child {
  font-family: var(--font-artist);
  font-size: 26px;
  letter-spacing: 1px;
}

/* =========================
   RECORD FONT (Playfair)
========================= */

.record-title {
  font-family: var(--font-record);
  font-style: italic;
  font-size: 16px;
  text-align: center;
}

/* =========================
   KEEP YOUR EXISTING LAYOUT
   (IMPORTANT: NOT MODIFIED)
========================= */

#app {
  padding: 0 24px 60px;
  margin-top: 28px;

  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

.group {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 10px;
}

.artist-block {
  background: #151515;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  overflow: hidden;
}

/* RECORD CARD */
.record-card {
  background: #1a1a1a;
  border-radius: 8px;
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  cursor: pointer;
  transition: 0.2s ease;
}

.record-card:hover {
  transform: scale(1.04);
  filter: brightness(1.1);
}

.cover {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 6px;
  margin-bottom: 6px;
}

/* ARTIST HEADER */
.artist-header {
  padding: 16px 12px;
  background: #141414;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

.artist-header span:last-child {
  position: absolute;
  right: 12px;
  opacity: 0.7;
}

  </style>
</head>

<body>

<header>
  <h1>My Vinyl Collection</h1>

  <div id="discoWrap">
    <div id="discoBall"></div>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>
</header>

<div id="app">Loading...</div>
<div id="status" class="footer-status">Loading...</div>

<script>

/* your existing JS stays unchanged */

</script>

</body>
</html>
