<!DOCTYPE html>
<html>
<head>

<title>Sunday Crates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE
========================= */

body {
  margin: 0;
  background: #0e0b0c;
  color: #e4e1da;
  font-family: "Space Grotesk";
  letter-spacing: 0.2px;
}

/* =========================
   HEADER (RESTORED)
========================= */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 10px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  font-weight: normal;
  margin: 0;
  letter-spacing: 0.5px;
}

/* SEARCH */
.search-bar input {
  width: 320px;
  max-width: 45vw;

  font-family: "Bebas Neue";
  font-size: 16px;

  background: #1a1617;
  color: #e4e1da;

  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;

  padding: 6px 10px;
  height: 34px;

  box-sizing: border-box;
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 10px;
  padding: 0 40px;
  margin-top: 10px;
  margin-bottom: 28px;
}

/* BUTTONS (Sekuya restored) */
button {
  font-family: "Sekuya";

  background: #1a1617;
  color: #e4e1da;

  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;

  font-size: 13px;
  letter-spacing: 0.5px;

  padding: 6px 14px;
  height: 34px;

  cursor: pointer;

  box-shadow: 0 6px 14px rgba(0,0,0,0.7);

  transition: transform 0.08s ease, box-shadow 0.08s ease;
}

button:active {
  transform: translateY(1px);
  box-shadow: inset 0 3px 6px rgba(0,0,0,0.6);
}

/* =========================
   GRID
========================= */

#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* =========================
   CRATES
========================= */

.letter-block {
  background: #161314;
  border-radius: 12px;

  border: 1px solid rgba(255,255,255,0.04);

  box-shadow:
    0 14px 40px rgba(0,0,0,0.75),
    inset 0 1px 0 rgba(255,255,255,0.02);

  overflow: hidden;

  transition: transform 0.15s ease;
}

.letter-block:hover {
  transform: translateY(-2px);
}

/* HEADER TAB (BEBAS NEUE RESTORED) */
.letter-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;

  padding: 14px 16px;

  font-family: "Bebas Neue";
  font-size: 22px;
  letter-spacing: 1.5px;

  background: #e2ddd2;
  color: #181515;

  border-bottom: 1px solid rgba(0,0,0,0.15);

  cursor: pointer;
}

.letter-header:active {
  transform: translateY(1px);
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.25);
}

/* =========================
   CONTENT AREA
========================= */

.letter-group {
  display: none;

  max-height: 420px;
  overflow-y: auto;

  padding: 14px;

  background: #120f10;

  box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);

  flex-direction: column;
  gap: 14px;
}

.letter-block.active .letter-group {
  display: flex;
}

/* =========================
   ARTIST LABELS (SPACE GROTESK RESTORED)
========================= */

.artist-section {
  padding: 12px;

  border-radius: 10px;

  background: #1a1617;

  border: 1px solid rgba(255,255,255,0.04);
}

.artist-name {
  font-family: "Space Grotesk";
  font-size: 14px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  opacity: 0.7;
  margin-bottom: 10px;
}

/* =========================
   RECORD CARDS (TACTILE)
========================= */

.record-card {
  width: 100%;
  box-sizing: border-box;

  margin-bottom: 10px;
  padding: 10px;

  border-radius: 10px;

  background: #1f1b1c;

  border: 1px solid rgba(255,255,255,0.05);

  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.02),
    0 6px 14px rgba(0,0,0,0.65);

  display: flex;
  flex-direction: column;
  align-items: center;

  transition: transform 0.12s ease, box-shadow 0.12s ease;
}

.record-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.75);
}

.record-card:active {
  transform: translateY(1px);
  box-shadow: inset 0 3px 6px rgba(0,0,0,0.5);
}

/* COVER */
.cover {
  width: 100%;
  max-width: 180px;
  height: 140px;
  object-fit: contain;
  border-radius: 6px;
}

/* TITLE (PLAYFAIR RESTORED) */
.record-title {
  font-family: "Playfair Display";
  font-size: 15px;

  color: #dcd8cf;

  text-align: center;
  margin-top: 6px;

  width: 100%;
  line-height: 1.3;

  word-break: break-word;
}

</style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="search-bar">
    <input id="search" placeholder="Search..." />
  </div>
</header>

<div class="controls">
  <button onclick="toggleAll()">Expand All</button>
  <button onclick="randomRecord()">Random Dig</button>
</div>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let lastFiltered = null;
let expanded = false;

async function load(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);
}

load();

/* GROUPING LOGIC (UNCHANGED) */
function render(data){

  const alpha = {};
  const various = [];
  const numeric = {};

  data.forEach(item => {

    if (item.artist === "Various") {
      various.push(item);
      return;
    }

    if (/^[0-9]/.test(item.artist)) {
      if (!numeric["#"]) numeric["#"] = {};
      if (!numeric["#"][item.artist]) numeric["#"][item.artist] = [];
      numeric["#"][item.artist].push(item);
      return;
    }

    const letter = item.artist[0].toUpperCase();
    if (!alpha[letter]) alpha[letter] = {};
    if (!alpha[letter][item.artist]) alpha[letter][item.artist] = [];
    alpha[letter][item.artist].push(item);
  });

  let html = "";

  Object.keys(alpha).sort().forEach(letter => {

    html += `
      <div class="letter-block">
        <div class="letter-header" onclick="toggle(this)">
          <span>${letter}</span>
          <span>${Object.keys(alpha[letter]).length}</span>
        </div>
        <div class="letter-group">
    `;

    Object.keys(alpha[letter]).sort().forEach(artist => {

      html += `
        <div class="artist-section">
          <div class="artist-name">${artist}</div>
      `;

      alpha[letter][artist].forEach(r => {
        html += `
          <div class="record-card">
            ${r.cover ? `<img src="${r.cover}" class="cover">` : ""}
            <div class="record-title">${r.record}</div>
          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  });

  if (various.length) {
    html += `
      <div class="letter-block">
        <div class="letter-header" onclick="toggle(this)">
          <span>Various</span>
          <span>${various.length}</span>
        </div>
        <div class="letter-group">
          <div class="artist-section">
            <div class="artist-name">Various</div>
    `;

    various.forEach(r => {
      html += `
        <div class="record-card">
          ${r.cover ? `<img src="${r.cover}" class="cover">` : ""}
          <div class="record-title">${r.record}</div>
        </div>
      `;
    });

    html += `</div></div></div>`;
  }

  if (numeric["#"]) {
    html += `
      <div class="letter-block">
        <div class="letter-header" onclick="toggle(this)">
          <span>#</span>
          <span>${Object.keys(numeric["#"]).length}</span>
        </div>
        <div class="letter-group">
    `;

    Object.keys(numeric["#"]).sort().forEach(artist => {

      html += `
        <div class="artist-section">
          <div class="artist-name">${artist}</div>
      `;

      numeric["#"][artist].forEach(r => {
        html += `
          <div class="record-card">
            ${r.cover ? `<img src="${r.cover}" class="cover">` : ""}
            <div class="record-title">${r.record}</div>
          </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div></div>`;
  }

  document.getElementById("app").innerHTML = html;
  lastFiltered = data;
}

function toggle(el){
  el.parentElement.classList.toggle("active");
}

function toggleAll(){
  expanded = !expanded;
  document.querySelectorAll(".letter-block")
    .forEach(b => b.classList.toggle("active", expanded));
}

function randomRecord(){
  const pool = lastFiltered || allData;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

</script>

</body>
</html>
