<!DOCTYPE html>
<html>
<head>
  <title>Vinyl Collection</title>

  <style>
html, body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom left, #111, #222);
  color: #eaeaea;
}

/* =======================
   HEADER
======================= */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  position: relative;
}

h1 {
  font-size: 20px;
  margin: 0;
}

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

input {
  padding: 8px;
  width: 260px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

/* =======================
   DISCO BALL (ORIGINAL PEN)
======================= */

#discoBallLight {
  width: 100px;
  height: 100px;
  position: absolute;
  top: 10px;
  left: 50%;
  margin-left: -50px;
  border-radius: 50%;
  background: white;
  opacity: 0.2;
  filter: blur(20px);
}

#discoBall {
  transform-style: preserve-3d;
  width: 100px;
  height: 100px;
  position: absolute;
  top: 10px;
  left: 50%;
  margin-left: -50px;
  animation: rotateDiscoBall 18s linear infinite;
}

#discoBallMiddle {
  height: 100%;
  width: 100%;
  border-radius: 50%;
  background: linear-gradient(to top, #111, #333);
  position: absolute;
  animation: rotateDiscoBallMiddle 18s linear infinite;
}

.square {
  transform-style: preserve-3d;
  position: absolute;
  width: 6px;
  height: 6px;
}

.square > div {
  width: 6px;
  height: 6px;
  position: absolute;
  transform-origin: 0 0 0;
  backface-visibility: hidden;
  animation: reflect 2s linear infinite;
}

/* =======================
   ANIMATIONS
======================= */

@keyframes rotateDiscoBall {
  0% { transform: rotateX(90deg) rotateZ(0deg); }
  100% { transform: rotateX(90deg) rotateZ(360deg); }
}

@keyframes rotateDiscoBallMiddle {
  0% { transform: rotateX(90deg) rotateY(0deg); }
  100% { transform: rotateX(90deg) rotateY(-360deg); }
}

@keyframes reflect {
  0% { filter: brightness(60%); opacity: 1; }
  50% { filter: brightness(120%); opacity: 0.4; }
  100% { filter: brightness(90%); opacity: 1; }
}

/* =======================
   VINYL UI
======================= */

#app {
  padding: 0 24px 40px 24px;
}

.artist {
  font-weight: 700;
  margin-top: 26px;
  padding-bottom: 6px;
  border-bottom: 1px solid #2a2a2a;
  cursor: pointer;
}

.group {
  display: block;
}

.record-card {
  margin-left: 20px;
  padding: 6px 10px;
  margin-bottom: 4px;
  background: #1b1b1b;
  border-radius: 6px;
  transition: 0.15s;
}

.record-card:hover {
  background: #2a2a2a;
  transform: translateX(4px);
}

  </style>
</head>

<body>

<header>

  <h1>My Vinyl Collection</h1>

  <!-- DISCO BALL -->
  <div id="discoBallLight"></div>
  <div id="discoBall">
    <div id="discoBallMiddle"></div>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search records or artists..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>

</header>

<div id="app">Loading...</div>

<script>

/* =======================
   VINYL DATA
======================= */

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

/* SAFE FETCH */
fetch(SHEET_URL)
  .then(res => res.text())
  .then(text => {

    const start = text.indexOf("{");
    const end = text.lastIndexOf("}");
    const json = JSON.parse(text.slice(start, end + 1));

    const rows = json.table.rows;

    allData = rows.map(r => ({
      artist: r.c[1]?.v,
      record: r.c[2]?.v
    })).filter(x => x.artist && x.record);

    render(allData);
  });

function render(data) {
  let html = "";
  let currentArtist = "";
  let openGroup = false;

  data.forEach(item => {

    if (item.artist !== currentArtist) {

      if (openGroup) html += "</div>";

      currentArtist = item.artist;
      openGroup = true;

      html += `
        <div class="artist" onclick="toggleArtist('${item.artist.replace(/'/g,"")}')">
          ${item.artist}
        </div>
        <div id="group-${item.artist}" class="group">
      `;
    }

    html += `<div class="record-card">${item.record}</div>`;
  });

  if (openGroup) html += "</div>";

  document.getElementById("app").innerHTML = html;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  render(allData.filter(item =>
    item.artist.toLowerCase().includes(val) ||
    item.record.toLowerCase().includes(val)
  ));
});

/* RANDOM */
function randomRecord() {
  const pick = allData[Math.floor(Math.random() * allData.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

/* COLLAPSE */
function toggleArtist(artist) {
  const el = document.getElementById("group-" + artist);
  if (!el) return;
  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* =======================
   DISCO BALL (FIXED INIT)
======================= */

function initDiscoBall() {

  var t = 1;
  var radius = 50;
  var squareSize = 6.5;
  var prec = 19.55;
  var fuzzy = 0.001;
  var inc = (Math.PI - fuzzy) / prec;

  var discoBall = document.getElementById("discoBall");

  if (!discoBall) {
    console.error("Disco ball element not found");
    return;
  }

  for (var t = fuzzy; t < Math.PI; t += inc) {

    var z = radius * Math.cos(t);

    var currentRadius = Math.abs(
      (radius * Math.cos(0) * Math.sin(t)) -
      (radius * Math.cos(Math.PI) * Math.sin(t))
    ) / 2.5;

    var circumference = Math.abs(2 * Math.PI * currentRadius);
    var squaresThatFit = Math.max(1, Math.floor(circumference / squareSize));
    var angleInc = (Math.PI * 2 - fuzzy) / squaresThatFit;

    for (var i = angleInc / 2 + fuzzy; i < (Math.PI * 2); i += angleInc) {

      var square = document.createElement("div");
      var squareTile = document.createElement("div");

      squareTile.style.width = squareSize + "px";
      squareTile.style.height = squareSize + "px";

      squareTile.style.transform =
        "rotate(" + i + "rad) rotateY(" + t + "rad)";

      squareTile.style.backgroundColor =
        randomColor((t > 1.3 && t < 1.9) ? "bright" : "any");

      squareTile.style.animation = "reflect 2s linear infinite";
      squareTile.style.animationDelay =
        (randomNumber(0, 20) / 10) + "s";

      square.appendChild(squareTile);
      square.className = "square";

      var x = radius * Math.cos(i) * Math.sin(t);
      var y = radius * Math.sin(i) * Math.sin(t);

      square.style.transform =
        "translateX(" + x + "px) translateY(" + y + "px) translateZ(" + z + "px)";

      discoBall.appendChild(square);
    }
  }

  function randomColor(type) {
    var c = type === "bright"
      ? randomNumber(130, 255)
      : randomNumber(110, 190);

    return "rgb(" + c + "," + c + "," + c + ")";
  }

  function randomNumber(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }
}

/* IMPORTANT: run AFTER DOM exists */
window.addEventListener("DOMContentLoaded", initDiscoBall);

</script>

</body>
</html>
