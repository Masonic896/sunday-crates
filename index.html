<!DOCTYPE html>
<html>
<head>

  <title>Sunday Crates</title>

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>

body {
  font-family: "Space Grotesk";
  background: #0f0f0f;
  color: #eaeaea;
  margin: 0;
  -webkit-font-smoothing: antialiased;
}

/* =========================
   GRID LAYOUT FOUNDATION
========================= */

#app {
  padding: 60px 60px 80px;
  margin-top: 0; /* 🔥 removed header gap dependency */

  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* =========================
   HEADER OVER GRID ALIGNMENT
========================= */

header {
  position: absolute; /* 🔥 key change: sits on grid layer */
  top: 60px;          /* aligns with grid top padding */
  left: 60px;

  display: flex;
  align-items: flex-start;
  width: calc(100% - 120px);
}

/* TITLE */
h1 {
  font-family: "Sekuya";
  font-size: 52px; /* 🔥 increased size */
  margin: 0;

  position: absolute;
  left: 0;
  top: 0;
}

/* DISCO */
#discoWrap {
  display: none; /* optional — hides clutter for layout clarity */
}

/* =========================
   CONTROLS (RIGHT EDGE OF GRID)
========================= */

.controls {
  position: absolute;
  right: 0; /* 🔥 pins to right edge of 3rd column */

  display: flex;
  align-items: center;
  gap: 10px;
}

/* input/button styling */
input,
button {
  font-family: "Sekuya", "Space Grotesk";
}

/* =========================
   ARTIST BLOCK
========================= */

.artist-block {
  background: #151515;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  overflow: hidden;
}

/* ARTIST HEADER */
.artist-header {
  padding: 16px 12px;
  cursor: pointer;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #141414;
  border-bottom: 1px solid #222;
}

.artist-header span:first-child {
  font-family: "Bebas Neue";
  font-size: 26px;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.artist-header span:last-child {
  position: absolute;
  right: 12px;
  font-size: 14px;
  opacity: 0.7;
  background: rgba(0,0,0,0.35);
  padding: 2px 8px;
  border-radius: 999px;
}

/* RECORD GRID */
.group {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 10px;
}

.group.hidden {
  display: none;
}

/* RECORD CARD */
.record-card {
  background: linear-gradient(145deg, #1a1a1a, #141414);
  border-radius: 8px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  border: 1px solid rgba(255,255,255,0.14);
  position: relative;
  overflow: hidden;

  box-shadow:
    inset 0 2px 10px rgba(0,0,0,0.6),
    0 6px 20px rgba(0,0,0,0.35);
}

.cover {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 6px;
  margin-bottom: 6px;
}

.record-title {
  font-family: "Playfair Display", serif;
  font-size: 15px;
  font-weight: 500;
  text-align: center;
}

/* FOOTER */
.footer-status {
  font-size: 12px;
  opacity: 0.6;
  font-family: "Space Grotesk";
  text-align: right;
  padding: 20px 60px 30px;
}

  </style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <button onclick="randomRecord()">Random Dig</button>
  </div>
</header>

<div id="app">Loading...</div>
<div id="status" class="footer-status">Loading...</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];

async function load() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);

  document.getElementById("status").innerText =
    "Updated: " + new Date().toLocaleString();
}

load();

/* RENDER */
function render(data) {

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item);
  });

  const artists = Object.keys(grouped)
    .sort((a,b) => grouped[b].length - grouped[a].length);

  let html = "";

  artists.forEach(artist => {

    const id = artist.replace(/[^a-zA-Z0-9]/g,"_");

    html += `
      <div class="artist-block">

        <div class="artist-header" onclick="toggle('${id}')">
          <span>${artist}</span>
          <span>${grouped[artist].length}</span>
        </div>

        <div class="group" id="group-${id}">
    `;

    grouped[artist].forEach(item => {
      html += `
        <div class="record-card">

          ${item.cover ? `<img src="${item.cover}" class="cover">` : ""}

          <div class="record-title">${item.record}</div>

        </div>
      `;
    });

    html += `</div></div>`;
  });

  document.getElementById("app").innerHTML = html;
}

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  render(allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  ));
});

function toggle(id){
  document.getElementById("group-"+id).classList.toggle("hidden");
}

function randomRecord(){
  const pick = allData[Math.floor(Math.random()*allData.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
