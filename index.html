<!DOCTYPE html>
<html>
<head>

  <title>Sunday Crates</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Playfair+Display:wght@400..900&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

  <style>

body {
  margin: 0;
  background: #0f0507;
  color: #d8d9d3;
  font-family: "Space Grotesk";
  overflow-x: hidden;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 40px 6px;
}

h1 {
  font-family: "Sekuya";
  font-size: 52px;
  margin: 0;
}

.controls {
  display: flex;
  gap: 10px;
}

input {
  font-family: "Bebas Neue";
  background: white;
  color: #0f0507;
  border: 1px solid #ccc;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 18px;
}

button {
  font-family: "Sekuya";
  background: #233d4d;
  color: #d8d9d3;
  border: 1px solid rgba(216,217,211,0.25);
  padding: 6px 10px;
  cursor: pointer;
}

/* =========================
   3-COLUMN WALL (KEY CHANGE)
========================= */

#app-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

#app {
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* 👈 3 per row */
  gap: 18px;
  align-items: start;
}

/* LETTER CRATES */
.letter-block {
  background: rgba(0,0,0,0.18);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

/* HEADER */
.letter-header {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 10px 14px;

  font-family: "Bebas Neue";
  font-size: 26px;

  background: #d8d9d3;
  color: #0f0507;
}

.letter-count {
  font-size: 14px;
  opacity: 0.6;
}

/* DRAWER */
.letter-group {
  max-height: 0;
  overflow: hidden;

  display: flex;
  flex-direction: column;
  gap: 14px;

  padding: 0 14px;

  background: rgba(0,0,0,0.25);

  transition: max-height 0.35s ease, padding 0.25s ease, opacity 0.25s ease;
  opacity: 0;
}

.letter-block.active .letter-group {
  max-height: 600px;
  padding: 14px;
  opacity: 1;
}

/* ARTISTS */
.artist-section {
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
}

.artist-name {
  font-family: "Bebas Neue";
  font-size: 18px;
  margin-bottom: 8px;
}

/* RECORDS */
.record-card {
  background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.25));
  border: 1px solid rgba(216,217,211,0.15);
  border-radius: 8px;

  padding: 8px;
  margin-bottom: 8px;

  display: flex;
  flex-direction: column;
  align-items: center;
}

.cover {
  width: 100%;
  max-width: 180px;
  height: 140px;
  object-fit: contain;
  border-radius: 6px;
}

.record-title {
  font-family: "Playfair Display";
  font-size: 16px;
  text-align: center;
  margin-top: 6px;
}

  </style>
</head>

<body>

<header>
  <h1>Sunday Crates</h1>

  <div class="controls">
    <input id="search" placeholder="Search..." />

    <button onclick="expandAll()">Expand All</button>
    <button onclick="collapseAll()">Collapse All</button>

    <button onclick="randomRecord()">Random Dig</button>
  </div>
</header>

<div id="app-wrapper">
  <div id="app"></div>
</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/115OdFJahxX6RbdPPkbd5ncEpFPybl_sSmTsgDlCASHc/gviz/tq?tqx=out:json&sheet=Records";

let allData = [];
let lastFiltered = null;

/* LOAD */
async function load() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  allData = (json.table.rows || [])
    .map(r => ({
      artist: r.c?.[1]?.v,
      record: r.c?.[2]?.v,
      cover: r.c?.[3]?.v
    }))
    .filter(x => x.artist && x.record);

  render(allData);
}

load();

/* TOGGLE SINGLE LETTER */
function toggleLetter(el) {
  const block = el.parentElement;
  block.classList.toggle("active");
}

/* EXPAND ALL */
function expandAll() {
  document.querySelectorAll(".letter-block").forEach(b => {
    b.classList.add("active");
  });
}

/* COLLAPSE ALL */
function collapseAll() {
  document.querySelectorAll(".letter-block").forEach(b => {
    b.classList.remove("active");
  });
}

/* GROUP */
function group(data) {
  const grouped = {};

  data.forEach(item => {
    const letter = item.artist[0].toUpperCase();
    if (!grouped[letter]) grouped[letter] = {};
    if (!grouped[letter][item.artist]) grouped[letter][item.artist] = [];
    grouped[letter][item.artist].push(item);
  });

  return grouped;
}

/* RENDER */
function render(data) {

  const grouped = group(data);

  let html = "";

  Object.keys(grouped)
    .sort()
    .forEach(letter => {

      html += `
        <div class="letter-block">

          <div class="letter-header" onclick="toggleLetter(this)">
            <span>${letter}</span>
            <span class="letter-count">${Object.keys(grouped[letter]).length}</span>
          </div>

          <div class="letter-group">
      `;

      Object.keys(grouped[letter])
        .sort()
        .forEach(artist => {

          html += `
            <div class="artist-section">
              <div class="artist-name">${artist}</div>
          `;

          grouped[letter][artist].forEach(item => {
            html += `
              <div class="record-card">
                ${item.cover ? `<img src="${item.cover}" class="cover">` : ""}
                <div class="record-title">${item.record}</div>
              </div>
            `;
          });

          html += `</div>`;
        });

      html += `
          </div>
        </div>
      `;
    });

  document.getElementById("app").innerHTML = html;

  lastFiltered = data;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  const filtered = allData.filter(x =>
    x.artist.toLowerCase().includes(val) ||
    x.record.toLowerCase().includes(val)
  );

  render(filtered);
});

/* RANDOM */
function randomRecord(){
  const pool = lastFiltered || allData;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  alert(`${pick.artist} — ${pick.record}`);
}

</script>

</body>
</html>
